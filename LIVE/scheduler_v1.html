      gap: 8px;
    }

    .sos-sched-mini-list {
      display: grid;
      gap: 9px;
    }

    .sos-sched-mini-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.045);
    }

    .sos-sched-mini-item strong {
      color: #fff;
      font-family: var(--matrix-heading);
      font-size: 14px;
    }

    .sos-sched-mini-item span {
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
    }

    .sos-sched-slot {
      display: grid;
      gap: 4px;
      min-height: 72px;
      padding: 13px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02)),
        rgba(6, 23, 39, 0.5);
      color: #fff;
      text-align: left;
      box-shadow:
        0 7px 18px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition: transform 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease;
    }

    .sos-sched-slot:hover,
    .sos-sched-slot:focus-visible {
      border-color: rgba(23, 163, 207, 0.5);
      transform: translateY(-2px);
      outline: none;
    }

    .sos-sched-slot[aria-pressed="true"] {
      border-color: rgba(243, 213, 118, 0.58);
      background: linear-gradient(135deg, rgba(217, 184, 91, 0.24), rgba(23, 163, 207, 0.12));
      box-shadow: 0 0 24px rgba(217, 184, 91, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .sos-sched-slot strong {
      color: var(--gold2);
      font-family: var(--matrix-heading);
      font-size: 18px;
    }

    .sos-sched-slot span {
      color: rgba(255, 255, 255, 0.56);
      font-size: 12px;
    }

    .sos-sched-list {
      display: grid;
      gap: 12px;
    }

    .sos-sched-item {
      display: grid;
      gap: 10px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 7px 16px rgba(0, 0, 0, 0.2);
    }

    .sos-sched-item strong {
      color: #fff;
      font-family: var(--matrix-heading);
      font-size: 17px;
    }

    .sos-sched-item span {
      color: rgba(255, 255, 255, 0.58);
      font-size: 13px;
    }

    .sos-loading {
      display: grid;
      min-height: 260px;
      place-items: center;
      color: rgba(255, 255, 255, 0.64);
      font-size: 13px;
    }

    .sos-load-shell {
      position: relative;
      display: grid;
      gap: 14px;
      padding: 20px;
      border: 1px solid rgba(120, 212, 255, 0.22);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(9, 62, 92, 0.74), rgba(5, 28, 48, 0.88)),
        rgba(6, 23, 39, 0.72);
      box-shadow: 0 20px 58px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      overflow: hidden;
      animation: sos-fade-in 0.22s ease both;
    }

    .sos-load-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 16% 0%, rgba(255, 204, 77, 0.12), transparent 28%),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 20px);
    }

    .sos-load-shell > * {
      position: relative;
      z-index: 1;
    }

    .sos-load-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 210px;
      gap: 18px;
      align-items: start;
    }

    .sos-load-kicker {
      margin: 0 0 5px;
      color: var(--gold2);
      font-family: var(--matrix-heading);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.24s ease, opacity 0.24s ease;
    }

    .sos-load-title {
      margin: 0;
      color: #fff;
      font-family: var(--matrix-heading);
      font-size: 22px;
      font-weight: 800;
      line-height: 1.15;
      transition: opacity 0.24s ease;
    }

    .sos-load-message {
      margin: 7px 0 0;
      color: rgba(255, 255, 255, 0.68);
      font-size: 14px;
      line-height: 1.48;
      transition: opacity 0.24s ease;
    }

    .sos-load-progress {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .sos-load-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: rgba(255, 255, 255, 0.7);
      font-family: var(--matrix-heading);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .sos-load-track {
      height: 18px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.32);
    }

    .sos-load-fill {
      height: 100%;
      width: var(--sos-load-progress, 12%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--orange), var(--blue2));
      box-shadow: 0 0 22px rgba(255, 204, 77, 0.34);
      transition: width 760ms cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .sos-slot-skeleton {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 9px;
      padding: 11px;
      border: 1px solid rgba(120, 212, 255, 0.16);
      border-radius: 12px;
      background: rgba(4, 27, 45, 0.72);
    }

    .sos-slot-skeleton-day {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .sos-slot-skeleton-day h3 {
      color: rgba(255, 255, 255, 0.76);
      font-family: var(--matrix-heading);
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
    }

    .sos-slot-skeleton-line {
      min-height: 34px;
      border: 1px solid rgba(120, 212, 255, 0.18);
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.06), rgba(120, 212, 255, 0.18), rgba(255, 255, 255, 0.06));
      background-size: 220% 100%;
      animation: sos-load-shimmer 1.5s ease-in-out infinite;
    }

    .sos-slot-skeleton-line.is-open {
      border-color: rgba(61, 255, 154, 0.48);
      background: rgba(61, 255, 154, 0.12);
      box-shadow: 0 0 18px rgba(61, 255, 154, 0.08);
      animation: none;
    }

    .sos-load-foot {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .sos-load-error {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(255, 92, 122, 0.52);
      border-radius: 12px;
      background: rgba(80, 28, 42, 0.52);
    }

    .sos-load-error h3 {
      margin: 0 0 4px;
      font-family: var(--matrix-heading);
      font-size: 16px;
    }

    .sos-load-error p {
      margin: 0;
      color: rgba(255, 225, 230, 0.84);
      font-size: 13px;
      line-height: 1.42;
    }

    @keyframes sos-aurora-a {
      0% { transform: translateX(-80px) skewX(-4deg) scaleY(1); }
      100% { transform: translateX(100px) skewX(5deg) scaleY(1.4); }
    }

    @keyframes sos-aurora-b {
      0% { transform: translateX(70px) skewX(3deg) scaleY(0.9); }
      100% { transform: translateX(-90px) skewX(-6deg) scaleY(1.3); }
    }

    @keyframes sos-aurora-c {
      0% { transform: translateX(-50px) scaleX(1) scaleY(1); }
      100% { transform: translateX(80px) scaleX(1.2) scaleY(1.2); }
    }

    @keyframes sos-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes sos-load-shimmer {
      0% { background-position: 120% 0; }
      100% { background-position: -120% 0; }
    }

    @keyframes sos-glow-pulse {
      0% { opacity: 0.4; transform: scale(0.96); }
      100% { opacity: 0.88; transform: scale(1.08); }
    }

    @keyframes sos-tracker-pulse {
      0%, 100% { filter: brightness(1); box-shadow: inset 0 0 0 rgba(255, 255, 255, 0); }
      50% { filter: brightness(1.34); box-shadow: inset 0 0 24px rgba(255, 244, 180, 0.62); }
    }

    @keyframes sos-fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1100px) {
      .sos-grid-stats,
      .sos-grid-two,
      .sos-sched-book-shell,
      .sos-sched-discovery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 800px) {
      #schedule-root {
        --sidebar-w: 0px;
        display: block;
        width: 100%;
      }

      .sos-sidebar {
        position: relative;
        inset: auto;
        width: 100%;
        min-height: auto;
        padding: 16px 0;
      }

      .sos-main {
        margin-left: 0;
      }

      .sos-bg-layer {
        inset: 0;
      }

      .sos-content {
        padding: 24px 16px 44px;
      }

      .sos-page-title {
        font-size: 34px;
      }

      .sos-grid-stats,
      .sos-grid-two,
      .sos-sched-book-shell,
      .sos-sched-discovery,
      .sos-booking-fields,
      .sos-review-preferences,
      .sos-review-summary-grid,
      .sos-confirmation-grid,
      .sos-book-flow,
      .sos-sched-stepper,
      .sos-sched-week,
      .sos-load-head,
      .sos-load-error,
      .sos-slot-skeleton {
        grid-template-columns: 1fr;
      }

      .sos-load-shell {
        padding: 16px;
      }

      .sos-load-foot {
        justify-content: flex-start;
      }

      .sos-file-vault-callout {
        align-items: flex-start;
        flex-direction: column;
      }

      .sos-tracker-labels {
        display: none;
      }

      .sos-segment {
        min-height: 48px;
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      .sos-content {
        padding: 20px 12px 40px;
      }

      .sos-page-title {
        font-size: 30px;
      }

      .sos-toolbar .sos-btn {
        flex: 1 1 auto;
        padding-inline: 12px;
      }
    }

    .sos-page-transition {
      animation: sos-step-fade 0.25s ease;
    }
    @keyframes sos-step-fade {
      from { opacity: 0.7; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sos-step-slide-in {
      animation: sos-slide-in 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    @keyframes sos-slide-in {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .sos-step-slide-out {
      animation: sos-slide-out 0.2s ease forwards;
    }
    @keyframes sos-slide-out {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(-40px); }
    }

    .sos-week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .sos-week-label {
      font-family: var(--matrix-heading);
      font-size: 14px;
      font-weight: 700;
      color: var(--gold2);
      letter-spacing: 0.03em;
    }
    .sos-btn-sm {
      min-width: 36px;
      min-height: 36px;
      padding: 6px 12px;
      font-size: 13px;
    }
    .sos-view-toggle {
      display: flex;
      gap: 6px;
      margin: 8px 0;
    }
    .sos-view-toggle .is-active {
      border-color: rgba(243, 213, 118, 0.5) !important;
      background: rgba(217, 184, 91, 0.15);
    }
  </style>
</head>
<body>
  <div id="schedule-root" data-mode="standalone" data-api-base="/api/scheduler"></div>

  <script>
    (function () {
      "use strict";

      var scheduler = window.MMEDScheduler || {};
      var refs = {};
      var EASTERN_TIMEZONE = "America/New_York";
      var BOOKING_DIVISIONS = [
        {
          id: "non-member",
          name: "Non-Member",
          meetingCopy: "After booking, you'll receive an email with your consultation details. Your Matrix Calendar will also show this appointment on the scheduled date.",
          visits: [
            { slug: "consult-non-member", aliases: ["non-member-consult"], label: "Consult: Non-Member", mentors: ["dr-brian", "dr-j"] }
          ]
        },
        {
          id: "mission-residency",
          name: "Mission Residency",
          meetingCopy: "After booking, you'll receive an email with your session link. Your Matrix Calendar will also show this appointment on the scheduled date.",
          visits: [
            { slug: "mission-residency-1-on-1-advising", label: "1-on-1 Advising", mentors: ["dr-brian", "dr-s"] },
            { slug: "mission-residency-personal-statement", label: "Personal Statement", mentors: ["dr-brian", "dr-s"] },
            { slug: "mission-residency-1-on-1-mock-iv", label: "1-on-1 Mock IV", mentors: ["dr-brian", "dr-s"] },
            { slug: "mission-residency-eras-application-review", label: "ERAS Application Review", mentors: ["dr-brian", "dr-s"] },
            { slug: "mission-residency-small-group-advising", label: "Small Group Advising", mentors: ["dr-brian", "dr-s"] },
            { slug: "mission-residency-open-door-office-hours", label: "Open Door Office Hours", mentors: ["dr-brian", "dr-s"] }
          ]
        },
        {
          id: "exam-prep",
          name: "Exam Prep",
          meetingCopy: "After booking, you'll receive an email with your session link. Your Matrix Calendar will also show this appointment on the scheduled date.",
          visits: [
            { slug: "exam-prep-1-on-1-advising", label: "1-on-1 Advising", mentors: ["dr-j", "sophia"] },
            { slug: "exam-prep-small-group", label: "Small Group", mentors: ["dr-j", "sophia"] }
          ]
        }
      ];

      scheduler.state = {
        route: "book",
        bookingStep: 1,
        mode: "standalone",
        apiBase: "/api/scheduler",
        timezone: EASTERN_TIMEZONE,
        csrfToken: "",
        boot: null,
        bootError: "",
        notice: "",
        noticeError: false,
        loading: false,
        loadingError: "",
        loadingTransitionContext: "catalog",
        loadingTransitionStep: 0,
        loadingTransitionTimer: null,
        catalogLoading: false,
        appointmentsLoading: false,
        availabilityLoading: false,
        appointmentTypes: [],
        entitlements: null,
        providers: [],
        slots: [],
        selectedSlotKey: "",
        division: "",
        upcoming: [],
        history: [],
        bookingState: "Draft",
        bookingConfirmed: false,
        confirmedAppointment: null,
        confirmedMeeting: null,
        date: nextDateValue(),
        intake: "",
        emailOptIn: true,
        smsOptIn: false,
        smsPhone: "",
        slotView: "week"
      };

      function isLocalPreview() {
        return window.location && window.location.protocol === "file:";
      }

      function localPreviewAppointmentTypes() {
        return BOOKING_DIVISIONS.reduce(function (rows, division) {
          division.visits.forEach(function (visit) {
            rows.push({
              id: "preview-" + visit.slug,
              slug: visit.slug,
              name: visit.label,
              description: "",
              duration_minutes: 30,
              capacity: 1,
              group_enabled: false,
              meeting_mode: "manual",
              status: "active",
              active: true,
              entitlement: { status: "eligible", locked: false },
              metadata: { division: division.id },
              student_config: {
                instructions: "",
                intake_fields: [],
                payments: { required: false, mode: "none" },
                web_meetings: { provider: "manual", link_policy: "after_confirmation" }
              }
            });
          });
          return rows;
        }, []);
      }

      function localPreviewProviders() {
        return [
          { id: "preview-dr-brian", display_name: "Dr. Brian", name: "Dr. Brian", metadata: { provider_slug: "dr-brian" } },
          { id: "preview-dr-j", display_name: "Dr J", name: "Dr J", metadata: { provider_slug: "dr-j" } },
          { id: "preview-dr-s", display_name: "Dr S", name: "Dr S", metadata: { provider_slug: "dr-s" } },
          { id: "preview-sophia", display_name: "Sophia", name: "Sophia", metadata: { provider_slug: "sophia" } }
        ];
      }

      function localPreviewSlots() {
        var selected = new Date(scheduler.state.date + "T12:00:00.000Z");
        var slots = [];
        for (var offset = 1; offset <= 5; offset += 1) {
          var day = new Date(selected.getTime() + offset * 24 * 60 * 60 * 1000);
          if (day.getUTCDay() === 0 || day.getUTCDay() === 6) continue;
          ["11:00", "12:00", "13:00"].forEach(function (time) {
            var parts = time.split(":");
            var endHour = String(Math.min(23, Number(parts[0]) + 1)).padStart(2, "0");
            slots.push({
              id: "preview-slot-" + dateInputValue(day) + "-" + time,
              starts_at: dateInputValue(day) + "T" + time + ":00-04:00",
              ends_at: dateInputValue(day) + "T" + endHour + ":" + (parts[1] || "00") + ":00-04:00",
              provider_id: scheduler.state.providerId,
              appointment_type_id: scheduler.state.appointmentTypeId
            });
          });
        }
        return slots;
      }

      scheduler.components = {
        pageHeader: function (eyebrow, title, copy) {
          return [
            '<header class="sos-page-header">',
            '<span class="sos-eyebrow">' + escapeHTML(eyebrow) + "</span>",
            '<h1 class="sos-page-title">' + escapeHTML(title) + "</h1>",
            copy ? '<p class="sos-page-copy">' + escapeHTML(copy) + "</p>" : "",
            "</header>"
          ].join("");
        },

        statCard: function (value, label, tone, sublabel) {
          return [
            '<div class="sos-card sos-stat">',
            "<div>",
            '<span class="sos-stat-value" style="color:' + escapeAttr(tone || "var(--gold2)") + '">' + escapeHTML(value) + "</span>",
            '<span class="sos-stat-label">' + escapeHTML(label) + "</span>",
            sublabel ? '<span class="sos-stat-sub">' + escapeHTML(sublabel) + "</span>" : "",
            "</div>",
            "</div>"
          ].join("");
        },

        tracker: function (phase) {
          var phases = phase && Array.isArray(phase.phases) ? phase.phases : defaultSchedulePhase().phases;
          var currentIndex = phase && typeof phase.current_index === "number" ? phase.current_index : defaultSchedulePhase().current_index;
          var currentPhase = phases[currentIndex] || phases[0] || null;

          return [
            '<div class="sos-tracker-board sos-tracker sos-schedule-tracker" aria-label="Scheduler journey tracker">',
            '<div class="sos-tracker-top"><div>',
            '<div class="sos-tracker-title">Schedule<span>Journey</span></div>',
            '<div class="sos-tracker-copy">Completed segments turn green; your current booking step pulses orange.</div>',
            "</div></div>",
            '<div class="sos-tracker-labels" style="grid-template-columns:repeat(' + phases.length + ',1fr)">',
            phases.map(function (item) {
              return "<span>" + escapeHTML(item.name || item.id || "") + "</span>";
            }).join(""),
            "</div>",
            '<div class="sos-segment-bar sos-tracker-track" style="grid-template-columns:repeat(' + phases.length + ',1fr)">',
            phases.map(function (item, index) {
              var classes = ["sos-segment", "sos-tracker-segment"];
              // data-tracker-step allows clicking segments to jump to that step
              if (item.complete) {
                classes.push("is-complete");
              } else if (index === currentIndex) {
                classes.push("is-active");
              }
              return '<div class="' + classes.join(" ") + '" data-tracker-step="' + (index + 1) + '">' + (index + 1) + "</div>";
            }).join(""),
            "</div>",
            '<div class="sos-status-strip">Current step: <strong>' + escapeHTML(currentPhase ? currentPhase.name || currentPhase.id : "Assigned") + "</strong></div>",
            "</div>"
          ].join("");
        },

        loading: function (label) {
          return '<div class="sos-loading">' + escapeHTML(label || "Loading schedule data...") + "</div>";
        },

        slotGridLoading: function (options) {
          options = options || {};
          var step = loadingStep(options.context || scheduler.state.loadingTransitionContext || "catalog");
          var progress = String(step.percent || 12);
          var error = options.error || scheduler.state.loadingError;
          var title = error ? "Loading needs attention" : step.title;
          var message = error ? (scheduler.state.loadingError || "We could not finish loading appointment options.") : loadingMessage(step);
          var status = error ? "Needs attention" : (Number(progress) >= 96 ? "Almost ready" : "Loading");
          return [
            '<div class="sos-load-shell" data-sos-loading-shell aria-live="polite" style="--sos-load-progress:' + escapeAttr(progress) + '%">',
            '<div class="sos-load-head">',
            "<div>",
            '<p class="sos-load-kicker" data-sos-load-kicker>' + escapeHTML(step.kicker || "Loading appointment options") + "</p>",
            '<h2 class="sos-load-title" data-sos-load-title>' + escapeHTML(title) + "</h2>",
            '<p class="sos-load-message" data-sos-load-message>' + escapeHTML(message) + "</p>",
            "</div>",
            '<div class="sos-load-progress">',
            '<div class="sos-load-meta"><span data-sos-load-percent>' + escapeHTML(progress) + '%</span><span data-sos-load-state>' + escapeHTML(status) + '</span></div>',
            '<div class="sos-load-track"><div class="sos-load-fill"></div></div>',
            "</div>",
            "</div>",
            slotSkeletonMarkup(),
            error ? loadingErrorMarkup() : '<div class="sos-load-foot"><span class="sos-pill sos-tier-medium">Eastern / New York</span></div>',
            "</div>"
          ].join("");
        },

        empty: function (title, copy) {
          return [
            '<div class="sos-empty sos-empty-rich">',
            '<div class="sos-empty-icon">Sc</div>',
            '<h3>' + escapeHTML(title) + "</h3>",
            '<p>' + escapeHTML(copy || "") + "</p>",
            "</div>"
          ].join("");
        }
      };

      scheduler.api = {
        request: function (path, options) {
          options = options || {};
          var headers = {
            Accept: "application/json"
          };
          if (options.body) {
            headers["Content-Type"] = "application/json";
          }
          if (scheduler.state.csrfToken) {
            headers["x-mmhq-csrf"] = scheduler.state.csrfToken;
          }
          return fetch(scheduler.state.apiBase + path, {
            method: options.method || "GET",
            headers: headers,
            body: options.body ? JSON.stringify(options.body) : undefined,
            credentials: "same-origin"
          }).then(function (response) {
            return response.json().catch(function () {
              return {};
            }).then(function (payload) {
              return response.ok ? payload : Object.assign({ ok: false, status: response.status }, payload);
            });
          }).catch(function (error) {
            return { ok: false, error: "network_error", message: error.message };
          });
        },

        get: function (path) {
          return this.request(path);
        },

        post: function (path, body) {
          return this.request(path, { method: "POST", body: body || {} });
        }
      };

      scheduler.mount = function (config) {
        config = config || {};
        stopLoadingTransition();
        refs.root = typeof config.target === "string" ? document.querySelector(config.target) : config.target;
        if (!refs.root) {
          refs.root = document.getElementById("schedule-root");
        }
        if (!refs.root) {
          return;
        }

        scheduler.state.mode = config.mode || refs.root.getAttribute("data-mode") || "standalone";
        scheduler.state.apiBase = config.apiBase || refs.root.getAttribute("data-api-base") || "/api/scheduler";

        if (scheduler.state.mode === "embedded") {
          refs.content = refs.root;
          refs.root.classList.add("sos-schedule-embedded");
        } else {
          refs.root.innerHTML = standaloneShell();
          refs.sidebar = refs.root.querySelector("[data-scheduler-sidebar]");
          refs.content = refs.root.querySelector("[data-scheduler-content]");
        }

        scheduler.router.start();
        scheduler.bootstrap();
      };

      scheduler.router = {
        start: function () {
          if (scheduler.state.mode === "standalone") {
            window.addEventListener("hashchange", scheduler.router.route);
            scheduler.router.route();
          } else {
            scheduler.render.page(scheduler.state.route);
          }
        },

        route: function () {
          var route = window.location.hash.replace(/^#\/?/, "") || scheduler.state.route || "book";
          var allowed = ["book", "upcoming", "history"];
          if (allowed.indexOf(route) === -1) {
            route = "book";
          }
          scheduler.state.route = route;
          scheduler.render.sidebar();
          scheduler.render.page(route);
        },

        go: function (route) {
          if (scheduler.state.mode === "standalone") {
            window.location.hash = route;
          } else {
            scheduler.state.route = route;
            scheduler.render.page(route);
          }
        }
      };

      scheduler.bootstrap = function () {
        scheduler.state.loading = true;
        scheduler.state.loadingError = "";
        startLoadingTransition("catalog");
        scheduler.render.page(scheduler.state.route);
        loadAuthSession().then(function () {
          return scheduler.api.get("/bootstrap");
        }).then(function (boot) {
          scheduler.state.boot = boot.ok ? boot.data : null;
          scheduler.state.entitlements = boot.ok && boot.data && boot.data.config ? boot.data.config.entitlements || scheduler.state.entitlements : scheduler.state.entitlements;
          scheduler.state.bootError = boot.ok || isLocalPreview() ? "" : boot.message || boot.error || "Scheduler is not available yet.";
          scheduler.render.sidebar();
          return loadAll();
        }).then(function () {
          scheduler.state.loading = false;
          stopLoadingTransition();
          scheduler.render.sidebar();
          scheduler.render.page(scheduler.state.route);
        }).catch(function (error) {
          scheduler.state.loading = false;
          scheduler.state.catalogLoading = false;
          scheduler.state.appointmentsLoading = false;
          scheduler.state.loadingError = error && error.message ? error.message : "Scheduler data did not load. Please retry.";
          stopLoadingTransition();
          scheduler.render.page(scheduler.state.route);
        });
      };

      scheduler.render = {
        sidebar: function () {
          if (!refs.sidebar) {
            return;
          }
          refs.sidebar.innerHTML = [
            '<div class="sos-brand">',
            '<div class="sos-brand-mark">MM</div>',
            '<div class="sos-brand-title">Matrix<small>MissionMed</small></div>',
            "</div>",
            '<div class="sos-nav-section">',
            '<div class="sos-nav-label">Planning</div>',
            '<ul class="sos-nav-list">',
            navLink("book", "Book", "Bk", ""),
            navLink("upcoming", "Upcoming", "Up", scheduler.state.upcoming.length),
            navLink("history", "History", "Hi", scheduler.state.history.length),
            "</ul>",
            "</div>",
            '<div class="sos-nav-section">',
            '<div class="sos-nav-label">Account</div>',
            '<ul class="sos-nav-list">',
            '<li><span class="sos-nav-link"><span class="sos-nav-icon">TZ</span><span>' + escapeHTML(scheduler.state.timezone) + "</span></span></li>",
            "</ul>",
            "</div>",
            '<div class="sos-sidebar-footer">',
            '<div class="sos-panel-copy">' + escapeHTML(sidebarStatus()) + "</div>",
            "</div>"
          ].join("");

          refs.sidebar.querySelectorAll("[data-route]").forEach(function (link) {
            link.addEventListener("click", function (event) {
              event.preventDefault();
              scheduler.router.go(link.getAttribute("data-route"));
            });
          });
        },

        page: function (route) {
          if (!refs.content) {
            return;
          }
          if (scheduler.state.loading || scheduler.state.loadingError) {
            refs.content.innerHTML = [
              '<section class="sos-page">',
              scheduler.components.pageHeader("Planning", "Book a Session", "Select your division, choose a mentor, then reserve a published time."),
              scheduler.components.tracker(defaultSchedulePhase()),
              scheduler.components.slotGridLoading({ context: scheduler.state.loadingTransitionContext || "catalog", error: scheduler.state.loadingError }),
              "</section>"
            ].join("");
            bindLoadingControls();
            return;
          }
          if (route === "upcoming") {
            renderUpcoming();
          } else if (route === "history") {
            renderHistory();
          } else {
            renderBook();
          }
          var page = refs.content.querySelector(".sos-page");
          if (page) {
            page.classList.remove("sos-page-transition");
            void page.offsetWidth;
            page.classList.add("sos-page-transition");
          }
          bindCurrentView();
        }
      };

      function renderBookingStepOnly() {
        var flow = refs.content ? refs.content.querySelector(".sos-book-flow") : null;
        if (!flow) {
          scheduler.render.page(scheduler.state.route);
          return;
        }
        flow.innerHTML = activeBookingStepMarkup();
        flow.classList.remove("sos-page-transition");
        void flow.offsetWidth;
        flow.classList.add("sos-page-transition");
        bindCurrentView();
      }

      function standaloneShell() {
        return [
          '<aside class="sos-sidebar" data-scheduler-sidebar></aside>',
          '<main class="sos-main">',
          '<div class="sos-bg-layer"><div class="sos-bg sos-bg-a"></div><div class="sos-bg sos-bg-b"></div><div class="sos-bg sos-bg-c"></div></div>',
          '<div class="sos-content" data-scheduler-content></div>',
          "</main>"
        ].join("");
      }

      function renderBook() {
        refs.content.innerHTML = [
          '<section class="sos-page">',
          scheduler.components.pageHeader("Planning", "Book a Session", "Select your division, choose a mentor, then reserve a published time."),
          scheduler.components.tracker(scheduleTrackerPhase()),
          noticeMarkup(),
          '<div class="sos-book-flow">',
          activeBookingStepMarkup(),
          "</div>",
          "</section>"
        ].join("");
      }

      function renderUpcoming() {
        refs.content.innerHTML = [
          '<section class="sos-page">',
          scheduler.components.pageHeader("Planning", "Upcoming Appointments", "Review scheduled sessions without exposing staff-only notes."),
          scheduler.components.tracker(upcomingTrackerPhase()),
          statsGrid(),
          tabsMarkup(),
          noticeMarkup(),
          '<div class="sos-card sos-card-pad">',
          '<div class="sos-panel-title">Student calendar</div>',
          '<h2 class="sos-panel-heading">Upcoming</h2>',
          listMarkup(scheduler.state.upcoming, "No upcoming appointments", "Accepted sessions will appear here after the scheduler API confirms them.", false),
          "</div>",
          "</section>"
        ].join("");
      }

      function renderHistory() {
        refs.content.innerHTML = [
          '<section class="sos-page">',
          scheduler.components.pageHeader("Planning", "Appointment History", "Past sessions and canceled requests stay separated from the booking flow."),
          scheduler.components.tracker(historyTrackerPhase()),
          statsGrid(),
          tabsMarkup(),
          noticeMarkup(),
          '<div class="sos-card sos-card-pad">',
          '<div class="sos-panel-title">Completed and closed</div>',
          '<h2 class="sos-panel-heading">History</h2>',
          listMarkup(scheduler.state.history, "No appointment history", "Closed sessions will appear here after the scheduler API returns them.", true),
          "</div>",
          "</section>"
        ].join("");
      }

      function activeBookingStepMarkup() {
        if (scheduler.state.bookingConfirmed) {
          return confirmationStep();
        }
        if (scheduler.state.bookingStep === 2) {
          return chooseTimeStep();
        }
        if (scheduler.state.bookingStep === 3) {
          return reviewConfirmStep();
        }
        return selectDetailsStep();
      }

      function selectDetailsStep() {
        var type = selectedAppointmentType();
        var canContinue = Boolean(scheduler.state.division && scheduler.state.appointmentTypeId && scheduler.state.providerId && !isTypeLocked(type));
        return [
          '<form class="sos-card sos-card-pad" data-booking-form>',
          '<div class="sos-booking-fields">',
          divisionSelectMarkup(),
          scheduler.state.division ? visitTypeSelectMarkup() : "",
          scheduler.state.appointmentTypeId ? mentorSelectMarkup() : "",
          "</div>",
          scheduler.state.catalogLoading ? '<div class="sos-notice"><strong>Loading appointment options</strong><span>Program options are loading from the Scheduler API.</span></div>' : "",
          scheduler.state.division && !visitTypeOptions().length ? noVisitTypesNoticeMarkup() : "",
          lockedTypeNoticeMarkup(type),
          '<div class="sos-form-actions">',
          '<button class="sos-btn sos-btn-primary" type="button" data-action="next-step"' + (canContinue ? "" : " disabled") + ">Next</button>",
          '<span class="sos-pill sos-tier-medium">Eastern / New York</span>',
          "</div>",
          "</form>"
        ].join("");
      }

      function chooseTimeStep() {
        var canContinue = Boolean(selectedSlot());
        return [
          '<section class="sos-card sos-card-pad">',
          '<div class="sos-panel-title">Choose Time Slot</div>',
          '<h2 class="sos-panel-heading">Choose Available Time Slot</h2>',
          '<p class="sos-panel-copy">Showing a weekly grid of published openings in Eastern / New York.</p>',
          scheduler.state.availabilityLoading ? scheduler.components.slotGridLoading({ context: "availability" }) : weekGridMarkup(),
          scheduler.state.availabilityLoading ? "" : selectedSlotSummaryMarkup(),
          '<div class="sos-form-actions">',
          '<button class="sos-btn" type="button" data-action="previous-step">Back</button>',
          '<button class="sos-btn sos-btn-primary" type="button" data-action="next-step"' + (canContinue && !scheduler.state.availabilityLoading ? "" : " disabled") + ">Next</button>",
          '<button class="sos-btn" type="button" data-action="refresh"' + (scheduler.state.availabilityLoading ? " disabled" : "") + ">Refresh</button>",
          "</div>",
          "</section>"
        ].join("");
      }

      function confirmationStep() {
        var appointment = scheduler.state.confirmedAppointment || {};
        var meeting = scheduler.state.confirmedMeeting || {};
        var meetingUrl = confirmedMeetingUrl(appointment, meeting);
        return [
          '<section class="sos-card sos-card-pad sos-confirmation-card">',
          '<div class="sos-confirmation-hero">',
          '<span class="sos-confirmation-check">✓</span>',
          '<div><div class="sos-panel-title">Session Confirmed</div>',
          '<h2 class="sos-panel-heading">Your session is booked</h2>',
          '<p class="sos-panel-copy">We reserved your time and added it to your Matrix schedule.</p></div>',
          '</div>',
          '<div class="sos-confirmation-grid">',
          '<div class="sos-confirmation-panel"><h3>Appointment summary</h3>' + confirmedSummaryRows(appointment) + '</div>',
          '<div class="sos-confirmation-panel"><h3>Meeting link</h3>' + confirmedMeetingMarkup(meetingUrl) + '</div>',
          '</div>',
          '<div class="sos-file-vault-callout">',
          '<div><strong>Have files for your mentor?</strong><span>Upload drafts, score reports, notes, screenshots, or prep documents in Matrix File Vault before the session.</span></div>',
          '<a class="sos-btn sos-btn-primary" href="/member-dashboard/#filevault">Open File Vault</a>',
          '</div>',
          '<div class="sos-form-actions sos-confirmation-actions">',
          '<a class="sos-btn" href="/member-dashboard/#calendar">View Calendar</a>',
          '<button class="sos-btn" type="button" data-action="reset-booking">Book another session</button>',
          '</div>',
          '</section>'
        ].join("");
      }

      function confirmedSummaryRows(appointment) {
        var type = selectedAppointmentType();
        var provider = selectedProvider();
        var slot = selectedSlot();
        var start = appointment.start_at || appointment.startAt || (slot ? slotStart(slot) : "");
        var duration = appointment.duration_minutes || appointment.duration || (type ? type.duration_minutes || type.duration || 60 : 60);
        var rows = [
          ["Program / Division", selectedDivisionName() || "MissionMed"],
          ["Appointment type", appointment.appointment_type_name || selectedVisitLabel() || (type ? type.name || type.title || type.id : "Session")],
          ["Mentor", appointment.provider_name || (provider ? provider.display_name || provider.name || provider.id : "Mentor")],
          ["Date and time", start ? formatDateTime(start) : "Confirmed"],
          ["Duration", String(duration) + " minutes"],
          ["Reminders", reminderLabel()]
        ];
        return reviewSummaryCards(rows);
      }

      function confirmedMeetingUrl(appointment, meeting) {
        var nested = appointment && appointment.meeting ? appointment.meeting : {};
        var candidates = [
          meeting && meeting.meeting_url,
          meeting && meeting.meetingUrl,
          meeting && meeting.join_url,
          meeting && meeting.joinUrl,
          meeting && meeting.webex_url,
          meeting && meeting.webexUrl,
          meeting && meeting.zoom_url,
          meeting && meeting.zoomUrl,
          appointment && appointment.meeting_url,
          appointment && appointment.meetingUrl,
          appointment && appointment.join_url,
          appointment && appointment.joinUrl,
          appointment && appointment.webex_url,
          appointment && appointment.webexUrl,
          appointment && appointment.zoom_url,
          appointment && appointment.zoomUrl,
          nested && nested.meeting_url,
          nested && nested.join_url,
          nested && nested.webex_url,
          nested && nested.zoom_url
        ];
        for (var i = 0; i < candidates.length; i += 1) {
          var url = String(candidates[i] || "").trim();
          if (/^https?:\/\//i.test(url)) {
            return url;
          }
        }
        return "";
      }

      function confirmedMeetingMarkup(meetingUrl) {
        if (meetingUrl) {
          return [
            '<p class="sos-panel-copy">Your meeting link is ready.</p>',
            '<a class="sos-btn sos-btn-primary" href="' + escapeAttr(meetingUrl) + '" target="_blank" rel="noopener">Open meeting link</a>'
          ].join("");
        }
        return [
          '<p class="sos-panel-copy">Your meeting link is being generated. It will appear in Matrix Calendar and your confirmation email as soon as provisioning finishes.</p>',
          '<a class="sos-btn" href="/member-dashboard/#calendar">Check Calendar</a>'
        ].join("");
      }

      function reviewConfirmStep() {
        var type = selectedAppointmentType();
        var provider = selectedProvider();
        var slot = selectedSlot();
        var canConfirm = Boolean(type && provider && slot);
        return [
          '<section class="sos-card sos-card-pad">',
          '<div class="sos-panel-title">Review & Confirm</div>',
          '<h2 class="sos-panel-heading">Confirm your session</h2>',
          '<p class="sos-panel-copy">Review the details before we reserve the time through the MissionMed scheduler.</p>',
          selectedSummaryRows(true),
          reviewPreferencesMarkup(type),
          '<div class="sos-meeting-note">' + escapeHTML(meetingExpectationCopy()) + '</div>',
          '<div class="sos-sched-help">You can request a change later from your appointment list when reschedule or cancellation rules allow it.</div>',
          '<div class="sos-form-actions">',
          '<button class="sos-btn" type="button" data-action="previous-step">Back</button>',
          '<button class="sos-btn sos-btn-primary" type="button" data-action="confirm-booking"' + (canConfirm ? "" : " disabled") + ">Confirm session</button>",
          '<span class="sos-pill sos-tier-medium">' + escapeHTML(scheduler.state.bookingState) + "</span>",
          "</div>",
          "</section>"
        ].join("");
      }

      function selectedSummaryRows(full) {
        var type = selectedAppointmentType();
        var provider = selectedProvider();
        var slot = selectedSlot();
        var rows = [
          ["Program / Division", selectedDivisionName() || "Choose a program"],
          ["Appointment type", selectedVisitLabel() || (type ? type.name || type.title || type.id : "Not selected")],
          ["Mentor", provider ? provider.display_name || provider.name || provider.id : "Not selected"],
          ["Date and time", slot ? formatDateTime(slotStart(slot)) : "Choose an available slot"],
          ["Duration", type ? String(type.duration_minutes || type.duration || 60) + " minutes" : "Set by visit type"],
          ["Reminders", reminderLabel()]
        ];
        if (full) {
          rows.push(["Capacity", capacityLabel(type)]);
          rows.push(["Meeting", meetingLabel(type)]);
          rows.push(["Payment", paymentLabel(type)]);
        }
        return reviewSummaryCards(rows);
      }

      function reviewSummaryCards(rows) {
        return '<div class="sos-review-summary-grid">' + rows.map(function (row) {
          return '<div class="sos-review-summary-card"><span>' + escapeHTML(row[0]) + '</span><strong>' + escapeHTML(row[1]) + "</strong></div>";
        }).join("") + "</div>";
      }

      function avatarPairMarkup(provider) {
        var user = scheduler.state.boot && scheduler.state.boot.user ? scheduler.state.boot.user : {};
        var studentLabel = user.display_name || user.email || "You";
        var mentorLabel = provider ? provider.display_name || provider.name || "Mentor" : "Mentor";
        return [
          '<div class="sos-avatar-pair" aria-label="Student and mentor avatars">',
          '<div class="sos-avatar" title="' + escapeAttr(studentLabel) + '">' + escapeHTML(initials(studentLabel || "You")) + "</div>",
          '<div class="sos-avatar-link" aria-hidden="true"></div>',
          '<div class="sos-avatar is-mentor" title="' + escapeAttr(mentorLabel) + '">' + escapeHTML(initials(mentorLabel || "Mentor")) + "</div>",
          "</div>"
        ].join("");
      }

      function divisionSelectMarkup() {
        var enabled = visibleBookingDivisions();
        return [
          '<div class="sos-field">',
          '<label for="schedule-division">MissionMed Program / Division</label>',
          '<select id="schedule-division" name="division">',
          '<option value="">Choose a program</option>',
          enabled.map(function (division) {
            return '<option value="' + escapeAttr(division.id) + '"' + (scheduler.state.division === division.id ? " selected" : "") + ">" + escapeHTML(division.name) + "</option>";
          }).join(""),
          "</select>",
          "</div>"
        ].join("");
      }

      function visitTypeSelectMarkup() {
        var options = visitTypeOptions();
        return [
          '<div class="sos-field">',
          '<label for="schedule-appointment-type">Type of appointment</label>',
          '<select id="schedule-appointment-type" name="appointment-type">',
          '<option value="">Choose appointment type</option>',
          options.map(function (option) {
            var locked = isTypeLocked(option.type);
            var suffix = locked ? " · locked" : entitlementSuffix(option.type);
            return '<option value="' + escapeAttr(option.type.id) + '"' + (scheduler.state.appointmentTypeId === option.type.id ? " selected" : "") + (locked ? " disabled" : "") + ">" + escapeHTML(option.label + suffix) + "</option>";
          }).join(""),
          "</select>",
          "</div>"
        ].join("");
      }

      function noVisitTypesNoticeMarkup() {
        return '<div class="sos-notice"><strong>No visit types loaded</strong><span>Refresh the Scheduler, or open it from Matrix so it can use the authenticated Scheduler API.</span></div>';
      }

      function lockedTypeNoticeMarkup(type) {
        var entitlement = type && type.entitlement ? type.entitlement : null;
        if (!entitlement || entitlement.locked !== true) {
          return "";
        }
        return '<div class="sos-notice"><strong>Locked for this account</strong><span>' + escapeHTML(entitlement.message || "This visit type needs a matching MissionMed enrollment.") + "</span></div>";
      }

      function entitlementNoticeMarkup() {
        var entitlements = scheduler.state.entitlements || {};
        var policy = entitlements.policy || {};
        var selected = selectedAppointmentType();
        var selectedEntitlement = selected && selected.entitlement ? selected.entitlement : null;
        if (selectedEntitlement && selectedEntitlement.locked) {
          return '<div class="sos-notice"><strong>Locked for this account</strong><span>' + escapeHTML(selectedEntitlement.message || "This visit type needs a matching MissionMed enrollment.") + "</span></div>";
        }
        if (entitlements.facts_configured) {
          return '<div class="sos-notice"><strong>Enrollment verified</strong><span>Your Scheduler options are based on server-side MissionMed enrollment facts.</span></div>';
        }
        if (policy.non_member_consult_enabled) {
          return '<div class="sos-notice"><strong>Registered access</strong><span>All registered users can book Consult: Non-Member. Residency and Exam Prep options require matching enrollment.</span></div>';
        }
        return "";
      }

      function mentorSelectMarkup() {
        var options = mentorOptions();
        return [
          '<div class="sos-field">',
          '<label for="schedule-provider">Mentor</label>',
          '<select id="schedule-provider" name="provider">',
          '<option value="">Choose a mentor</option>',
          options.map(function (option) {
            var suffix = option.availableSoon ? " · availability coming soon" : "";
            return '<option value="' + escapeAttr(option.provider.id) + '"' + (scheduler.state.providerId === option.provider.id ? " selected" : "") + ">" + escapeHTML(option.label + suffix) + "</option>";
          }).join(""),
          "</select>",
          "</div>"
        ].join("");
      }

      function typeInstructionsMarkup(type) {
        var config = type && type.student_config ? type.student_config : {};
        var instructions = config.instructions || type && type.description || "";
        if (!instructions) {
          return "";
        }
        return '<div class="sos-notice"><strong>Visit instructions</strong><span>' + escapeHTML(instructions) + "</span></div>";
      }

      function intakeFieldsMarkup(type) {
        var fields = studentIntakeFields(type);
        if (!fields.length) {
          return "";
        }
        return '<div class="sos-sched-list">' + fields.map(function (field) {
          var key = field.field_key || field.id || "";
          var required = field.required ? " required" : "";
          var label = escapeHTML(field.label || key || "Question") + (field.required ? " *" : "");
          if (field.field_type === "textarea") {
            return '<div class="sos-field"><label for="intake-' + escapeAttr(key) + '">' + label + '</label><textarea id="intake-' + escapeAttr(key) + '" data-intake-field="' + escapeAttr(key) + '" data-required="' + String(field.required === true) + '"' + required + "></textarea></div>";
          }
          return '<div class="sos-field"><label for="intake-' + escapeAttr(key) + '">' + label + '</label><input class="sos-input" id="intake-' + escapeAttr(key) + '" data-intake-field="' + escapeAttr(key) + '" data-required="' + String(field.required === true) + '" type="' + escapeAttr(inputType(field.field_type)) + '"' + required + "></div>";
        }).join("") + "</div>";
      }

      function studentIntakeFields(type) {
        return type && type.student_config && Array.isArray(type.student_config.intake_fields)
          ? type.student_config.intake_fields
          : [];
      }

      function reviewPreferencesMarkup(type) {
        var payment = type && type.student_config && type.student_config.payments ? type.student_config.payments : {};
        return [
          '<div class="sos-review-preferences">',
          '<div class="sos-field"><label for="schedule-intake">Notes</label><textarea id="schedule-intake" name="intake" placeholder="Anything you want your mentor to know before the session">' + escapeHTML(scheduler.state.intake) + "</textarea></div>",
          '<div class="sos-compact-options">',
          '<label class="sos-compact-check" for="schedule-email-opt-in"><span>Email reminder</span><input type="checkbox" id="schedule-email-opt-in" ' + (scheduler.state.emailOptIn ? "checked" : "") + '></label>',
          '<label class="sos-compact-check" for="schedule-sms-opt-in"><span>Text reminder</span><input type="checkbox" id="schedule-sms-opt-in" ' + (scheduler.state.smsOptIn ? "checked" : "") + '></label>',
          scheduler.state.smsOptIn ? '<div class="sos-field"><label for="schedule-sms-phone">Reminder phone</label><input class="sos-input" id="schedule-sms-phone" name="sms_phone" type="tel" autocomplete="tel" value="' + escapeAttr(scheduler.state.smsPhone) + '" placeholder="Optional phone number"></div>' : "",
          payment.required ? '<div class="sos-notice"><strong>Payment required</strong><span>Paid visit types wait for server-verified Stripe confirmation before booking.</span></div>' : "",
          "</div>",
          "</div>"
        ].join("");
      }

      function inputType(fieldType) {
        if (["email", "date", "number", "tel", "phone"].indexOf(fieldType) >= 0) return fieldType === "phone" ? "tel" : fieldType;
        return "text";
      }

      function capacityLabel(type) {
        if (!type) return "Set by visit type";
        var config = type.student_config && type.student_config.capacity ? type.student_config.capacity : {};
        var count = config.capacity || type.capacity || 1;
        return (type.group_enabled || config.mode === "group") ? "Group, " + count + " seats" : "Individual";
      }

      function meetingLabel(type) {
        if (!type) return "Link appears after confirmation";
        var meeting = type.student_config && type.student_config.web_meetings ? type.student_config.web_meetings : {};
        var provider = meeting.provider || type.meeting_mode || "manual";
        if (provider === "none") return "No meeting link";
        if (provider === "manual") return "Manual link after confirmation";
        return provider.replace("_", " ") + " after confirmation";
      }

      function paymentLabel(type) {
        if (!type) return "No payment step";
        var payment = type.student_config && type.student_config.payments ? type.student_config.payments : {};
        if (payment.required) return payment.status === "configured" ? "Payment required" : "Payment required, not configured";
        if (payment.mode === "optional") return "Optional payment";
        return "No payment required";
      }

      function reminderLabel() {
        if (scheduler.state.smsOptIn) return "Email and SMS";
        if (scheduler.state.emailOptIn) return "Email";
        return "Off";
      }

      function selectedDivision() {
        return BOOKING_DIVISIONS.find(function (division) {
          return division.id === scheduler.state.division;
        }) || null;
      }

      function visibleBookingDivisions() {
        var available = scheduler.state.entitlements && Array.isArray(scheduler.state.entitlements.available_divisions)
          ? scheduler.state.entitlements.available_divisions
          : [];
        if (!available.length) {
          return BOOKING_DIVISIONS;
        }
        var allowed = new Set(available);
        return BOOKING_DIVISIONS.filter(function (division) {
          return allowed.has(division.id) || hasDivisionTypes(division);
        });
      }

      function hasDivisionTypes(division) {
        return division.visits.some(function (visit) {
          return Boolean(appointmentTypeByVisit(visit, division));
        });
      }

      function selectedDivisionName() {
        var division = selectedDivision();
        return division ? division.name : "";
      }

      function selectedVisitConfig() {
        var division = selectedDivision();
        if (!division) return null;
        var type = selectedAppointmentType();
        return division.visits.find(function (visit) {
          return type && appointmentTypeMatchesVisit(type, visit, division);
        }) || null;
      }

      function selectedVisitLabel() {
        var visit = selectedVisitConfig();
        return visit ? visit.label : "";
      }

      function visitTypeOptions() {
        var division = selectedDivision();
        if (!division) return [];
        return division.visits.map(function (visit) {
          var type = appointmentTypeByVisit(visit, division);
          return type ? { label: visit.label, visit: visit, type: type } : null;
        }).filter(Boolean);
      }

      function isTypeLocked(type) {
        return Boolean(type && type.entitlement && type.entitlement.locked === true);
      }

      function entitlementSuffix(type) {
        var entitlement = type && type.entitlement ? type.entitlement : {};
        if (entitlement.status === "eligible") return " · included";
        if (entitlement.status === "server_facts_pending") return " · enrollment checked at booking";
        return "";
      }

      function mentorOptions() {
        var visit = selectedVisitConfig();
        if (!visit) return [];
        return visit.mentors.map(function (slug) {
          var provider = providerBySlug(slug);
          if (!provider) return null;
          return {
            label: provider.display_name || provider.name || mentorNameFromSlug(slug),
            provider: provider,
            availableSoon: slug === "dr-s" || slug === "sophia"
          };
        }).filter(Boolean);
      }

      function appointmentTypeBySlug(slug) {
        return scheduler.state.appointmentTypes.find(function (row) {
          return appointmentTypeSlugCandidates(row).some(function (candidate) {
            return normalizeSlug(candidate) === normalizeSlug(slug);
          });
        }) || null;
      }

      function appointmentTypeByVisit(visit, division) {
        return scheduler.state.appointmentTypes.find(function (row) {
          return appointmentTypeMatchesVisit(row, visit, division);
        }) || null;
      }

      function appointmentTypeMatchesVisit(row, visit, division) {
        var visitCandidates = visitSlugCandidates(visit).map(normalizeSlug).filter(Boolean);
        var rowCandidates = appointmentTypeSlugCandidates(row).map(normalizeSlug).filter(Boolean);
        if (rowCandidates.some(function (candidate) { return visitCandidates.indexOf(candidate) >= 0; })) {
          return true;
        }
        var visitLabel = normalizeSlug(visit && visit.label);
        var rowLabels = appointmentTypeLabelCandidates(row).map(normalizeSlug).filter(Boolean);
        return Boolean(visitLabel && rowLabels.indexOf(visitLabel) >= 0 && appointmentTypeDivisionMatches(row, division));
      }

      function visitSlugCandidates(visit) {
        return [visit && visit.slug].concat(Array.isArray(visit && visit.aliases) ? visit.aliases : []).filter(Boolean);
      }

      function appointmentTypeSlugCandidates(row) {
        var metadata = row && row.metadata && typeof row.metadata === "object" ? row.metadata : {};
        var config = row && row.student_config && typeof row.student_config === "object" ? row.student_config : {};
        return [
          row && row.slug,
          row && row.appointment_type_slug,
          row && row.appointmentTypeSlug,
          row && row.type_slug,
          metadata.slug,
          metadata.appointment_type_slug,
          config.slug,
          config.appointment_type_slug
        ].filter(Boolean);
      }

      function appointmentTypeLabelCandidates(row) {
        return [row && row.label, row && row.title, row && row.name, row && row.display_name].filter(Boolean);
      }

      function appointmentTypeDivisionMatches(row, division) {
        if (!division) return true;
        var metadata = row && row.metadata && typeof row.metadata === "object" ? row.metadata : {};
        var config = row && row.student_config && typeof row.student_config === "object" ? row.student_config : {};
        var candidates = [
          row && row.division,
          row && row.division_key,
          row && row.division_slug,
          row && row.category,
          metadata.division,
          metadata.division_key,
          metadata.category,
          config.division,
          config.division_key
        ].map(normalizeSlug).filter(Boolean);
        if (!candidates.length) return true;
        var divisionKeys = [division.id, division.name].map(normalizeSlug);
        return candidates.some(function (candidate) {
          return divisionKeys.indexOf(candidate) >= 0;
        });
      }

      function normalizeSlug(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/&/g, " and ")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function providerBySlug(slug) {
        return scheduler.state.providers.find(function (provider) {
          return providerSlug(provider) === String(slug || "");
        }) || null;
      }

      function providerSlug(provider) {
        var metadata = provider && provider.metadata && typeof provider.metadata === "object" ? provider.metadata : {};
        var explicit = metadata.provider_slug || metadata.slug || "";
        if (explicit) return String(explicit).trim();
        return String(provider && (provider.slug || provider.display_name || provider.name || "") || "")
          .toLowerCase()
          .replace(/dr\.?\s*/g, "dr-")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function mentorNameFromSlug(slug) {
        if (slug === "dr-brian") return "Dr. Brian";
        if (slug === "dr-j") return "Dr J";
        if (slug === "dr-s") return "Dr S";

      function loadingSteps() {
        return [
          { title: "Checking scheduling access", message: "Checking your session and Scheduler access.", percent: 12, kicker: "Loading appointment options" },
          { title: "Loading appointment options", message: "Checking the appointment types available to this account.", percent: 34, kicker: "Loading appointment options" },
          { title: "Checking mentor availability", message: safeAppointmentSearchSubject, percent: 58, kicker: "Mentor availability" },
          { title: "Searching available openings", message: "Preparing the next available days in the Scheduler panel.", percent: 82, kicker: "Published openings" },
          { title: "Building your weekly slot grid", message: "Building the weekly time-slot view from available openings.", percent: 96, kicker: "Slot grid" }
        ];

      function loadingStep(context) {
        var steps = loadingSteps();
        var index = Math.min(Math.max(Number(scheduler.state.loadingTransitionStep || 0), 0), steps.length - 1);
        if (context === "availability" && index < 2) {
          index = Math.min(3, steps.length - 1);
        }
        return steps[index] || steps[0];
      }

      function loadingMessage(step) {
        return typeof step.message === "function" ? step.message() : step.message;
      }

      function safeAppointmentSearchSubject() {
        var provider = selectedProvider();
        var name = provider ? provider.display_name || provider.name || provider.title || "" : "";
        name = String(name || "").replace(/[^\w\s.'-]/g, "").replace(/\s+/g, " ").trim();
        var match = name.match(/^Dr\.?\s+(.+)$/i);
        if (match && match[1]) {
          var parts = match[1].trim().split(/\s+/);
          var last = parts.length ? parts[parts.length - 1] : "";
          if (last) {
            return "Searching available appointments for Dr. " + last;
          }
        }
        return "Searching available appointments for your account";
      }

      function startLoadingTransition(context) {
        scheduler.state.loadingTransitionContext = context || "catalog";
        scheduler.state.loadingTransitionStep = context === "availability" ? 2 : 0;
        stopLoadingTransition();
        scheduler.state.loadingTransitionTimer = window.setInterval(function () {
          var maxStep = loadingSteps().length - 1;
          if (scheduler.state.loadingTransitionStep < maxStep) {
            scheduler.state.loadingTransitionStep += 1;
            if ((scheduler.state.loading || scheduler.state.availabilityLoading) && refs.content) {
              if (!updateLoadingTransitionDom()) {
                scheduler.render.page(scheduler.state.route);
              }
            }
          }
        }, 950);
      }

      function updateLoadingTransitionDom() {
        if (!refs.content) {
          return false;
        }
        var shell = refs.content.querySelector("[data-sos-loading-shell]");
        if (!shell) {
          return false;
        }
        var step = loadingStep(scheduler.state.loadingTransitionContext || "catalog");
        var progress = String(step.percent || 12);
        var error = scheduler.state.loadingError;
        var title = error ? "Loading needs attention" : step.title;
        var message = error ? (scheduler.state.loadingError || "We could not finish loading appointment options.") : loadingMessage(step);
        var state = error ? "Needs attention" : (Number(progress) >= 96 ? "Almost ready" : "Loading");
        shell.style.setProperty("--sos-load-progress", progress + "%");
        setText(shell.querySelector("[data-sos-load-kicker]"), step.kicker || "Loading appointment options");
        setText(shell.querySelector("[data-sos-load-title]"), title);
        setText(shell.querySelector("[data-sos-load-message]"), message);
        setText(shell.querySelector("[data-sos-load-percent]"), progress + "%");
        setText(shell.querySelector("[data-sos-load-state]"), state);
        shell.querySelectorAll("[data-sos-skeleton-line]").forEach(function (line) {
          var dayIndex = Number(line.getAttribute("data-day-index") || 0);
          var slotIndex = Number(line.getAttribute("data-slot-index") || 0);
          var isOpen = Number(scheduler.state.loadingTransitionStep || 0) >= 3 && (dayIndex + slotIndex) % 3 === 0;
          line.classList.toggle("is-open", isOpen);
        });
        return true;
      }

      function setText(node, value) {
        if (node) {
          node.textContent = value || "";
        }
      }

      function stopLoadingTransition() {
        if (scheduler.state.loadingTransitionTimer) {
          window.clearInterval(scheduler.state.loadingTransitionTimer);
          scheduler.state.loadingTransitionTimer = null;
        }
      }

      function slotSkeletonMarkup() {
        var days = ["Mon", "Tue", "Wed", "Thu", "Fri"];
        var stage = Number(scheduler.state.loadingTransitionStep || 0);
        return [
          '<div class="sos-slot-skeleton" aria-hidden="true">',
          days.map(function (day, dayIndex) {
            var lines = ['<div class="sos-slot-skeleton-day"><h3>' + escapeHTML(day) + "</h3>"];
            for (var i = 0; i < 4; i += 1) {
              var isOpen = stage >= 3 && (dayIndex + i) % 3 === 0;
              lines.push('<div class="sos-slot-skeleton-line' + (isOpen ? " is-open" : "") + '" data-sos-skeleton-line data-day-index="' + escapeAttr(dayIndex) + '" data-slot-index="' + escapeAttr(i) + '"></div>');
            }
            lines.push("</div>");
            return lines.join("");
          }).join(""),
          "</div>"
        ].join("");
      }

      function clickFeedback(element) {
        element.style.transform = "scale(0.95)";
        element.style.transition = "transform 0.1s ease";
        setTimeout(function() {
          element.style.transform = "";
          element.style.transition = "";
        }, 150);
        try {
          var ctx = window._mmAudioCtx || (window._mmAudioCtx = new (window.AudioContext || window.webkitAudioContext)());
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880;
          gain.gain.value = 0.08;
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.04);
        } catch(e) {}
      }

      function confirmFeedback(element) {
        element.style.boxShadow = "0 0 30px rgba(54, 192, 113, 0.5)";
        setTimeout(function() { element.style.boxShadow = ""; }, 600);
        try {
          var ctx = window._mmAudioCtx || (window._mmAudioCtx = new (window.AudioContext || window.webkitAudioContext)());
          [523, 659, 784].forEach(function(freq, i) {
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = freq;
            gain.gain.value = 0.06;
            osc.start(ctx.currentTime + i * 0.08);
            osc.stop(ctx.currentTime + i * 0.08 + 0.12);
          });
        } catch(e) {}
      }
