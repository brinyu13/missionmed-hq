        });

        // Fix 2: Clickable tracker segments
        refs.content.querySelectorAll("[data-tracker-step]").forEach(function (seg) {
          seg.addEventListener("click", function () {
            clickFeedback(seg);
            var targetStep = parseInt(seg.getAttribute("data-tracker-step"), 10);
            var currentStep = scheduler.state.bookingStep || 1;
            if (targetStep <= currentStep) {
              scheduler.state.bookingStep = targetStep;
              setNotice("", false);
              scheduler.render.page(scheduler.state.route);
            }
          });
        });

        // Fix 4: Week navigation arrows
        var prevWeek = refs.content.querySelector('[data-action="prev-week"]');
        if (prevWeek) {
          prevWeek.addEventListener("click", function () {
            clickFeedback(prevWeek);
            var d = new Date(scheduler.state.date + "T12:00:00.000Z");
            d.setDate(d.getDate() - 7);
            scheduler.state.date = dateInputValue(d);
            scheduler.state.selectedSlotKey = "";
            scheduler.render.page(scheduler.state.route);
            loadAvailability();
          });
        }
        var nextWeek = refs.content.querySelector('[data-action="next-week"]');
        if (nextWeek) {
          nextWeek.addEventListener("click", function () {
            clickFeedback(nextWeek);
            var d = new Date(scheduler.state.date + "T12:00:00.000Z");
            d.setDate(d.getDate() + 7);
            scheduler.state.date = dateInputValue(d);
            scheduler.state.selectedSlotKey = "";
            scheduler.render.page(scheduler.state.route);
            loadAvailability();
          });
        }

        // Fix 4: Slot view toggle
        refs.content.querySelectorAll("[data-slot-view]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            clickFeedback(btn);
            scheduler.state.slotView = btn.getAttribute("data-slot-view") || "week";
            scheduler.render.page(scheduler.state.route);
          });
        });
      }

      function cancelAppointment(appointmentId) {
        appointmentId = String(appointmentId || "").trim();
        if (!appointmentId) {
          setNotice("We could not identify that appointment. Refresh and try again.", true);
          scheduler.render.page(scheduler.state.route);
          return;
        }
        setNotice("Canceling appointment...", false);
        scheduler.render.page(scheduler.state.route);
        scheduler.api.post("/cancel", {
          appointment_id: appointmentId,
          idempotency_key: "student-cancel-" + Date.now() + "-" + Math.random().toString(16).slice(2),
          reason: "student_cancelled_from_scheduler"
        }).then(function (result) {
          if (!result.ok) {
            setNotice(result.message || "We could not cancel this appointment yet.", true);
            return null;
          }
          setNotice("Appointment canceled.", false);
          return Promise.all([loadUpcoming(), loadHistory()]);
        }).then(function () {
          scheduler.render.sidebar();
          scheduler.render.page(scheduler.state.route);
        });
      }

      function fieldSelect(key, label, rows, emptyLabel) {
        var id = "schedule-" + key;
        return [
          '<div class="sos-field">',
          '<label for="' + escapeAttr(id) + '">' + escapeHTML(label) + "</label>",
          '<select id="' + escapeAttr(id) + '" name="' + escapeAttr(key) + '">',
          '<option value="">' + escapeHTML(emptyLabel) + "</option>",
          rows.map(function (row) {
            var selected = selectedValue(key) === String(row.id) ? " selected" : "";
            return '<option value="' + escapeAttr(row.id) + '"' + selected + ">" + escapeHTML(row.name || row.display_name || row.title || row.id) + "</option>";
          }).join(""),
          "</select>",
          "</div>"
        ].join("");
      }

      function selectedValue(key) {
        if (key === "appointment-type") {
          return scheduler.state.appointmentTypeId || "";
        }
        if (key === "provider") {
          return scheduler.state.providerId || "";
        }
        return "";
      }

      function loadAuthSession() {
        return fetchSchedulerAuthSession().then(function (payload) {
          if (payload && payload.authenticated) {
            applySchedulerAuthPayload(payload);
            return payload;
          }
          return exchangeSchedulerWordPressSession(payload);
        }).then(function (payload) {
          if (payload && payload.authenticated) {
            applySchedulerAuthPayload(payload);
            return payload;
          }
          if (window.MMEDSchedulerAuthHandoff && window.MMEDSchedulerAuthHandoff(payload)) {
            return new Promise(function () {});
          }
          scheduler.state.csrfToken = "";
          return payload || {};
        }).catch(function () {
          scheduler.state.csrfToken = "";
          return {};
        });
      }

      function fetchSchedulerAuthSession() {
        return fetch("/api/auth/session?mm_scheduler_exchange=1&audience=scheduler", {
          credentials: "same-origin",
          cache: "no-store",
          headers: { Accept: "application/json" }
        }).then(function (response) {
          return response.json().catch(function () {
            return {};
          });
        });
      }

      function exchangeSchedulerWordPressSession(previousPayload) {
        return fetch("/api/auth/exchange", {
          method: "POST",
          credentials: "same-origin",
          cache: "no-store",
          headers: {
            Accept: "application/json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ audience: "scheduler" })
        }).then(function (response) {
          return response.json().catch(function () {
            return {};
          }).then(function (payload) {
            if (response.ok && payload && payload.authenticated) {
              return payload;
            }
            return payload && Object.keys(payload).length ? payload : previousPayload;
          });
        }).catch(function () {
          return previousPayload || {};
        });
      }

      function applySchedulerAuthPayload(payload) {
        scheduler.state.csrfToken = payload.csrfToken || "";
        if (payload.user) {
          scheduler.state.boot = Object.assign({}, scheduler.state.boot || {}, {
            user: {
              id: payload.user.id,
              display_name: payload.user.displayName || payload.user.display_name || "",
              email: payload.user.email || "",
              roles: payload.user.roles || []
            }
          });
        }
      }

      function loadAll() {
        scheduler.state.catalogLoading = true;
        scheduler.state.appointmentsLoading = true;
        scheduler.render.page(scheduler.state.route);
        var catalog = loadAppointmentTypes().then(function () {
          scheduler.state.catalogLoading = false;
          scheduler.state.loading = false;
          stopLoadingTransition();
          scheduler.render.page(scheduler.state.route);
        });
        var appointments = Promise.all([loadUpcoming(), loadHistory()]).then(function () {
          scheduler.state.appointmentsLoading = false;
          scheduler.render.sidebar();
          if (scheduler.state.route === "upcoming" || scheduler.state.route === "history") {
            scheduler.render.page(scheduler.state.route);
          }
        });
        return Promise.all([catalog, appointments]);
      }

      function loadAppointmentTypes() {
        return scheduler.api.get("/appointment-types").then(function (result) {
          scheduler.state.appointmentTypes = result.ok ? result.data.types || [] : (isLocalPreview() ? localPreviewAppointmentTypes() : []);
          scheduler.state.entitlements = result.ok ? result.data.entitlements || scheduler.state.entitlements : scheduler.state.entitlements;
          if (!result.ok) {
            setNotice(isLocalPreview() ? "" : "Scheduler server is not connected in this local preview.", !isLocalPreview());
          }
        });
      }

      function loadProviders() {
        readFormState();
        if (!scheduler.state.appointmentTypeId) {
          scheduler.state.providers = [];
          renderBookingStepOnly();
          return Promise.resolve();
        }
        var query = new URLSearchParams();
        if (scheduler.state.appointmentTypeId) {
          query.set("appointment_type_id", scheduler.state.appointmentTypeId);
        }
        return scheduler.api.get("/providers?" + query.toString()).then(function (result) {
          scheduler.state.providers = result.ok ? result.data.providers || [] : (isLocalPreview() ? localPreviewProviders() : []);
          if (!result.ok) {
            setNotice(isLocalPreview() ? "" : "We could not load providers yet. Try again after the scheduler server is connected.", !isLocalPreview());
          }
          renderBookingStepOnly();
        });
      }

      function loadAvailability() {
        readFormState();
        if (!scheduler.state.appointmentTypeId || !scheduler.state.providerId) {
          scheduler.state.slots = [];
          scheduler.state.selectedSlotKey = "";
          scheduler.state.availabilityLoading = false;
          stopLoadingTransition();
          scheduler.render.page(scheduler.state.route);
          return Promise.resolve();
        }
        scheduler.state.availabilityLoading = true;
        scheduler.state.selectedSlotKey = "";
        startLoadingTransition("availability");
        scheduler.render.page(scheduler.state.route);
        var selected = new Date(scheduler.state.date + "T12:00:00.000Z");
        var start = new Date(selected.getTime() - 24 * 60 * 60 * 1000);
        var end = new Date(selected.getTime() + 8 * 24 * 60 * 60 * 1000);
        var query = new URLSearchParams({
          start_date: start.toISOString(),
          end_date: end.toISOString(),
          timezone: scheduler.state.timezone
        });
        if (scheduler.state.appointmentTypeId) {
          query.set("appointment_type_id", scheduler.state.appointmentTypeId);
        }
        if (scheduler.state.providerId) {
          query.set("provider_id", scheduler.state.providerId);
        }
        return scheduler.api.get("/availability?" + query.toString()).then(function (result) {
          scheduler.state.slots = result.ok ? result.data.slots || [] : (isLocalPreview() ? localPreviewSlots() : []);
          scheduler.state.selectedSlotKey = "";
          if (!result.ok) {
            setNotice(isLocalPreview() ? "" : "We could not load available times yet. Try again or contact support if this continues.", !isLocalPreview());
          }
        }).catch(function () {
          scheduler.state.slots = [];
          scheduler.state.selectedSlotKey = "";
          setNotice("We could not load available times yet. Try again or contact support if this continues.", true);
        }).then(function () {
          scheduler.state.availabilityLoading = false;
          stopLoadingTransition();
          scheduler.render.page(scheduler.state.route);
        });
      }

      function loadUpcoming() {
        return scheduler.api.get("/my-appointments").then(function (result) {
          scheduler.state.upcoming = result.ok ? result.data.appointments || [] : [];
        });
      }

      function loadHistory() {
        return scheduler.api.get("/my-appointment-history").then(function (result) {
          scheduler.state.history = result.ok ? result.data.appointments || [] : [];
        });
      }

      function submitBooking(event) {
        event.preventDefault();
        return submitBookingCore();
      }

      function submitBookingFromButton() {
        return submitBookingCore();
      }

      function submitBookingCore() {
        readFormState();
        var slot = selectedSlot();
        var type = selectedAppointmentType();
        if (isTypeLocked(type)) {
          setNotice("This visit type needs a matching MissionMed enrollment before booking.", true);
          scheduler.render.page(scheduler.state.route);
          return;
        }
        if (!slot) {
          setNotice("Choose a time before confirming.", true);
          scheduler.render.page(scheduler.state.route);
          return;
        }
        var requiredMissing = missingRequiredIntake(type);
        if (requiredMissing.length) {
          setNotice("Please answer the required intake questions before confirming: " + requiredMissing.join(", ") + ".", true);
          scheduler.render.page(scheduler.state.route);
          return;
        }
        if (paymentRequired(type)) {
          setNotice("This visit type requires server-verified payment. The Stripe test adapter is not configured in this preview, so booking is blocked safely.", true);
          scheduler.render.page(scheduler.state.route);
          return;
        }
        scheduler.state.bookingState = "Sending";
        scheduler.render.page(scheduler.state.route);
        scheduler.api.post("/book", {
          idempotency_key: "student-" + Date.now() + "-" + Math.random().toString(16).slice(2),
          appointment_type_id: scheduler.state.appointmentTypeId,
          provider_id: scheduler.state.providerId,
          start_at: slot.startAt || slot.start_at,
          end_at: slot.endAt || slot.end_at,
          timezone: scheduler.state.timezone,
          intake_answers: collectIntakeAnswers(),
          email_opt_in: scheduler.state.emailOptIn,
          sms_opt_in: scheduler.state.smsOptIn,
          sms_phone: scheduler.state.smsOptIn ? scheduler.state.smsPhone : ""
        }).then(function (result) {
          scheduler.state.bookingState = result.ok ? "Confirmed" : "Blocked";
          if (!result.ok) {
            scheduler.state.bookingConfirmed = false;
            scheduler.state.confirmedAppointment = null;
            scheduler.state.confirmedMeeting = null;
            setNotice(result.message || "Booking could not be confirmed.", true);
          } else {
            var appointment = result.data && result.data.appointment ? result.data.appointment : {};
            var meeting = result.data && result.data.integrations ? result.data.integrations.meeting || {} : {};
            scheduler.state.bookingConfirmed = true;
            scheduler.state.confirmedAppointment = appointment;
            scheduler.state.confirmedMeeting = meeting;
            scheduler.state.bookingStep = 3;
            setNotice("", false);
            return loadUpcoming();
          }
        }).catch(function (error) {
          if (scheduler.state.bookingConfirmed) {
            setNotice("Session booked. Your upcoming list could not refresh yet, but the confirmation is complete.", false);
          } else {
            scheduler.state.bookingState = "Blocked";
            setNotice(error && error.message ? error.message : "Booking could not be confirmed.", true);
          }
        }).then(function () {
          scheduler.render.sidebar();
          scheduler.render.page(scheduler.state.route);
        });
      }

      function readFormState() {
        var divisionSelect = refs.content ? refs.content.querySelector("#schedule-division") : null;
        var typeSelect = refs.content ? refs.content.querySelector("#schedule-appointment-type") : null;
        var providerSelect = refs.content ? refs.content.querySelector("#schedule-provider") : null;
        var dateInput = refs.content ? refs.content.querySelector("#schedule-date") : null;
        var intake = refs.content ? refs.content.querySelector("#schedule-intake") : null;
        var emailOptIn = refs.content ? refs.content.querySelector("#schedule-email-opt-in") : null;
        var smsOptIn = refs.content ? refs.content.querySelector("#schedule-sms-opt-in") : null;
        var smsPhone = refs.content ? refs.content.querySelector("#schedule-sms-phone") : null;
        if (divisionSelect) {
          scheduler.state.division = divisionSelect.value;
        }
        if (typeSelect) {
          scheduler.state.appointmentTypeId = typeSelect.value;
        }
        if (providerSelect) {
          scheduler.state.providerId = providerSelect.value;
        }
        if (dateInput) {
          scheduler.state.date = dateInput.value || scheduler.state.date;
        }
        if (intake) {
          scheduler.state.intake = intake.value || "";
        }
        if (emailOptIn) {
          scheduler.state.emailOptIn = emailOptIn.checked;
        }
        if (smsOptIn) {
          scheduler.state.smsOptIn = smsOptIn.checked;
        }
        if (smsPhone) {
          scheduler.state.smsPhone = smsPhone.value || "";
        }
      }

      function collectIntakeAnswers() {
        var answers = [{ field_key: "student_notes", answer_text: scheduler.state.intake }];
        if (scheduler.state.smsOptIn) {
          answers.push({ field_key: "sms_reminder_opt_in", answer_text: "yes" });
          if (String(scheduler.state.smsPhone || "").trim()) {
            answers.push({ field_key: "sms_reminder_phone", answer_text: String(scheduler.state.smsPhone || "").trim() });
          }
        }
        if (!refs.content) return answers;
        refs.content.querySelectorAll("[data-intake-field]").forEach(function (field) {
          answers.push({
            field_key: field.getAttribute("data-intake-field") || "",
            answer_text: field.value || ""
          });
        });
        return answers;
      }

      function missingRequiredIntake(type) {
        if (!refs.content) return [];
        return studentIntakeFields(type)
          .filter(function (field) { return field.required === true; })
          .filter(function (field) {
            var input = refs.content.querySelector('[data-intake-field="' + cssEscape(field.field_key || field.id || "") + '"]');
            return !input || !String(input.value || "").trim();
          })
          .map(function (field) { return field.label || field.field_key || "Required field"; });
      }

      function paymentRequired(type) {
        var payment = type && type.student_config && type.student_config.payments ? type.student_config.payments : {};
        return payment.required === true || payment.mode === "required";
      }

      function setNotice(message, isError) {
        scheduler.state.notice = message || "";
        scheduler.state.noticeError = Boolean(isError);
      }

      function selectedSlot() {
        for (var i = 0; i < scheduler.state.slots.length; i += 1) {
          if (slotKey(scheduler.state.slots[i]) === scheduler.state.selectedSlotKey) {
            return scheduler.state.slots[i];
          }
        }
        return null;
      }

      function selectedAppointmentType() {
        return scheduler.state.appointmentTypes.find(function (row) {
          return String(row.id) === String(scheduler.state.appointmentTypeId || "");
        }) || null;
      }

      function selectedProvider() {
        return scheduler.state.providers.find(function (row) {
          return String(row.id) === String(scheduler.state.providerId || "");
        }) || null;
      }

      function selectedProviderName(slot) {
        var provider = scheduler.state.providers.find(function (row) {
          return String(row.id) === String(slot.provider_id || slot.providerId || scheduler.state.providerId || "");
        });
        return provider ? provider.display_name || provider.name || provider.id : "Provider";
      }

      function sortedSlots() {
        return scheduler.state.slots.slice().sort(function (a, b) {
          return new Date(slotStart(a)).getTime() - new Date(slotStart(b)).getTime();
        });
      }

      function slotsForDate(key) {
        return sortedSlots().filter(function (slot) {
          return localDateKey(slotStart(slot)) === key;
        });
      }

      function weekDays() {
        var d = new Date(scheduler.state.date + "T12:00:00.000Z");
        var day = d.getDay();
        var sun = new Date(d.getTime() - day * 86400000);
        return Array.from({ length: 7 }, function(_, i) {
          return new Date(sun.getTime() + i * 86400000);
        });
      }

      function weekLabel() {
        var days = weekDays();
        var fmt = new Intl.DateTimeFormat([], { month: "short", day: "numeric", timeZone: EASTERN_TIMEZONE });
        return fmt.format(days[0]) + " - " + fmt.format(days[6]);
      }

      function scheduleTrackerPhase() {
        var phases = [
          { name: "Select Details", id: "details", complete: Boolean(scheduler.state.division && scheduler.state.appointmentTypeId && scheduler.state.providerId) },
          { name: "Choose Time Slot", id: "time", complete: Boolean(scheduler.state.selectedSlotKey) },
          { name: "Review & Confirm", id: "confirm", complete: scheduler.state.bookingState === "Confirmed" }
        ];
        return { phases: phases, current_index: Math.max(0, Math.min(2, Number(scheduler.state.bookingStep || 1) - 1)) };
      }

      function upcomingTrackerPhase() {
        return {
          phases: [
            { name: "Booked", id: "booked", complete: scheduler.state.upcoming.length > 0 },
            { name: "Prepare", id: "prepare", complete: false },
            { name: "Attend", id: "attend", complete: false },
            { name: "Follow Up", id: "followup", complete: false }
          ],
          current_index: scheduler.state.upcoming.length > 0 ? 1 : 0
        };
      }

      function historyTrackerPhase() {
        return {
          phases: [
            { name: "Scheduled", id: "scheduled", complete: true },
            { name: "Completed", id: "completed", complete: scheduler.state.history.length > 0 },
            { name: "Outcome", id: "outcome", complete: false },
            { name: "Next Step", id: "next", complete: false }
          ],
          current_index: scheduler.state.history.length > 0 ? 2 : 1
        };
      }

      function defaultSchedulePhase() {
        return {
          phases: [
            { name: "Select Details", id: "details", complete: false },
            { name: "Choose Time Slot", id: "time", complete: false },
            { name: "Review & Confirm", id: "confirm", complete: false }
          ],
          current_index: 0
        };
      }

      function navLink(route, label, icon, badge) {
        var active = scheduler.state.route === route ? " is-active" : "";
        var badgeHtml = badge !== "" && badge !== null && badge !== undefined ? '<span class="sos-nav-badge">' + escapeHTML(String(badge)) + "</span>" : "";
        return [
          "<li>",
          '<a class="sos-nav-link' + active + '" href="#' + escapeAttr(route) + '" data-route="' + escapeAttr(route) + '">',
          '<span class="sos-nav-icon">' + escapeHTML(icon) + "</span>",
          "<span>" + escapeHTML(label) + "</span>",
          badgeHtml,
          "</a>",
          "</li>"
        ].join("");
      }

      function sidebarStatus() {
        if (scheduler.state.boot && scheduler.state.boot.user) {
          return scheduler.state.boot.user.display_name || scheduler.state.boot.user.email || "Scheduler ready";
        }
        return scheduler.state.bootError || "Checking session";
      }

      function slotKey(slot) {
        return [
          String(slot.providerId || slot.provider_id || scheduler.state.providerId || ""),
          String(slot.appointmentTypeId || slot.appointment_type_id || scheduler.state.appointmentTypeId || ""),
          String(slot.startAt || slot.start_at || ""),
          String(slot.endAt || slot.end_at || "")
        ].join("|");
      }

      function slotStart(slot) {
        return String(slot.startAt || slot.start_at || "");
      }

      function nextDateValue() {
        return new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
      }

      function localDateKey(value) {
        if (!value) {
          return "";
        }
        var parts = new Intl.DateTimeFormat("en-CA", {
          timeZone: EASTERN_TIMEZONE,
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        }).formatToParts(new Date(value)).reduce(function (acc, part) {
          acc[part.type] = part.value;
          return acc;
        }, {});
        return [parts.year, parts.month, parts.day].join("-");
      }

      function dateInputValue(value) {
        return localDateKey(value);
      }

      function formatDateTime(value) {
        if (!value) {
          return "Time pending";
        }
        return new Intl.DateTimeFormat([], { dateStyle: "medium", timeStyle: "short", timeZone: EASTERN_TIMEZONE }).format(new Date(value));
      }

      function formatTime(value) {
        if (!value) {
          return "Time";
        }
        return new Intl.DateTimeFormat([], { timeStyle: "short", timeZone: EASTERN_TIMEZONE }).format(new Date(value));
      }

      function easternTimeKey(value) {
        if (!value) {
          return "00:00";
        }
        var parts = new Intl.DateTimeFormat("en-US", {
          timeZone: EASTERN_TIMEZONE,
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).formatToParts(new Date(value)).reduce(function (acc, part) {
          acc[part.type] = part.value;
          return acc;
        }, {});
        var hour = parts.hour === "24" ? "00" : parts.hour;
        return String(hour || "00").padStart(2, "0") + ":" + String(parts.minute || "00").padStart(2, "0");
      }

      function matrixTimeLabel(key) {
        var pieces = String(key || "00:00").split(":");
        var hour = parseInt(pieces[0], 10) || 0;
        var minute = parseInt(pieces[1], 10) || 0;
        var date = new Date(Date.UTC(2026, 0, 1, hour, minute, 0));
        return new Intl.DateTimeFormat([], { hour: "numeric", minute: "2-digit", timeZone: "UTC" }).format(date);
      }

      function formatDate(value) {
        if (!value) {
          return "Date";
        }
        return new Intl.DateTimeFormat([], { weekday: "short", month: "short", day: "numeric", timeZone: EASTERN_TIMEZONE }).format(new Date(value));
      }

      function friendlyMessage(message) {
        var text = String(message || "");
        if (/failed to fetch|network|not available|auth|session|route|api/i.test(text)) {
          return "Scheduler server is not connected in this local preview. Try again after the local server is running, or contact support.";
        }
        return text;
      }

      function escapeHTML(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, function (character) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;"
          }[character];
        });
      }

      function escapeAttr(value) {
        return escapeHTML(value).replace(/`/g, "&#096;");
      }

      function cssEscape(value) {
        if (window.CSS && typeof window.CSS.escape === "function") {
          return window.CSS.escape(String(value || ""));
        }
        return String(value || "").replace(/["\\]/g, "\\$&");
      }

      window.MMEDScheduler = scheduler;

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function () {
          scheduler.mount();
        });
      } else {
        scheduler.mount();
      }
    }());
  </script>
