<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MissionMed Matrix Scheduler</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap");

    :root {
      --navy: #061727;
      --navy2: #0b2033;
      --navy3: #102b46;
      --blue: #3bb7ff;
      --blue2: #78d4ff;
      --gold: #ffcc4d;
      --gold2: #ffe08a;
      --orange: #ff8a3d;
      --orange2: #ffb27a;
      --green: #3dff9a;
      --green2: #9cffc7;
      --red: #ff5c7a;
      --matrix-heading: "Space Grotesk", "Poppins", sans-serif;
      --matrix-body: "Poppins", sans-serif;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--navy);
      color: #fff;
      overflow-x: hidden;
    }

    #schedule-root,
    #schedule-root * {
      box-sizing: border-box;
    }

    #schedule-root {
      --sidebar-w: 252px;
      position: relative;
      display: flex;
      width: 100vw;
      min-height: 100vh;
      background: var(--navy);
      color: #fff;
      font-family: var(--matrix-body);
      line-height: 1.5;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #schedule-root h1,
    #schedule-root h2,
    #schedule-root h3,
    #schedule-root p,
    #schedule-root ul,
    #schedule-root li,
    #schedule-root button {
      margin: 0;
      padding: 0;
      font-family: inherit;
      letter-spacing: 0;
    }

    #schedule-root a {
      color: inherit;
      text-decoration: none;
    }

    #schedule-root button,
    #schedule-root input,
    #schedule-root select,
    #schedule-root textarea {
      font: inherit;
    }

    #schedule-root button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    #schedule-root input,
    #schedule-root select,
    #schedule-root textarea {
      width: 100%;
      min-height: 44px;
      padding: 11px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        rgba(6, 23, 39, 0.42);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      color: #fff;
      outline: none;
      transition: border-color 0.24s ease, box-shadow 0.24s ease, transform 0.24s ease;
    }

    #schedule-root textarea {
      min-height: 98px;
      resize: vertical;
    }

    #schedule-root input:focus,
    #schedule-root select:focus,
    #schedule-root textarea:focus {
      border-color: rgba(243, 213, 118, 0.6);
      box-shadow: 0 0 0 4px rgba(217, 184, 91, 0.14);
      transform: translateY(-1px);
    }

    #schedule-root option {
      background: var(--navy2);
      color: #fff;
    }

    /*
      MM-SCHED-057D layout invariant:
      Standalone Scheduler may own the viewport, but Matrix embedded Scheduler must
      never use 100vw or escape the Matrix content lane again. Keep every booking
      step/card/grid fluid inside its current container.
    */
    #schedule-root.sos-schedule-embedded {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: auto;
      margin: 0;
      background: transparent;
      overflow: visible;
    }

    #schedule-root.sos-schedule-embedded .sos-page,
    #schedule-root.sos-schedule-embedded .sos-book-flow,
    #schedule-root.sos-schedule-embedded .sos-tracker-board,
    #schedule-root.sos-schedule-embedded .sos-card,
    #schedule-root.sos-schedule-embedded .sos-card-pad,
    #schedule-root.sos-schedule-embedded .sos-load-shell {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .hidden {
      display: none !important;
    }

    .sos-sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      width: var(--sidebar-w);
      min-height: 100vh;
      padding: 24px 0;
      overflow-y: auto;
      background: linear-gradient(180deg, #040e1a 0%, #07192d 100%);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 16px 0 48px rgba(0, 0, 0, 0.26);
    }

    .sos-main {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 100vh;
      margin-left: var(--sidebar-w);
      overflow: hidden;
    }

    .sos-bg-layer {
      position: fixed;
      inset: 0 0 0 var(--sidebar-w);
      z-index: 0;
      overflow: hidden;
      contain: paint;
      pointer-events: none;
      background: linear-gradient(180deg, #0a2540 0%, #0e3a5c 30%, #0b3050 70%, #071e35 100%);
    }

    .sos-bg-layer::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.025), transparent);
      background-size: 200% 100%;
      animation: sos-shimmer 3s ease-in-out infinite;
    }

    .sos-bg-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(ellipse at 48% 38%, rgba(14, 117, 168, 0.12), transparent 58%),
        linear-gradient(180deg, rgba(6, 23, 39, 0) 0%, rgba(6, 23, 39, 0.44) 100%);
      animation: sos-glow-pulse 6s ease-in-out infinite alternate;
    }

    .sos-bg {
      position: absolute;
      inset: -8% -10%;
      z-index: 1;
      transform-origin: 50% 10%;
    }

    .sos-bg-a {
      background: linear-gradient(170deg, transparent 10%, rgba(54, 192, 113, 0.18) 25%, rgba(0, 229, 255, 0.15) 40%, transparent 55%);
      filter: blur(25px);
      animation: sos-aurora-a 5s ease-in-out infinite alternate;
    }

    .sos-bg-b {
      background: linear-gradient(160deg, transparent 30%, rgba(168, 85, 247, 0.14) 42%, rgba(0, 229, 255, 0.12) 54%, transparent 68%);
      filter: blur(35px);
      animation: sos-aurora-b 7s ease-in-out infinite alternate;
    }

    .sos-bg-c {
      background: linear-gradient(175deg, transparent 5%, rgba(54, 192, 113, 0.12) 18%, rgba(217, 184, 91, 0.1) 32%, transparent 48%);
      filter: blur(40px);
      animation: sos-aurora-c 9s ease-in-out infinite alternate;
    }

    .sos-content {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      padding: 34px 38px 62px;
    }

    .sos-brand {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 0 20px;
      margin-bottom: 28px;
    }

    .sos-brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      flex: 0 0 42px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      box-shadow: 0 4px 20px rgba(217, 184, 91, 0.35);
      color: var(--navy);
      font-family: var(--matrix-heading);
      font-size: 15px;
      font-weight: 700;
    }

    .sos-brand-title {
      color: #fff;
      font-family: var(--matrix-heading);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.1;
    }

    .sos-brand-title small {
      display: block;
      margin-top: 3px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .sos-nav-section {
      margin-bottom: 22px;
    }

    .sos-nav-label {
      padding: 0 20px;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.32);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .sos-nav-list {
      display: grid;
      gap: 2px;
      list-style: none;
    }

    .sos-nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 44px;
      padding: 10px 20px;
      border-left: 3px solid transparent;
      background: transparent;
      color: rgba(255, 255, 255, 0.74);
      font-size: 13px;
      font-weight: 600;
      text-align: left;
      touch-action: manipulation;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .sos-nav-link:hover,
    .sos-nav-link:focus-visible {
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      outline: none;
    }

    .sos-nav-link.is-active {
      background: rgba(217, 184, 91, 0.1);
      border-left-color: var(--gold);
      color: var(--gold2);
    }

    .sos-nav-icon {
      display: grid;
      width: 22px;
      height: 22px;
      place-items: center;
      flex: 0 0 22px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.76);
      font-family: var(--matrix-heading);
      font-size: 10px;
      font-weight: 800;
    }

    .sos-nav-link.is-active .sos-nav-icon {
      background: rgba(217, 184, 91, 0.18);
      color: var(--gold2);
    }

    .sos-nav-badge {
      margin-left: auto;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--orange);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
    }

    .sos-sidebar-footer {
      padding: 14px 20px 0;
      margin-top: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .sos-page {
      animation: sos-fade-in 0.35s ease;
    }

    .sos-page-header {
      max-width: 760px;
      margin-bottom: 28px;
    }

    .sos-eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 5px 14px;
      margin-bottom: 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: var(--navy);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .sos-page-title {
      margin-bottom: 8px;
      color: #fff;
      font-family: var(--matrix-heading);
      font-size: 42px;
      font-weight: 700;
      line-height: 1.12;
    }

    .sos-page-copy {
      max-width: 620px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 14px;
    }

    .sos-grid {
      display: grid;
      gap: 18px;
    }

    .sos-grid-stats {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 28px;
    }

    .sos-grid-two {
      grid-template-columns: minmax(280px, 430px) minmax(0, 1fr);
      align-items: start;
    }

    .sos-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(23, 163, 207, 0.12);
      border-radius: 8px;
      background: linear-gradient(180deg, #0d3a56 0%, #082a3f 100%);
      box-shadow:
        0 4px 8px rgba(0, 0, 0, 0.3),
        0 16px 48px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        inset 0 -3px 6px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .sos-card:hover {
      border-color: rgba(23, 163, 207, 0.22);
      box-shadow:
        0 8px 16px rgba(0, 0, 0, 0.35),
        0 24px 64px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transform: translateY(-3px);
    }

    .sos-card-pad {
      padding: 22px;
    }

    .sos-stat {
      display: grid;
      min-height: 126px;
      place-items: center;
      padding: 20px;
      text-align: center;
    }

    .sos-stat-value {
      display: block;
      color: var(--gold2);
      font-family: var(--matrix-heading);
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }

    .sos-stat-label {
      display: block;
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.48);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sos-stat-sub {
      display: block;
      margin-top: 7px;
      color: rgba(255, 255, 255, 0.38);
      font-size: 11px;
    }

    .sos-panel-title {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      color: var(--blue2);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .sos-panel-title::before {
      content: "";
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blue2);
      box-shadow: 0 0 6px var(--blue2);
    }

    .sos-panel-heading {
      margin-bottom: 8px;
      color: #fff;
      font-family: var(--matrix-heading);
      font-size: 18px;
      font-weight: 700;
    }

    .sos-panel-copy {
      color: rgba(255, 255, 255, 0.56);
      font-size: 13px;
    }

    .sos-tracker-board {
      padding: 20px;
      margin-bottom: 28px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: linear-gradient(180deg, #0b78a8, #0a5687);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.08), 0 26px 80px rgba(0, 0, 0, 0.34);
    }

    .sos-tracker-top {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .sos-tracker-title {
      color: #fff;
      font-family: var(--matrix-heading);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.05;
      text-transform: uppercase;
    }

    .sos-tracker-title span {
      display: block;
      color: var(--gold2);
    }

    .sos-tracker-copy {
      max-width: 560px;
      margin-top: 7px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      line-height: 1.55;
    }

    .sos-tracker-labels {
      display: grid;
      gap: 3px;
      margin: 0 10px 6px;
    }

    .sos-tracker-labels span {
      overflow: hidden;
      color: rgba(255, 255, 255, 0.62);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-align: center;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .sos-segment-bar {
      display: grid;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      background: #637689;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.34));
    }

    .sos-segment {
      position: relative;
      display: grid;
      min-height: 68px;
      place-items: center;
      background: linear-gradient(180deg, #8ca0b2, #5d7285);
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%);
      color: rgba(255, 255, 255, 0.55);
      font-family: var(--matrix-heading);
      font-size: 24px;
      font-weight: 800;
    }

    .sos-segment:first-child {
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%);
    }

    .sos-segment:last-child {
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 14px 50%);
    }

    .sos-segment.is-complete {
      background: linear-gradient(180deg, #31c46f, #159a56);
      color: #fff;
    }

    .sos-segment.is-active {
      background: linear-gradient(180deg, var(--orange2), var(--orange));
      color: #fff;
      animation: sos-tracker-pulse 1.08s ease-in-out infinite;
    }

    .sos-status-strip {
      margin-top: 13px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
      text-transform: uppercase;
    }

    .sos-status-strip strong {
      color: var(--gold2);
      font-weight: 800;
    }

    .sos-btn,
    .sos-tab,
    .sos-sched-slot {
      touch-action: manipulation;
    }

    .sos-btn:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
    }

    .sos-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      padding: 12px 18px;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.12) !important;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02)),
        linear-gradient(180deg, #0f4668, #082a40);
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.32),
        0 20px 50px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        inset 0 -4px 8px rgba(0, 0, 0, 0.25);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
      transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease, filter 0.24s ease;
    }

    .sos-btn:hover,
    .sos-btn:focus-visible {
      border-color: rgba(23, 163, 207, 0.5) !important;
      box-shadow:
        0 12px 24px rgba(0, 0, 0, 0.38),
        0 28px 70px rgba(0, 0, 0, 0.32),
        0 0 22px rgba(23, 163, 207, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
      transform: translateY(-2px) scale(1.015);
      outline: none;
    }

    .sos-btn:active {
      box-shadow:
        0 4px 10px rgba(0, 0, 0, 0.34),
        inset 0 3px 8px rgba(0, 0, 0, 0.36);
      transform: translateY(1px) scale(0.98);
    }

    .sos-btn-primary {
      border-color: rgba(243, 213, 118, 0.36) !important;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.02)),
        linear-gradient(135deg, #b8941e, #d4a826);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.34),
        0 0 34px rgba(217, 184, 91, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.36),
        inset 0 -5px 12px rgba(110, 70, 0, 0.2);
      color: #fff;
    }

    .sos-btn-block {
      width: 100%;
      margin-top: 18px;
    }

    .sos-toolbar,
    .sos-tabs,
    .sos-badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 22px;
    }

    .sos-tab,
    .sos-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 8px 13px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02)),
        rgba(6, 23, 39, 0.5);
      box-shadow:
        0 7px 18px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      font-weight: 800;
      transition: transform 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
    }

    .sos-tab {
      min-height: 48px;
      padding-inline: 18px;
    }

    .sos-tab:hover,
    .sos-tab.is-active,
    .sos-tab[aria-current="true"] {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3), 0 0 22px rgba(217, 184, 91, 0.22);
      color: var(--navy);
      transform: translateY(-2px);
    }

    .sos-pill {
      min-height: 32px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .sos-tier-high {
      background: rgba(54, 192, 113, 0.14);
      border-color: rgba(54, 192, 113, 0.32);
      color: #dfffea;
    }

    .sos-tier-medium {
      background: rgba(217, 184, 91, 0.14);
      border-color: rgba(243, 213, 118, 0.32);
      color: #fff0ba;
    }

    .sos-tier-low {
      background: rgba(240, 107, 47, 0.14);
      border-color: rgba(240, 107, 47, 0.34);
      color: #ffd8c2;
    }

    .sos-notice,
    .sos-banner {
      padding: 18px;
      border: 1px solid rgba(243, 213, 118, 0.32);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03)),
        rgba(217, 184, 91, 0.12);
      box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      color: var(--gold2);
      font-size: 13px;
      font-weight: 800;
    }

    .sos-banner.is-error {
      border-color: rgba(217, 92, 92, 0.32);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03)),
        rgba(217, 92, 92, 0.12);
      color: #ffd9d9;
    }

    .sos-empty {
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(9, 36, 61, 0.45);
      color: rgba(255, 255, 255, 0.66);
      font-size: 13px;
    }

    .sos-empty-rich {
      display: grid;
      gap: 10px;

      place-items: center;
      color: rgba(255, 255, 255, 0.54);

      text-transform: uppercase;

      background: rgba(61, 255, 154, 0.12);

      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;

      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;

    .sos-sched-open-slot:focus-visible {
      border-color: rgba(61, 255, 154, 0.52);
      background: rgba(61, 255, 154, 0.18);

      outline: none;

      border-radius: 12px;
      background: rgba(23, 163, 207, 0.1);

      color: #fff;
      font-family: var(--matrix-heading);
      font-size: 14px;
    }

    .sos-slot-selected-summary span {
      display: block;

      color: rgba(255, 255, 255, 0.62);
      font-size: 12px;

      gap: 8px;
      margin: 12px 0 14px;
    }

    .sos-sched-next-row {
      display: flex;
