<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MissionMed USCE Student Portal</title>
<style>
:root{--n:#0F2A44;--n2:#173755;--g:#C9A24B;--ink:#0b1c2e;--line:rgba(15,42,68,.14);--ok:#1f8a5a;--bad:#b23a3a;--muted:#5e6b7a}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fbfaf6,#f2eee6);padding:20px}
.app{max-width:980px;margin:0 auto;display:grid;gap:14px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 24px rgba(15,42,68,.08)}
.h{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}.h h1,.h h2{margin:0}.h h1{font-size:20px}
.b{padding:14px 16px}.row{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:10px}.c4{grid-column:span 4}.c6{grid-column:span 6}.c8{grid-column:span 8}.c12{grid-column:span 12}
label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;color:var(--n)}
input,select,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font:inherit;background:#fff}textarea{min-height:84px}
button,a.btn{appearance:none;border:1px solid var(--line);background:#fff;color:var(--n);border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
button.primary{background:linear-gradient(135deg,var(--n),var(--n2));color:#fff;border-color:#233b58}
button.good{background:#ecf8f1;color:var(--ok);border-color:#b8e1ca}
button.bad{background:#fff0f0;color:var(--bad);border-color:#f0c2c2}
.tag{font-size:11px;padding:4px 8px;border-radius:999px;border:1px solid var(--line);font-weight:700}.ok{color:var(--ok)}.badc{color:var(--bad)}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;white-space:pre-wrap;background:#0f172a;color:#d1fae5;border-radius:10px;padding:10px;border:1px solid #1e293b}
.pill{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;font-weight:700}
@media(max-width:900px){.c4,.c6,.c8,.c12{grid-column:span 12}}
</style>
</head>
<body>
<div class="app">
  <section class="card">
    <div class="h"><div><h1>MissionMed USCE Student</h1><small>Request + offer portal response</small></div><span id="authState" class="tag">checking auth...</span></div>
    <div class="b">
      <div id="authMsg" class="c12"></div>
      <button id="btnConnect" class="primary" type="button">Connect Auth Session</button>
      <a class="btn" href="/api/auth/start">Login via WordPress</a>
    </div>
  </section>

  <section class="card">
    <div class="h"><h2>Submit Request</h2></div>
    <div class="b row">
      <div class="c4"><label>Full Name</label><input id="rqName" /></div>
      <div class="c4"><label>Email</label><input id="rqEmail" type="email" /></div>
      <div class="c4"><label>Phone (E.164)</label><input id="rqPhone" placeholder="+15551234567" /></div>
      <div class="c4"><label>Program Seat</label><select id="rqSeat"></select></div>
      <div class="c4"><label>Specialties (comma)</label><input id="rqSpecs" /></div>
      <div class="c4"><label>Locations (comma)</label><input id="rqLocs" /></div>
      <div class="c12"><button id="btnCreateReq" class="primary" type="button">Submit Request</button></div>
      <div class="c12"><div id="rqOut" class="mono">No request submitted yet.</div></div>
    </div>
  </section>

  <section class="card">
    <div class="h"><h2>Portal Offer</h2></div>
    <div class="b row">
      <div class="c8"><label>Portal Token</label><input id="portalToken" placeholder="Paste token from offer email" /></div>
      <div class="c4" style="display:flex;align-items:end;"><button id="btnLoadPortal" type="button">Load Offer</button></div>
      <div class="c12"><div id="portalOut" class="mono">No portal offer loaded.</div></div>
      <div class="c12" style="display:flex;gap:10px;flex-wrap:wrap;">
        <button id="btnAccept" class="good" type="button" disabled>Accept Offer</button>
        <button id="btnDecline" class="bad" type="button" disabled>Decline Offer</button>
      </div>
    </div>
  </section>
</div>
<script>
(() => {
  const state = { accessToken:'', csrfToken:'', connected:false, programs:[], currentToken:'', currentOffer:null };
  const el = {
    authState:document.getElementById('authState'), authMsg:document.getElementById('authMsg'), rqSeat:document.getElementById('rqSeat'),
    rqName:document.getElementById('rqName'), rqEmail:document.getElementById('rqEmail'), rqPhone:document.getElementById('rqPhone'), rqSpecs:document.getElementById('rqSpecs'), rqLocs:document.getElementById('rqLocs'), rqOut:document.getElementById('rqOut'),
    portalToken:document.getElementById('portalToken'), portalOut:document.getElementById('portalOut'), btnAccept:document.getElementById('btnAccept'), btnDecline:document.getElementById('btnDecline')
  };

  function status(ok, txt){ el.authState.textContent = txt; el.authState.className = 'tag ' + (ok ? 'ok' : 'badc'); }
  function listCsv(v){ return String(v||'').split(',').map(s=>s.trim()).filter(Boolean); }

  async function api(path, opts={}){
    const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
    if (state.accessToken) headers.Authorization = 'Bearer ' + state.accessToken;
    if (opts.method && opts.method !== 'GET' && state.csrfToken) headers['X-MMHQ-CSRF'] = state.csrfToken;
    const res = await fetch(path, { method: opts.method || 'GET', cache:'no-store', credentials:'include', headers, body: opts.body ? JSON.stringify(opts.body) : undefined });
    let data = null; try { data = await res.json(); } catch(_e) { data = { parse_error:true }; }
    return { ok: res.ok, status: res.status, data };
  }

  function fillSeats(){
    const opts = ['<option value="">Select program seat</option>'].concat(state.programs.map(p => `<option value="${p.id}">${p.program_name || p.id} (${p.seats_available ?? '?'} seats)</option>`));
    el.rqSeat.innerHTML = opts.join('');
  }

  async function connect(){
    const s = await api('/api/auth/session');
    if (!s.ok){ status(false,'session error'); el.authMsg.textContent = 'Could not load /api/auth/session'; return; }
    const body = s.data || {};
    state.accessToken = String(body.accessToken || '').trim();
    state.csrfToken = String(body.csrfToken || '').trim();
    state.connected = Boolean(body.authenticated && state.accessToken);
    if (!state.connected){ status(false,'not authenticated'); el.authMsg.textContent = 'Authenticate via WordPress login, then reconnect.'; return; }
    status(true,'authenticated');
    el.authMsg.textContent = 'Connected. session_transport=' + (body.login && body.login.session_transport ? body.login.session_transport : 'unknown');
    await loadPrograms();
  }

  async function loadPrograms(){
    const p = await api('/api/usce/programs?active=true&limit=100');
    if (!p.ok){ el.authMsg.textContent = 'Failed to load programs: HTTP ' + p.status; return; }
    state.programs = Array.isArray(p.data && p.data.items) ? p.data.items : [];
    fillSeats();
  }

  async function createRequest(){
    const payload = {
      applicant_name: el.rqName.value.trim(), applicant_email: el.rqEmail.value.trim().toLowerCase(), applicant_phone_e164: el.rqPhone.value.trim() || null,
      program_seat_id: el.rqSeat.value, preferred_specialties: listCsv(el.rqSpecs.value), preferred_locations: listCsv(el.rqLocs.value), preferred_months: [], preference_rankings: {}, intake_payload: {}
    };
    const r = await api('/api/usce/requests', { method:'POST', body:payload });
    el.rqOut.textContent = JSON.stringify(r.data, null, 2);
  }

  async function loadPortal(){
    const token = el.portalToken.value.trim();
    if (!token){ el.portalOut.textContent = 'Enter portal token.'; return; }
    state.currentToken = token;
    const r = await api('/api/usce/portal/' + encodeURIComponent(token));
    state.currentOffer = r.ok ? (r.data && r.data.offer ? r.data.offer : null) : null;
    el.portalOut.textContent = JSON.stringify(r.data, null, 2);
    const canRespond = Boolean(r.ok && state.currentOffer);
    el.btnAccept.disabled = !canRespond;
    el.btnDecline.disabled = !canRespond;
  }

  async function respond(action){
    if (!state.currentToken){ return; }
    const r = await api('/api/usce/portal/' + encodeURIComponent(state.currentToken) + '/respond', { method:'POST', body:{ action } });
    el.portalOut.textContent = JSON.stringify(r.data, null, 2);
    await loadPortal();
  }

  document.getElementById('btnConnect').addEventListener('click', connect);
  document.getElementById('btnCreateReq').addEventListener('click', createRequest);
  document.getElementById('btnLoadPortal').addEventListener('click', loadPortal);
  document.getElementById('btnAccept').addEventListener('click', () => respond('ACCEPT'));
  document.getElementById('btnDecline').addEventListener('click', () => respond('DECLINE'));

  connect();
})();
</script>
</body>
</html>
