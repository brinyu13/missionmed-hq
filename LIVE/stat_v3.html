<!--
  LIVE/stat_v3.html
  STAT V3 side-route runtime.
  This file adapts the T-11 STAT V3 UI shell without replacing LIVE/stat.html.
  It preserves the existing screen IDs (#screen-version, #screen-setup,
  #screen-matchup, #screen-countdown, #screen-play, #screen-results).

  ============================================================
  WIRING AUTHORITY NOTES
  ============================================================
  1. Current /stat and LIVE/stat.html remain the legacy gameplay authority.
  2. STAT V3 keeps its own visual shell, but its menus and match lifecycle
     follow the legacy STAT contract: opponent pool, search/friend challenge,
     sealed pack load, timer/score pressure, results, and rematch.
  3. Player, opponent, avatar, sealed pack, submit, and result data are read
     through the live adapter/RPC layer when supplied.
  4. Theme persistence remains localStorage key 'mm_stat_theme'.

-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>STAT V3 | MissionMed</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bungee&family=Bungee+Inline&family=Russo+One&family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@1,700;1,900&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',system-ui,sans-serif;color:var(--fg);background:var(--bg);min-height:100vh;overflow-x:hidden;transition:background-color .4s ease,color .4s ease}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:5px}

:root{
  --f-bebas:'Bebas Neue',sans-serif;
  --f-bungee:'Bungee',sans-serif;
  --f-bungee-i:'Bungee Inline',sans-serif;
  --f-russo:'Russo One',sans-serif;
  --f-inter:'Inter',sans-serif;
  --f-cinzel:'Cinzel',serif;
  --f-playfair:'Playfair Display',serif;
}

/* ============================================================
   THEME SYSTEM | Dark Side (default) + Light Side
   Auto resolves to one of these two via prefers-color-scheme
   ============================================================ */
[data-theme="dark"]{
  --bg:#05070d;
  --bg-grad:radial-gradient(ellipse at 50% 0%,rgba(33,201,255,.18),transparent 60%),linear-gradient(180deg,#021024 0%,#04122a 50%,#021024 100%);
  --fg:#ffffff;
  --fg-muted:rgba(255,255,255,.65);
  --fg-soft:rgba(255,255,255,.45);
  --accent:#21c9ff;
  --accent-2:#fcd34d;
  --rim:#21c9ff;
  --opp-rim:#ef4444;
  --opp-accent:#ef4444;
  --card-bg:linear-gradient(180deg,rgba(33,201,255,.06),rgba(0,0,0,.4));
  --card-border:rgba(33,201,255,.3);
  --card-bg-elev:rgba(0,0,0,.45);
  --topbar-bg:rgba(8,10,18,.94);
  --topbar-border:rgba(255,255,255,.08);
  --tab-bg:rgba(255,255,255,.04);
  --tab-border:rgba(255,255,255,.08);
  --tab-color:rgba(255,255,255,.65);
  --pill-bg:rgba(255,255,255,.06);
  --shadow-soft:0 8px 30px rgba(0,0,0,.4);
  --shadow-hero:0 18px 50px rgba(0,0,0,.45);
  --scrollbar:rgba(255,255,255,.2);
  --podium-pulse-rgb:33,201,255;
  --logo-bg:linear-gradient(135deg,#0F2A44,#1B4870);
  --logo-mark:#D4A843;
  --logo-l1:#fff;
  --logo-l2:#D4A843;
  --display-font:var(--f-bungee-i);
  --display-letter:1px;
  --display-italic:normal;
}

[data-theme="light"]{
  --bg:#fbfaf6;
  --bg-grad:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,.22),transparent 55%),linear-gradient(180deg,#fbfaf6 0%,#eef2f7 50%,#fbfaf6 100%);
  --fg:#0F2A44;
  --fg-muted:rgba(15,42,68,.7);
  --fg-soft:rgba(15,42,68,.5);
  --accent:#0F2A44;
  --accent-2:#D4A843;
  --rim:#0F2A44;
  --opp-rim:#A41E22;
  --opp-accent:#A41E22;
  --card-bg:#ffffff;
  --card-border:rgba(15,42,68,.12);
  --card-bg-elev:#ffffff;
  --topbar-bg:rgba(255,255,255,.95);
  --topbar-border:rgba(15,42,68,.08);
  --tab-bg:#fbfaf6;
  --tab-border:rgba(15,42,68,.12);
  --tab-color:rgba(15,42,68,.65);
  --pill-bg:rgba(15,42,68,.06);
  --shadow-soft:0 8px 28px rgba(15,42,68,.08);
  --shadow-hero:0 18px 48px rgba(15,42,68,.1);
  --scrollbar:rgba(15,42,68,.18);
  --podium-pulse-rgb:212,168,67;
  --logo-bg:linear-gradient(135deg,#0F2A44,#1B4870);
  --logo-mark:#D4A843;
  --logo-l1:#0F2A44;
  --logo-l2:#D4A843;
  --display-font:var(--f-playfair);
  --display-letter:-1px;
  --display-italic:italic;
}

/* fallback for browsers without theme attr */
:root{color-scheme:dark light}

/* ============================================================
   APP SHELL
   ============================================================ */
.mm-shell{position:relative;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);transition:background .4s ease}
.mm-shell::before{content:'';position:absolute;inset:0;background:var(--bg-grad);pointer-events:none;z-index:0}

.mm-topbar{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:18px;padding:14px 26px;background:var(--topbar-bg);backdrop-filter:blur(14px);border-bottom:2px solid var(--topbar-border)}
.mm-logo{display:flex;align-items:center;gap:12px;flex-shrink:0}
.mm-logo-mark{width:46px;height:46px;border-radius:11px;background:var(--logo-bg);display:grid;place-items:center;font-family:var(--f-bungee);font-size:24px;color:var(--logo-mark);box-shadow:0 0 0 2px var(--logo-mark),0 6px 18px rgba(0,0,0,.3);letter-spacing:-1px}
.mm-logo-text{display:flex;flex-direction:column;line-height:1}
.mm-logo-text .l1{font-family:var(--f-bebas);font-size:18px;letter-spacing:3px;color:var(--logo-l1)}
.mm-logo-text .l2{font-family:var(--f-bebas);font-size:12px;letter-spacing:5px;color:var(--logo-l2);margin-top:2px}

.mm-topbar-spacer{flex:1}

/* Dark / Light / Auto theme switcher */
.mm-theme{display:flex;gap:5px;background:var(--tab-bg);padding:5px;border-radius:10px;border:2px solid var(--tab-border)}
.mm-theme-btn{display:flex;align-items:center;gap:7px;padding:9px 13px;font-family:var(--f-bebas);font-size:13px;letter-spacing:2px;color:var(--tab-color);border-radius:7px;transition:all .2s ease}
.mm-theme-btn:hover{color:var(--fg)}
.mm-theme-btn.active{background:var(--accent-2);color:#0F2A44;box-shadow:0 0 0 1px rgba(212,168,67,.5),0 4px 14px rgba(212,168,67,.2)}
.mm-theme-btn .ico{width:14px;height:14px;display:grid;place-items:center}
.mm-theme-btn[data-mode="dark"] .ico::before{content:'';width:10px;height:10px;border-radius:50%;background:#fcd34d;box-shadow:inset -3px -1px 0 currentColor;color:#04122a}
.mm-theme-btn[data-mode="light"] .ico::before{content:'';width:10px;height:10px;border-radius:50%;background:#fcd34d;box-shadow:0 0 4px #fcd34d,0 0 8px rgba(252,211,77,.5)}
.mm-theme-btn[data-mode="auto"] .ico::before{content:'';width:10px;height:10px;border-radius:50%;background:linear-gradient(90deg,#04122a 50%,#fcd34d 50%);border:1px solid currentColor}
.mm-arena-link{display:inline-flex;align-items:center;justify-content:center;padding:9px 13px;font-family:var(--f-bebas);font-size:13px;letter-spacing:2px;color:var(--fg);background:var(--tab-bg);border:2px solid var(--tab-border);border-radius:10px;text-transform:uppercase;white-space:nowrap}
.mm-arena-link:hover{border-color:var(--accent-2);color:var(--accent-2)}

/* [CODEX] dev-only scenario toggle | REMOVE for production */
.mm-scenario{display:flex;gap:5px;background:var(--tab-bg);padding:5px;border-radius:10px;border:2px solid var(--tab-border)}
.mm-scn{padding:8px 11px;font-family:var(--f-bebas);font-size:12px;letter-spacing:2px;color:var(--tab-color);border-radius:6px;transition:all .2s}
.mm-scn:hover{color:var(--fg)}
.mm-scn[data-scn="win"].active{background:#22C55E;color:#fff}
.mm-scn[data-scn="lose"].active{background:#EF4444;color:#fff}
.mm-scn[data-scn="wait"].active{background:#F59E0B;color:#0F2A44}
.mm-scn[data-scn="review"].active{background:#8B5CF6;color:#fff}
.mm-scn-label{font-family:var(--f-bebas);font-size:10px;letter-spacing:2px;color:var(--fg-soft);align-self:center;padding:0 4px}
body:not(.stat-v3-lab-mode) .mm-scenario{display:none}

/* step bar */
.mm-stepbar{display:flex;align-items:stretch;gap:0;padding:18px 26px;position:relative;z-index:10}
.mm-step{flex:1;position:relative;display:flex;align-items:center;gap:11px;padding:11px 9px;cursor:pointer;transition:all .25s ease}
.mm-step:not(:last-child)::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:22px;height:2px;background:var(--card-border)}
.mm-step .step-num{flex-shrink:0;width:46px;height:46px;border-radius:12px;background:var(--tab-bg);border:2px solid var(--tab-border);display:grid;place-items:center;font-family:var(--f-bungee);font-size:21px;color:var(--fg-soft);transition:all .3s ease}
.mm-step .step-info{display:flex;flex-direction:column;line-height:1.1;min-width:0}
.mm-step .step-label{font-family:var(--f-bebas);font-size:11px;letter-spacing:2px;color:var(--fg-soft)}
.mm-step .step-name{font-family:var(--f-russo);font-size:13px;color:var(--fg-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mm-step:hover .step-num{background:var(--pill-bg);color:var(--fg);transform:scale(1.05)}
.mm-step:hover .step-name{color:var(--fg)}
.mm-step.active .step-num{background:linear-gradient(135deg,var(--accent-2),#F5C84B);color:#0F2A44;border-color:var(--fg);box-shadow:0 0 0 4px rgba(212,168,67,.25),0 10px 26px rgba(212,168,67,.45);transform:scale(1.06)}
.mm-step.active .step-name{color:var(--fg)}
.mm-step.active .step-label{color:var(--accent-2)}
.mm-step.done .step-num{background:rgba(34,197,94,.18);border-color:#22C55E;color:#22C55E}

/* stage / screen */
.mm-stage{flex:1;position:relative;min-height:calc(100vh - 178px);z-index:1}
.screen{display:none;position:relative;min-height:calc(100vh - 178px);padding:0 22px 34px}
.screen.active{display:block;animation:screenIn .55s cubic-bezier(.2,.8,.2,1)}
@keyframes screenIn{0%{opacity:0;transform:translateY(20px) scale(.992);filter:blur(4px)}65%{filter:blur(0)}100%{opacity:1;transform:none;filter:blur(0)}}

@keyframes pulse-glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
@keyframes float-y{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin-slow{to{transform:rotate(360deg)}}
@keyframes bg-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes podium-pulse{0%,100%{box-shadow:0 0 60px 10px rgba(var(--rim-rgb,33 201 255),.6),0 0 0 2px rgba(255,255,255,.25)}50%{box-shadow:0 0 90px 14px rgba(var(--rim-rgb,33 201 255),.7),0 0 0 3px rgba(255,255,255,.5)}}
@keyframes holo-spin{to{transform:rotate(360deg)}}
@keyframes particle-float{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(0,-30px,0)}}

/* animated bg (always present, themed) */
.bg-canvas{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-particles{position:absolute;inset:0}
.bg-particles span{position:absolute;border-radius:50%;background:rgba(var(--podium-pulse-rgb),.4);opacity:.45;animation:particle-float 8s ease-in-out infinite}

/* ============================================================
   FORTNITE-SKIN AVATAR PODIUM
   ============================================================ */
.fb-podium{position:relative;display:inline-grid;place-items:end center;width:var(--fb-w,260px);height:var(--fb-h,300px)}
.fb-podium .pod{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80%;height:42px;border-radius:50%;background:radial-gradient(ellipse at center,var(--rarity-color,var(--rim)) 0%,rgba(0,0,0,0) 65%);filter:blur(7px);opacity:.9}
.fb-podium .ring{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:68%;height:14px;border-radius:50%;border:3px solid var(--rarity-color,var(--rim));background:radial-gradient(ellipse at center,rgba(255,255,255,.4) 0%,transparent 50%);opacity:.95;animation:podium-pulse 2.4s ease-in-out infinite}
.fb-podium .glow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:90%;height:65%;border-radius:50% 50% 0 0/100% 100% 0 0;background:radial-gradient(ellipse at center bottom,var(--rarity-color,var(--rim)) 0%,transparent 70%);filter:blur(22px);opacity:.7;pointer-events:none}
.fb-podium .holo{position:absolute;inset:8% 8% 18% 8%;border-radius:50% 50% 14% 14%/65% 65% 8% 8%;background:conic-gradient(from 0deg,transparent 0deg,rgba(var(--podium-pulse-rgb),.3) 60deg,transparent 120deg,rgba(252,211,77,.3) 180deg,transparent 240deg,rgba(var(--podium-pulse-rgb),.3) 300deg,transparent 360deg);filter:blur(24px);opacity:.55;animation:holo-spin 12s linear infinite;mix-blend-mode:screen}
.fb-podium .spotlight{position:absolute;top:-10%;left:50%;width:60%;height:60%;background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,transparent 100%);transform:translateX(-50%) skewY(-15deg);filter:blur(8px);opacity:.6;mix-blend-mode:overlay;pointer-events:none}
.fb-podium .char{position:relative;z-index:2;width:100%;height:calc(100% - 20px);display:grid;place-items:end center}
.fb-podium .char img{height:100%;width:auto;filter:drop-shadow(0 20px 28px rgba(0,0,0,.6)) drop-shadow(0 0 24px var(--rarity-color,var(--rim))) saturate(1.08) contrast(1.05)}
.fb-podium .skin-plate{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid var(--rarity-color,var(--rim));padding:6px 14px;font-family:var(--f-bebas);font-size:11px;letter-spacing:3px;color:var(--rarity-color,var(--rim));white-space:nowrap;border-radius:6px;box-shadow:0 0 14px rgba(0,0,0,.4);z-index:3}
.fb-podium .skin-plate strong{color:var(--accent-2);margin-right:6px}
.fb-podium.legendary{--rarity-color:#fcd34d}
.fb-podium.epic{--rarity-color:#c084fc}
.fb-podium.rare{--rarity-color:#60a5fa}
.fb-podium.common{--rarity-color:rgba(255,255,255,.6)}
.fb-podium.opp{--rarity-color:var(--opp-rim)}
.fb-podium.small{--fb-w:140px;--fb-h:170px}
.fb-podium.small .pod{height:24px;filter:blur(5px)}
.fb-podium.small .ring{bottom:9px;height:9px;border-width:2px}
.fb-podium.small .skin-plate{bottom:-16px;font-size:9px;padding:4px 10px;letter-spacing:2px}
.fb-podium.tiny{--fb-w:90px;--fb-h:120px}
.fb-podium.tiny .pod{height:14px;filter:blur(3px)}
.fb-podium.tiny .ring{bottom:5px;height:6px;border-width:1.5px}
.fb-podium.tiny .skin-plate{display:none}
.fb-podium.tiny .holo{display:none}
.fb-podium.large{--fb-w:340px;--fb-h:380px}

/* enhanced headshot helper */
.fb-head{position:relative;width:var(--head-size,40px);height:var(--head-size,40px);border-radius:50%;overflow:hidden;flex-shrink:0;background:rgba(0,0,0,.4);border:2px solid var(--rarity-color,var(--rim));box-shadow:0 0 0 1px rgba(255,255,255,.18),0 0 14px rgba(var(--podium-pulse-rgb),.35)}
.fb-head img{width:100%;height:100%;object-fit:cover;filter:saturate(1.05)}
.fb-head.legendary{--rarity-color:#fcd34d}
.fb-head.epic{--rarity-color:#c084fc}
.fb-head.rare{--rarity-color:#60a5fa}
.fb-head.opp{--rarity-color:var(--opp-rim)}
.fb-head.lg{--head-size:60px}
.fb-head.xl{--head-size:80px}

.trust-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:24px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.4);font-family:var(--f-bebas);font-size:12px;letter-spacing:2px;color:#15803d}
[data-theme="dark"] .trust-pill{color:#86efac}
.trust-pill::before{content:'';width:7px;height:7px;border-radius:50%;background:#22C55E;box-shadow:0 0 9px #22C55E}

/* ============================================================
   STAT BATTLE component (used in #screen-play)
   ============================================================ */
.stat-arena{position:relative;display:grid;grid-template-columns:390px 1fr 390px;gap:18px;min-height:calc(100vh - 210px)}
.stat-lane{position:relative;background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:20px 18px 0;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-soft)}
.stat-lane.opp{--rim:var(--opp-rim);background:var(--card-bg-opp,linear-gradient(180deg,rgba(239,68,68,.06),rgba(0,0,0,.4)));border-color:rgba(239,68,68,.3)}
[data-theme="light"] .stat-lane.opp{background:linear-gradient(180deg,rgba(164,30,34,.05),#fff);border-color:rgba(164,30,34,.2)}
.stat-lane-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.stat-lane-tag{font-family:var(--f-bebas);font-size:12px;letter-spacing:3px;color:var(--rim);background:var(--pill-bg);padding:4px 10px;border-radius:5px;border:1px solid var(--rim)}
.stat-lane-name{font-family:var(--f-bungee);font-size:22px;color:var(--fg);letter-spacing:.5px;line-height:1}
[data-theme="light"] .stat-lane-name{font-family:var(--f-cinzel);font-weight:900}
.stat-lane-school{font-family:var(--f-bebas);font-size:12px;letter-spacing:3px;color:var(--rim);margin-top:3px}
.stat-lane-score{font-family:var(--f-bungee);font-size:78px;color:var(--rim);line-height:1;margin-top:10px;text-shadow:0 0 32px rgba(var(--podium-pulse-rgb),.6)}
[data-theme="light"] .stat-lane-score{font-family:var(--f-cinzel);font-weight:900}
.stat-lane.opp .stat-lane-score{text-shadow:0 0 32px rgba(239,68,68,.5)}
.stat-lane-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.stat-lane-stat{background:var(--card-bg-elev);border:1px solid var(--card-border);border-radius:10px;padding:9px 6px;text-align:center}
.stat-lane-stat .v{font-family:var(--f-bungee);font-size:22px;color:var(--fg)}
[data-theme="light"] .stat-lane-stat .v{font-family:var(--f-cinzel);font-weight:900}
.stat-lane-stat .l{font-family:var(--f-bebas);font-size:10px;letter-spacing:2px;color:var(--fg-soft);margin-top:2px}
.stat-lane-status{margin-top:14px;padding:10px 14px;border-radius:10px;background:var(--pill-bg);border:1px dashed var(--card-border);font-family:var(--f-bebas);font-size:13px;letter-spacing:2px;color:var(--fg-muted);text-align:center}
.stat-lane-status.locked{background:rgba(34,197,94,.12);border-color:#22c55e;color:#15803d}
[data-theme="dark"] .stat-lane-status.locked{color:#86efac}
.stat-lane-status.thinking{background:rgba(245,158,11,.12);border-color:#f59e0b;color:#7a5e1c;animation:flash 1.6s infinite}
[data-theme="dark"] .stat-lane-status.thinking{color:#fcd34d}
.stat-lane-status.live{background:rgba(239,68,68,.12);border-color:#ef4444;color:#dc2626}
[data-theme="dark"] .stat-lane-status.live{color:#fca5a5}
.stat-lane-podium{flex:1;display:grid;place-items:end center;margin-top:8px;min-height:380px;padding-bottom:24px}

.stat-center{position:relative;background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-soft)}
.stat-center::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(var(--podium-pulse-rgb),.16) 0%,transparent 60%);pointer-events:none}
.stat-center-head{position:relative;display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px;z-index:2}
.stat-center-title{display:flex;flex-direction:column;line-height:1}
.stat-center-title .h{font-family:var(--f-bungee);font-size:22px;color:var(--fg);letter-spacing:.5px}
[data-theme="light"] .stat-center-title .h{font-family:var(--f-cinzel);font-weight:900}
.stat-center-title .s{font-family:var(--f-bebas);font-size:11px;letter-spacing:3px;color:var(--accent);margin-top:3px}
[data-theme="light"] .stat-center-title .s{color:var(--accent-2)}
.stat-pressure{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:30px;font-family:var(--f-bebas);font-size:12px;letter-spacing:2px;border:1px solid currentColor}
.stat-pressure.neutral{color:#7a5e1c;background:rgba(245,158,11,.12)}
[data-theme="dark"] .stat-pressure.neutral{color:#fcd34d}
.stat-pressure.danger{color:#dc2626;background:rgba(239,68,68,.15);animation:flash 1.4s infinite}
[data-theme="dark"] .stat-pressure.danger{color:#fca5a5}
.stat-pressure.calm{color:#15803d;background:rgba(34,197,94,.12)}
[data-theme="dark"] .stat-pressure.calm{color:#86efac}
.stat-pressure::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor}

.stat-q-stage{position:relative;display:grid;grid-template-columns:1fr 170px;gap:18px;align-items:start;background:var(--card-bg-elev);border:1px solid var(--card-border);border-radius:14px;padding:18px;margin-bottom:14px;z-index:2}
.stat-q-topic{display:inline-flex;align-items:center;gap:8px;padding:5px 11px;background:var(--pill-bg);border:1px solid var(--card-border);border-radius:30px;font-family:var(--f-bebas);font-size:11px;letter-spacing:3px;color:var(--accent);width:fit-content;margin-bottom:8px}
[data-theme="light"] .stat-q-topic{color:var(--accent-2)}
.stat-q-text{font-family:var(--f-inter);font-size:18px;font-weight:600;color:var(--fg);line-height:1.35;margin-bottom:14px}
.stat-q-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-q-choice{position:relative;display:grid;grid-template-columns:32px 1fr;gap:12px;padding:17px 16px;background:var(--pill-bg);border:1px solid var(--card-border);border-radius:12px;cursor:pointer;transition:all .2s;text-align:left;min-height:72px}
.stat-q-choice:hover{border-color:var(--accent);background:var(--card-bg-elev)}
.stat-q-choice.selected{border-color:var(--accent);background:rgba(var(--podium-pulse-rgb),.1);box-shadow:0 0 0 2px rgba(var(--podium-pulse-rgb),.18)}
.stat-q-choice.correct{border-color:#22c55e;background:rgba(34,197,94,.08)}
.stat-q-choice.wrong{border-color:#ef4444;background:rgba(239,68,68,.06)}
.stat-q-choice.ghost-picked{border-color:rgba(239,68,68,.7);box-shadow:0 0 0 2px rgba(239,68,68,.16)}
.stat-q-choice.ghost-picked::after{content:'';position:absolute;inset:0;border-radius:inherit;border:2px solid rgba(239,68,68,.88);animation:statGhostRing .9s ease;pointer-events:none}
.stat-q-choice.opponent-lock::before{content:'';position:absolute;inset:-2px;border-radius:inherit;border:1px solid rgba(252,211,77,.78);animation:statOpponentLock .55s ease;pointer-events:none}
.stat-q-choice.revealed{cursor:default}
.stat-q-choice:disabled{opacity:.96;cursor:default}
.stat-q-choice .k{font-family:var(--f-bungee);font-size:15px;color:var(--accent);text-align:center;width:32px;height:32px;border-radius:8px;background:var(--card-bg-elev);display:grid;place-items:center}
.stat-q-choice .t{font-family:var(--f-inter);font-size:15px;color:var(--fg);font-weight:700;line-height:1.35}
.stat-q-choice.locked{border-color:var(--accent-2);background:rgba(252,211,77,.12);box-shadow:0 0 0 2px rgba(252,211,77,.18)}
@keyframes statGhostRing{0%{box-shadow:0 0 0 0 rgba(239,68,68,.72)}100%{box-shadow:0 0 0 22px rgba(239,68,68,0)}}
@keyframes statOpponentLock{0%{opacity:.95;transform:scale(.96)}100%{opacity:0;transform:scale(1.08)}}
.stat-opponent-cursor{position:absolute;top:0;left:0;width:28px;height:28px;transform:translate(-999px,-999px);transition:opacity .18s ease;pointer-events:none;z-index:8;opacity:0}
.stat-opponent-cursor.active{opacity:1}
.stat-opponent-cursor .cursor-shell{position:absolute;inset:0}
.stat-opponent-cursor .cursor-shell.hovering{animation:statCursorJitter .17s steps(2,end) infinite}
.stat-opponent-cursor .cursor-ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(239,68,68,.92);box-shadow:0 0 16px rgba(239,68,68,.45);animation:statCursorPulse 1s ease-in-out infinite}
.stat-opponent-cursor .cursor-avatar{position:absolute;right:-9px;top:-11px;width:20px;height:20px;border-radius:50%;background:#ef4444;color:#fff;font-family:var(--f-bungee);font-size:10px;display:grid;place-items:center;box-shadow:0 0 12px rgba(239,68,68,.52)}
@keyframes statCursorJitter{0%{transform:translate(0,0)}25%{transform:translate(1px,-1px)}50%{transform:translate(-1px,0)}75%{transform:translate(0,1px)}100%{transform:translate(0,0)}}
@keyframes statCursorPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.08);opacity:1}}
.stat-ghost-presence{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding:9px 11px;border-radius:10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.26);font-family:var(--f-bebas);font-size:11px;letter-spacing:2px;color:#dc2626}
[data-theme="dark"] .stat-ghost-presence{color:#fca5a5}
.stat-ghost-presence .label{display:inline-flex;align-items:center;gap:7px}
.stat-ghost-presence .dot{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 10px currentColor}
.stat-ghost-presence.hovering .dot{animation:statCursorPulse .7s ease-in-out infinite}
.stat-ghost-presence.locking{background:rgba(252,211,77,.12);border-color:rgba(252,211,77,.44);color:#a16207}
[data-theme="dark"] .stat-ghost-presence.locking{color:#fcd34d}
.stat-ghost-presence.locked{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.34);color:#15803d}
[data-theme="dark"] .stat-ghost-presence.locked{color:#86efac}
.stat-q-meta{display:flex;flex-direction:column;align-items:center;gap:14px}
.stat-q-counter{font-family:var(--f-bebas);font-size:12px;letter-spacing:3px;color:var(--fg-soft);text-align:center}
.stat-q-counter .n{display:block;font-family:var(--f-bungee);font-size:24px;color:var(--fg);letter-spacing:0;line-height:1}
[data-theme="light"] .stat-q-counter .n{font-family:var(--f-cinzel);font-weight:900}
.stat-q-ring{position:relative;width:120px;height:120px}
.stat-q-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.stat-q-ring .track{fill:none;stroke:var(--card-border);stroke-width:8}
.stat-q-ring .bar{fill:none;stroke:url(#statRingGrad);stroke-width:8;stroke-linecap:round;stroke-dasharray:283;stroke-dashoffset:0;transition:stroke-dashoffset .8s linear}
.stat-q-ring .label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.stat-q-ring .label .v{font-family:var(--f-bungee);font-size:34px;color:var(--fg);text-shadow:0 0 22px rgba(var(--podium-pulse-rgb),.5)}
[data-theme="light"] .stat-q-ring .label .v{font-family:var(--f-cinzel);font-weight:900}
.stat-q-ring .label .l{font-family:var(--f-bebas);font-size:10px;letter-spacing:3px;color:var(--fg-soft);margin-top:2px}

.stat-q-history{position:relative;background:var(--card-bg-elev);border:1px solid var(--card-border);border-radius:14px;padding:12px;z-index:2}
.stat-q-history h4{font-family:var(--f-bebas);font-size:12px;letter-spacing:3px;color:var(--fg-soft);margin-bottom:8px}
.stat-q-history-row{display:grid;grid-template-columns:24px 90px 1fr auto auto;gap:8px;align-items:center;padding:6px 4px;border-bottom:1px dashed var(--card-border);font-family:var(--f-inter);font-size:13px;color:var(--fg)}
.stat-q-history-row:last-child{border-bottom:none}
.stat-q-history-row .qn{font-family:var(--f-bungee);font-size:14px;color:var(--fg-soft);text-align:center}
[data-theme="light"] .stat-q-history-row .qn{font-family:var(--f-cinzel);font-weight:900}
.stat-q-history-row.correct .qn{color:#15803d}
[data-theme="dark"] .stat-q-history-row.correct .qn{color:#86efac}
.stat-q-history-row.wrong .qn{color:#dc2626}
[data-theme="dark"] .stat-q-history-row.wrong .qn{color:#fca5a5}
.stat-q-history-row .topic{font-family:var(--f-bebas);font-size:10px;letter-spacing:2px;color:var(--accent)}
[data-theme="light"] .stat-q-history-row .topic{color:var(--accent-2)}
.stat-q-history-row .qtxt{font-family:var(--f-inter);font-size:12px;color:var(--fg-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stat-q-history-row .qtime{font-family:var(--f-bungee);font-size:13px;color:var(--fg-muted)}
.stat-q-history-row .qpts{font-family:var(--f-bungee);font-size:14px;color:var(--accent-2);min-width:50px;text-align:right}
.stat-q-history-row.correct .qpts{color:#15803d}
[data-theme="dark"] .stat-q-history-row.correct .qpts{color:#86efac}
.stat-q-history-row.wrong .qpts{color:#dc2626}
[data-theme="dark"] .stat-q-history-row.wrong .qpts{color:#fca5a5}

.stat-ticker{margin-top:auto;padding-top:14px;border-top:1px dashed var(--card-border);font-family:var(--f-bebas);font-size:12px;letter-spacing:3px;color:var(--fg-soft);overflow:hidden;display:flex;gap:30px;white-space:nowrap;position:relative;z-index:2}
.stat-ticker-track{display:flex;gap:40px;animation:ticker 24s linear infinite;flex-shrink:0}
.stat-ticker-item{display:inline-flex;align-items:center;gap:8px}
.stat-ticker-item::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent-2)}
body:not(.stat-v3-lab-mode) .stat-ticker,
body:not(.stat-v3-lab-mode) .stat-q-history.dev-only,
body:not(.stat-v3-lab-mode) .stat-v3-debug{display:none!important}
.stat-game-status{margin-top:12px;padding:12px 14px;border-radius:12px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.35);font-family:var(--f-inter);font-size:14px;color:var(--fg-muted);text-align:center}
.stat-game-status.warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.45)}
.stat-answer-feedback{margin-top:10px;padding:10px 12px;border-radius:10px;background:var(--pill-bg);border:1px solid var(--card-border);font-family:var(--f-bebas);letter-spacing:2px;color:var(--fg-muted)}
.stat-answer-feedback.correct{background:rgba(34,197,94,.12);border-color:#22c55e;color:#15803d}
.stat-answer-feedback.wrong{background:rgba(239,68,68,.1);border-color:#ef4444;color:#dc2626}
.stat-play-actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}
.stat-auto-submit{padding:14px 18px;border-radius:12px;background:linear-gradient(135deg,var(--accent-2),#F5C84B);color:#0F2A44;font-family:var(--f-bungee);font-size:14px;letter-spacing:2px;text-transform:uppercase}
.stat-auto-submit[disabled]{opacity:.45;cursor:not-allowed}
.stat-timer{display:grid;place-items:center;width:128px;height:128px;border-radius:50%;border:3px solid var(--accent-2);background:rgba(252,211,77,.1);box-shadow:0 0 28px rgba(252,211,77,.25);font-family:var(--f-bungee);color:var(--accent-2)}
.stat-timer .time{font-size:38px;line-height:1}
.stat-timer .label{font-family:var(--f-bebas);font-size:10px;letter-spacing:3px;color:var(--fg-soft)}
.stat-progress-mini{font-family:var(--f-bebas);font-size:12px;letter-spacing:3px;color:var(--fg-soft);text-align:center;margin-top:8px}

@media (max-width:1100px){.stat-arena{grid-template-columns:1fr}.stat-q-stage{grid-template-columns:1fr}.stat-q-meta{flex-direction:row;justify-content:center}}
@media (max-width:980px){.mm-stepbar{flex-wrap:wrap}.mm-step{flex:1 1 calc(33% - 4px)}}

/* ============================================================
   SCREEN: VERSION SELECT (#screen-version)
   ============================================================ */
.s-version{display:grid;grid-template-columns:1fr 360px;gap:18px;min-height:calc(100vh - 210px)}
.s-version-main{display:flex;flex-direction:column;gap:18px}
.s-version-head{display:flex;flex-direction:column;gap:6px;flex-wrap:wrap}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-bebas);font-size:12px;letter-spacing:5px;color:var(--accent);width:fit-content}
.eyebrow::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 10px var(--accent-2);animation:pulse-glow 1.6s infinite}
.s-version-head h1{font-family:var(--display-font);font-style:var(--display-italic);font-weight:900;font-size:50px;line-height:.95;letter-spacing:var(--display-letter);color:var(--fg)}
.s-version-head h1 .acc{color:var(--accent-2)}
.s-version-head .sub{font-family:var(--f-bebas);font-size:13px;letter-spacing:4px;color:var(--fg-soft);margin-top:4px}

.modes-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mode-card{position:relative;background:var(--card-bg);border:2px solid var(--card-border);border-radius:14px;padding:20px;cursor:pointer;transition:all .25s ease;overflow:hidden}
.mode-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow-hero)}
.mode-card.current{border-color:var(--accent-2);background:linear-gradient(180deg,rgba(252,211,77,.1),var(--card-bg-elev));box-shadow:0 0 0 2px rgba(212,168,67,.25),var(--shadow-hero)}
.mode-card.current::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent-2),transparent);background-size:200% 100%;animation:bg-shift 2.4s linear infinite}
.mode-status{display:inline-flex;align-items:center;gap:7px;padding:4px 11px;border-radius:30px;font-family:var(--f-bebas);font-size:11px;letter-spacing:3px;background:rgba(34,197,94,.12);border:1px solid #22c55e;color:#15803d;margin-bottom:10px}
[data-theme="dark"] .mode-status{color:#86efac}
.mode-status::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.mode-card.current .mode-status{background:rgba(252,211,77,.15);border-color:var(--accent-2);color:#7a5e1c}
[data-theme="dark"] .mode-card.current .mode-status{color:var(--accent-2)}
.mode-card.coming .mode-status{background:var(--pill-bg);border-color:var(--card-border);color:var(--fg-soft)}
.mode-title{font-family:var(--f-bungee);font-size:24px;color:var(--fg);letter-spacing:.5px;line-height:1}
[data-theme="light"] .mode-title{font-family:var(--display-font);font-style:var(--display-italic);font-weight:900;letter-spacing:-.5px}
.mode-tag{font-family:var(--f-bebas);font-size:12px;letter-spacing:3px;color:var(--accent);margin-top:4px}
[data-theme="light"] .mode-tag{color:var(--accent-2)}
.mode-desc{font-family:var(--f-inter);font-size:13px;color:var(--fg-muted);line-height:1.4;margin-top:10px}
.mode-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.mode-stat{background:var(--card-bg-elev);border:1px solid var(--card-border);border-left:3px solid var(--accent);padding:7px 10px;border-radius:0 6px 6px 0}
.mode-stat .v{font-family:var(--f-bungee);font-size:18px;color:var(--accent-2)}
[data-theme="light"] .mode-stat .v{font-family:var(--f-cinzel);font-weight:900;color:var(--fg)}
.mode-stat .l{font-family:var(--f-bebas);font-size:10px;letter-spacing:2px;color:var(--fg-soft);margin-top:2px}
.mode-cta{margin-top:14px;padding:16px 18px;font-family:var(--f-bungee);font-size:15px;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),#0099ff);color:#fff;border-radius:10px;width:100%;text-align:center;transition:transform .15s ease}
[data-theme="light"] .mode-cta{background:var(--accent);color:var(--accent-2);font-family:var(--f-cinzel);font-weight:900;letter-spacing:3px;text-transform:uppercase}
.mode-cta:hover{transform:translateY(-2px)}
.mode-card.coming .mode-cta{background:var(--pill-bg);color:var(--fg-soft);cursor:not-allowed}

.s-version-side{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden;box-shadow:var(--shadow-soft)}
.s-version-side::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-2),var(--accent));background-size:200% 100%;animation:bg-shift 3s linear infinite}
.s-version-side h3{font-family:var(--f-bungee);font-size:18px;color:var(--fg);letter-spacing:1px}
[data-theme="light"] .s-version-side h3{font-family:var(--f-cinzel);font-weight:900}
.profile-pod-wrap{position:relative;width:100%;height:260px;display:grid;place-items:end center;padding-bottom:30px}
.profile-info{text-align:center;padding-top:8px;border-top:1px dashed var(--card-border)}
.profile-info .nm{font-family:var(--f-bungee);font-size:24px;color:var(--fg);letter-spacing:.5px}
[data-theme="light"] .profile-info .nm{font-family:var(--f-cinzel);font-weight:900}
.profile-info .sub{font-family:var(--f-bebas);font-size:12px;letter-spacing:3px;color:var(--accent-2);margin-top:3px}
.profile-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:6px}
.profile-stat{background:var(--card-bg-elev);border-left:3px solid var(--accent-2);padding:9px 11px}
.profile-stat .v{font-family:var(--f-bungee);font-size:18px;color:var(--accent-2)}
[data-theme="light"] .profile-stat .v{font-family:var(--f-cinzel);font-weight:900;color:var(--fg)}
.profile-stat .l{font-family:var(--f-bebas);font-size:10px;letter-spacing:2px;color:var(--fg-soft);margin-top:2px}
.profile-rank{padding:14px;background:linear-gradient(135deg,rgba(252,211,77,.18),rgba(var(--podium-pulse-rgb),.08));border:1px solid rgba(252,211,77,.4);border-radius:12px}
.profile-rank-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-family:var(--f-bebas);font-size:11px;letter-spacing:3px;color:var(--fg-soft)}
.profile-rank-head .v{font-family:var(--f-bungee);font-size:20px;color:var(--accent-2)}
[data-theme="light"] .profile-rank-head .v{font-family:var(--f-cinzel);font-weight:900}
.profile-rank-bar{height:8px;background:var(--pill-bg);border-radius:5px;overflow:hidden;position:relative}
.profile-rank-bar .fill{position:absolute;inset:0;width:62%;background:linear-gradient(90deg,var(--accent),var(--accent-2))}

@media (max-width:1100px){.s-version{grid-template-columns:1fr}.modes-grid{grid-template-columns:1fr}}

/* ============================================================
   SCREEN: SETUP (#screen-setup)
   ============================================================ */
.s-setup{display:grid;grid-template-columns:1fr 340px;gap:18px;min-height:calc(100vh - 210px)}
.s-setup-main{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:24px;box-shadow:var(--shadow-soft)}
.s-setup-head{margin-bottom:24px}
.s-setup-head h2{font-family:var(--display-font);font-style:var(--display-italic);font-weight:900;font-size:38px;color:var(--fg);line-height:1;letter-spacing:var(--display-letter)}
.s-setup-head h2 .acc{color:var(--accent-2)}
.s-setup-head .sub{font-family:var(--f-inter);font-size:13px;color:var(--fg-muted);line-height:1.5;margin-top:8px;max-width:560px}
.cfg-group{margin-bottom:16px}
.cfg-label{font-family:var(--f-bebas);font-size:11px;letter-spacing:5px;color:var(--accent);margin-bottom:10px}
[data-theme="light"] .cfg-label{color:var(--accent-2);font-family:var(--f-cinzel);font-weight:900}
.cfg-options{display:flex;gap:8px;flex-wrap:wrap}
.cfg-opt{padding:16px 20px;font-family:var(--f-bebas);font-size:15px;letter-spacing:2px;background:var(--pill-bg);border:2px solid var(--card-border);border-radius:12px;color:var(--fg-muted);cursor:pointer;transition:all .2s ease;display:flex;flex-direction:column;align-items:flex-start;line-height:1;min-height:68px;min-width:145px}
.cfg-opt:hover{border-color:var(--accent);color:var(--fg)}
.cfg-opt.active{background:var(--card-bg-elev);border-color:var(--accent);color:var(--fg);box-shadow:0 0 0 1px rgba(var(--podium-pulse-rgb),.18)}
[data-theme="light"] .cfg-opt.active{border-color:var(--fg);box-shadow:0 4px 14px rgba(15,42,68,.1)}
.cfg-opt .h{font-size:14px}
[data-theme="light"] .cfg-opt .h{font-family:var(--f-cinzel);font-weight:900}
.cfg-opt .s{font-family:var(--f-inter);font-size:11px;font-weight:500;color:var(--fg-soft);margin-top:3px;letter-spacing:0;text-transform:none}
.cfg-opt.active .s{color:var(--accent-2)}

.s-setup-side{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:12px;position:sticky;top:170px;align-self:flex-start;overflow:hidden;box-shadow:var(--shadow-soft)}
.s-setup-side::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-2),var(--accent));background-size:200% 100%;animation:bg-shift 3s linear infinite}
.summary-tag{font-family:var(--f-bebas);font-size:11px;letter-spacing:5px;color:var(--accent)}
[data-theme="light"] .summary-tag{color:var(--accent-2)}

.stat-flow-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px}

.flow-btn{min-width:150px;padding:15px 20px;border-radius:12px;font-family:var(--f-bungee);font-size:14px;letter-spacing:2px;text-transform:uppercase;background:var(--pill-bg);color:var(--fg);border:1px solid var(--card-border)}

/* ============================================================
   SCREEN: MATCHUP (#screen-matchup) | Tale of the Tape
   ============================================================ */
.s-matchup{position:relative;background:var(--card-bg);border:2px solid var(--accent-2);border-radius:18px;min-height:calc(100vh - 210px);overflow:hidden;padding:26px;box-shadow:0 0 0 5px var(--bg),0 0 0 6px rgba(212,168,67,.3)}
.s-matchup::before{content:'';position:absolute;top:0;bottom:0;left:0;width:5px;background:linear-gradient(180deg,var(--accent-2),#a78640);box-shadow:0 0 18px rgba(212,168,67,.5)}
.s-matchup::after{content:'';position:absolute;top:0;bottom:0;right:0;width:5px;background:linear-gradient(180deg,var(--accent-2),#a78640);box-shadow:0 0 18px rgba(212,168,67,.5)}
.s-matchup-head{text-align:center;margin-bottom:22px;position:relative;z-index:2}
.opp-found{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-bebas);font-size:13px;letter-spacing:5px;color:#15803d;background:rgba(34,197,94,.12);padding:7px 16px;border:1px solid #16a34a;border-radius:30px;margin-bottom:10px}
[data-theme="dark"] .opp-found{color:#86efac}
.opp-found::before{content:'';width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse-glow 1.4s infinite}
.s-matchup-head h2{font-family:var(--display-font);font-style:var(--display-italic);font-weight:900;font-size:48px;color:var(--fg);letter-spacing:var(--display-letter)}
.s-matchup-head h2 .acc{color:var(--accent-2)}
.s-matchup-head .sub{font-family:var(--f-inter);font-size:14px;color:var(--fg-muted);max-width:560px;margin:8px auto 0;line-height:1.45}
.tape{display:grid;grid-template-columns:1fr auto 1fr;gap:0;background:var(--card-bg-elev);border:1px solid rgba(212,168,67,.4);border-radius:14px;overflow:hidden;position:relative;z-index:2}
.tape-side{position:relative;padding:24px 26px;display:flex;flex-direction:column;gap:14px}
.tape-side.you{background:linear-gradient(135deg,rgba(var(--podium-pulse-rgb),.18),var(--card-bg))}
[data-theme="light"] .tape-side.you{background:linear-gradient(135deg,rgba(15,42,68,.06),var(--card-bg))}
.tape-side.opp{background:linear-gradient(135deg,rgba(239,68,68,.16),var(--card-bg));text-align:right;align-items:flex-end}
[data-theme="light"] .tape-side.opp{background:linear-gradient(135deg,rgba(164,30,34,.06),var(--card-bg))}
.tape-corner{font-family:var(--f-bebas);font-size:13px;letter-spacing:5px;background:var(--accent);color:#fff;padding:6px 14px;border-radius:5px;display:inline-block;width:fit-content;position:relative;z-index:2}
[data-theme="light"] .tape-corner{background:var(--accent);color:var(--accent-2)}
.tape-side.opp .tape-corner{background:var(--opp-accent);color:#fff}
.tape-portrait{width:240px;height:300px;align-self:center;position:relative;z-index:2;padding-bottom:24px}
.tape-name{font-family:var(--display-font);font-style:var(--display-italic);font-weight:900;font-size:38px;color:var(--fg);letter-spacing:var(--display-letter);line-height:.95;position:relative;z-index:2}
.tape-school{font-family:var(--f-bebas);font-size:12px;letter-spacing:4px;color:var(--accent-2);position:relative;z-index:2}
.tape-rank{font-family:var(--f-bebas);font-size:11px;letter-spacing:3px;color:var(--fg-soft);position:relative;z-index:2;margin-top:-6px}
.tape-mid{display:grid;grid-auto-rows:1fr;background:var(--card-bg);border-left:1px solid var(--accent-2);border-right:1px solid var(--accent-2);min-width:220px}
.tape-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:13px 18px;border-bottom:1px solid rgba(212,168,67,.18)}
.tape-row:last-child{border-bottom:none}
.tape-row .v{font-family:var(--f-bungee);font-size:20px;color:var(--fg);letter-spacing:1px}
[data-theme="light"] .tape-row .v{font-family:var(--f-cinzel);font-weight:900}
.tape-row .v.you{color:var(--accent)}
[data-theme="light"] .tape-row .v.you{color:var(--fg)}
.tape-row .v.opp{color:var(--opp-accent)}
.tape-row .l{font-family:var(--f-bebas);font-size:11px;letter-spacing:3px;color:var(--accent-2);text-align:center}
.s-matchup-cta-row{display:flex;justify-content:center;gap:12px;margin-top:22px;position:relative;z-index:2}
.cta-primary{padding:18px 40px;font-family:var(--f-bungee);font-size:20px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent-2),#f5a623);color:#0F2A44;border-radius:10px;box-shadow:0 0 0 3px var(--bg),0 10px 26px rgba(212,168,67,.5);text-transform:uppercase}
[data-theme="light"] .cta-primary{font-family:var(--f-cinzel);font-weight:900}
.cta-secondary{padding:18px 30px;font-family:var(--f-bungee);font-size:16px;letter-spacing:3px;background:transparent;color:var(--fg);border:2px solid var(--card-border);border-radius:10px;text-transform:uppercase}
[data-theme="light"] .cta-secondary{font-family:var(--f-cinzel);font-weight:900}
.cta-primary:hover,.cta-secondary:hover{transform:translateY(-3px)}

@media (max-width:1100px){.tape{grid-template-columns:1fr}.tape-side.opp{text-align:left;align-items:flex-start}.tape-mid{order:3}}

/* ============================================================
   SCREEN: COUNTDOWN (#screen-countdown)
   ============================================================ */
.s-countdown{position:relative;display:grid;grid-template-columns:1fr auto 1fr;gap:0;min-height:calc(100vh - 210px);background:var(--card-bg);border:1px solid var(--accent-2);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-hero)}
.cd-corner{position:relative;padding:36px;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(180deg,rgba(var(--podium-pulse-rgb),.18),var(--card-bg))}
[data-theme="light"] .cd-corner{background:linear-gradient(180deg,rgba(15,42,68,.06),var(--card-bg))}
.cd-corner.opp{background:linear-gradient(180deg,rgba(239,68,68,.18),var(--card-bg));text-align:right;align-items:flex-end}
[data-theme="light"] .cd-corner.opp{background:linear-gradient(180deg,rgba(164,30,34,.06),var(--card-bg))}

.cd-corner-tag{font-family:var(--f-bebas);font-size:13px;letter-spacing:5px;background:var(--accent);color:#fff;padding:6px 14px;border-radius:5px;display:inline-block;width:fit-content;position:relative;z-index:2}
[data-theme="light"] .cd-corner-tag{color:var(--accent-2)}
.cd-corner.opp .cd-corner-tag{background:var(--opp-accent);color:#fff}
.cd-corner-name{font-family:var(--display-font);font-style:var(--display-italic);font-weight:900;font-size:40px;color:var(--fg);letter-spacing:var(--display-letter);line-height:.95;margin-top:10px;position:relative;z-index:2}
.cd-corner-meta{font-family:var(--f-bebas);font-size:12px;letter-spacing:3px;color:var(--accent-2);margin-top:6px;position:relative;z-index:2}
.cd-mid{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;background:linear-gradient(180deg,#021024,#04122a);color:#fff;border-left:1px solid var(--accent-2);border-right:1px solid var(--accent-2)}
.cd-mid::before{content:'';position:absolute;inset:0;background:repeating-conic-gradient(from 0deg at 50% 50%,rgba(252,211,77,.06) 0deg 4deg,transparent 4deg 12deg);animation:spin-slow 24s linear infinite}
.cd-tag{font-family:var(--f-bebas);font-size:13px;letter-spacing:6px;color:var(--accent-2);background:rgba(252,211,77,.12);padding:6px 14px;border:1px solid var(--accent-2);border-radius:30px;position:relative;z-index:2}
.cd-num{font-family:var(--f-bungee);font-size:200px;color:var(--accent-2);line-height:.9;text-shadow:0 0 80px var(--accent-2);margin-top:18px;position:relative;z-index:2;animation:pulse-glow 1.6s infinite}
[data-theme="light"] .cd-num{font-family:var(--f-cinzel);font-weight:900}
.cd-vs{font-family:var(--f-bungee);font-size:60px;color:#fff;text-shadow:0 0 28px var(--accent);margin-top:14px;position:relative;z-index:2}
[data-theme="light"] .cd-vs{font-family:var(--display-font);font-style:var(--display-italic);font-weight:900}
.cd-rules{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap;justify-content:center;position:relative;z-index:2}
.cd-rule{padding:7px 13px;font-family:var(--f-bebas);font-size:11px;letter-spacing:2px;color:var(--accent-2);background:rgba(252,211,77,.1);border:1px solid var(--accent-2);border-radius:6px}

@media (max-width:1100px){.s-countdown{grid-template-columns:1fr}.cd-podium{position:relative;top:auto;left:auto;transform:none;margin:0 auto}}

/* ============================================================
   SCREEN: RESULTS (#screen-results)
   ============================================================ */
.s-results{position:relative;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:24px;min-height:calc(100vh - 210px)}
.result-card{position:relative;background:var(--card-bg);border:3px solid var(--accent-2);border-radius:18px;padding:30px;overflow:hidden;text-align:center;box-shadow:var(--shadow-hero)}
.result-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(252,211,77,.18),transparent 60%);pointer-events:none}
.result-card::after{content:'';position:absolute;inset:0;background:repeating-conic-gradient(from 0deg at 50% 30%,rgba(252,211,77,.06) 0deg 4deg,transparent 4deg 12deg);animation:spin-slow 24s linear infinite;pointer-events:none}
.result-card > *{position:relative;z-index:2}
.result-tag{font-family:var(--f-bebas);font-size:13px;letter-spacing:6px;color:var(--accent-2);background:rgba(252,211,77,.12);padding:6px 16px;border:1px solid var(--accent-2);border-radius:30px;display:inline-block}
.result-title{font-family:var(--display-font);font-style:var(--display-italic);font-weight:900;font-size:64px;color:var(--fg);line-height:.95;letter-spacing:var(--display-letter);margin-top:14px;text-shadow:0 0 30px rgba(var(--podium-pulse-rgb),.4)}
.result-title .acc{color:var(--accent-2)}
.result-podium{width:280px;height:340px;margin:14px auto;position:relative}
.result-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.result-stat{background:var(--card-bg-elev);border-left:4px solid var(--accent-2);padding:14px}
.result-stat .v{font-family:var(--f-bungee);font-size:30px;color:var(--accent-2)}
[data-theme="light"] .result-stat .v{font-family:var(--f-cinzel);font-weight:900;color:var(--fg)}
.result-stat .l{font-family:var(--f-bebas);font-size:11px;letter-spacing:2px;color:var(--fg-soft);margin-top:3px}
.result-elo{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:18px;padding:14px;background:var(--card-bg-elev);border:1px solid rgba(212,168,67,.4);border-radius:12px}
.result-elo .l{font-family:var(--f-bebas);font-size:11px;letter-spacing:3px;color:var(--fg-soft)}
.result-elo .v{font-family:var(--f-bungee);font-size:32px}
[data-theme="light"] .result-elo .v{font-family:var(--f-cinzel);font-weight:900}
.result-elo .v.up{color:#15803d}
[data-theme="dark"] .result-elo .v.up{color:#86efac}
.result-elo .v.down{color:#dc2626}
[data-theme="dark"] .result-elo .v.down{color:#fca5a5}

.result-side{display:flex;flex-direction:column;gap:18px}
.replay-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:20px;box-shadow:var(--shadow-soft)}
.replay-card h3{font-family:var(--f-bungee);font-size:18px;color:var(--fg);letter-spacing:1px;margin-bottom:14px}
[data-theme="light"] .replay-card h3{font-family:var(--f-cinzel);font-weight:900}
.replay-row{display:grid;grid-template-columns:24px 90px 1fr auto auto;gap:8px;align-items:center;padding:8px 4px;border-bottom:1px dashed var(--card-border);font-family:var(--f-inter);font-size:13px;color:var(--fg)}
.replay-row:last-child{border-bottom:none}
.replay-row .qn{font-family:var(--f-bungee);font-size:14px;text-align:center;color:var(--fg-soft)}
[data-theme="light"] .replay-row .qn{font-family:var(--f-cinzel);font-weight:900}
.replay-row.correct .qn{color:#15803d}
[data-theme="dark"] .replay-row.correct .qn{color:#86efac}
.replay-row.wrong .qn{color:#dc2626}
[data-theme="dark"] .replay-row.wrong .qn{color:#fca5a5}
.replay-row .topic{font-family:var(--f-bebas);font-size:10px;letter-spacing:2px;color:var(--accent)}
[data-theme="light"] .replay-row .topic{color:var(--accent-2)}
.replay-row .qtxt{font-family:var(--f-inter);font-size:12px;color:var(--fg-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.replay-row .qtime{font-family:var(--f-bungee);font-size:13px;color:var(--fg-muted)}
.replay-row .qpts{font-family:var(--f-bungee);font-size:14px;min-width:50px;text-align:right;color:var(--accent-2)}
.replay-row.correct .qpts{color:#15803d}
[data-theme="dark"] .replay-row.correct .qpts{color:#86efac}
.replay-row.wrong .qpts{color:#dc2626}
[data-theme="dark"] .replay-row.wrong .qpts{color:#fca5a5}
.result-cta-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.result-cta{padding:14px;font-family:var(--f-bungee);font-size:14px;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),#0099ff);color:#fff;border-radius:10px;text-align:center}
[data-theme="light"] .result-cta{background:var(--accent);color:var(--accent-2);font-family:var(--f-cinzel);font-weight:900}
.result-cta.alt{background:var(--pill-bg);color:var(--fg);border:1px solid var(--card-border)}
.result-cta:hover{transform:translateY(-2px)}
.highlights-card{background:linear-gradient(135deg,rgba(252,211,77,.14),var(--card-bg-elev));border:1px solid rgba(212,168,67,.4);border-radius:14px;padding:18px}
.highlights-card h3{font-family:var(--f-bungee);font-size:15px;color:var(--accent-2);letter-spacing:2px;margin-bottom:10px}
[data-theme="light"] .highlights-card h3{font-family:var(--f-cinzel);font-weight:900}
.highlights-card .row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--card-border);font-family:var(--f-inter);font-size:13px;color:var(--fg)}
.highlights-card .row:last-child{border-bottom:none}
.highlights-card .row .v{font-family:var(--f-bungee);font-size:15px;color:var(--accent-2)}
[data-theme="light"] .highlights-card .row .v{font-family:var(--f-cinzel);font-weight:900}
.stat-v3-placeholder{width:100%;height:100%;display:grid;place-items:center;text-align:center;font-family:var(--f-bungee);font-size:clamp(18px,4vw,48px);color:var(--fg-soft);background:linear-gradient(135deg,rgba(33,201,255,.08),rgba(252,211,77,.08));border:1px dashed var(--card-border);border-radius:inherit}
.stat-v3-blocked{min-height:420px;display:grid;place-items:center;padding:32px;background:var(--card-bg);border:2px dashed var(--card-border);border-radius:16px;text-align:center;box-shadow:var(--shadow-soft)}
.stat-v3-blocked h3{font-family:var(--display-font);font-style:var(--display-italic);font-weight:900;font-size:clamp(32px,5vw,64px);line-height:.95;color:var(--fg);letter-spacing:var(--display-letter);margin-bottom:14px}
.stat-v3-blocked p{font-family:var(--f-inter);font-size:15px;line-height:1.6;color:var(--fg-muted);max-width:680px;margin:0 auto}
.stat-v3-status-list{display:grid;gap:8px;margin:18px auto 0;max-width:620px;text-align:left}
.stat-v3-status-list li{list-style:none;font-family:var(--f-inter);font-size:13px;color:var(--fg-muted);padding:9px 12px;background:var(--pill-bg);border:1px solid var(--card-border);border-radius:10px}
.stat-v3-live-status{margin-top:12px;font-family:var(--f-inter);font-size:13px;color:var(--fg-muted);text-align:center}

@media (max-width:1100px){.s-results{grid-template-columns:1fr}}
</style>

<script>
/* ============================================================

function safeObj(value){return value&&typeof value==='object'?value:{};}
function pickText(values){
  const list=Array.isArray(values)?values:[];
  for(const value of list){
    if(typeof value==='string'&&value.trim())return value.trim();
    if(typeof value==='number'&&Number.isFinite(value))return String(value);
  }
  return '';
}

    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'

  return {

}

async function postJson(url,body,extraHeaders,credentialsMode){

    method:'POST',
    credentials:credentialsMode||'include',
    cache:'no-store',
    headers:Object.assign({'Content-Type':'application/json'},safeObj(extraHeaders)),
    body:JSON.stringify(body||{})
  });
  let payload=null;
  try{payload=await response.json();}catch(e){payload=null;}
  return {ok:response.ok,status:response.status,payload};
}

async function runStatV3Bootstrap(exchangeResult){
  const headers={};
  const bearer=pickText([exchangeResult&&exchangeResult.accessToken]);
  const csrfToken=pickText([exchangeResult&&exchangeResult.csrfToken]);
  if(bearer)headers.Authorization='Bearer '+bearer;
  if(csrfToken)headers['X-MMHQ-CSRF']=csrfToken;
  try{
    const bootstrap=await postJson(STAT_V3_AUTH_BOOTSTRAP_URL,{},headers,'include');
    if(!bootstrap.ok)return {ok:false,reason:'auth_bootstrap_http_'+bootstrap.status};
    const tokens=getSupabaseSessionTokens(bootstrap.payload);
    if(tokens.access_token&&tokens.refresh_token)return {ok:true,tokens};
    return {ok:false,reason:'auth_bootstrap_tokens_missing'};
  }catch(e){
    return {ok:false,reason:'auth_bootstrap_request_failed'};
  }
}
async function ensureStatV3SupabaseSession(){
  const client=statV3Supabase();
  if(!client||!client.auth||typeof client.auth.getUser!=='function')return {ok:false,reason:'supabase_client_unavailable'};
  if(statV3SessionPromise)return statV3SessionPromise;
  statV3SessionPromise=(async()=>{
    const preExisting=await client.auth.getUser();
    const preUser=preExisting&&preExisting.data?preExisting.data.user:null;
    const preUserId=pickText([preUser&&preUser.id]);
    if(preUserId){
      statV3VerifiedUserId=preUserId;
      return {ok:true,source:'existing_session',user:preUser};
    }
    const exchange=await runStatV3AuthExchange();
    if(!exchange.ok)return {ok:false,reason:exchange.reason||'auth_exchange_failed'};
    const bootstrap=await runStatV3Bootstrap(exchange);
    if(!bootstrap.ok)return {ok:false,reason:bootstrap.reason||'auth_bootstrap_failed'};
    if(typeof client.auth.setSession!=='function')return {ok:false,reason:'supabase_set_session_unavailable'};
    const setResult=await client.auth.setSession({
      access_token:bootstrap.tokens.access_token,
      refresh_token:bootstrap.tokens.refresh_token
    });
    if(setResult&&setResult.error)return {ok:false,reason:String(setResult.error.message||'set_session_failed')};
    const verified=await client.auth.getUser();
    const verifiedUser=verified&&verified.data?verified.data.user:null;
    const verifiedUserId=pickText([verifiedUser&&verifiedUser.id]);
    if(!verifiedUserId)return {ok:false,reason:'supabase_user_missing'};
    statV3VerifiedUserId=verifiedUserId;
    return {ok:true,source:'bootstrap',user:verifiedUser};
  })();
  try{return await statV3SessionPromise;}finally{statV3SessionPromise=null;}
}
function normalizeRpcEnvelope(raw){
  if(!raw||typeof raw!=='object')return {ok:false,error:'empty_rpc_response',data:null,raw};
  if(Object.prototype.hasOwnProperty.call(raw,'ok')){
    return {ok:!!raw.ok,error:raw.ok?null:String(raw.error||'rpc_error'),data:raw.data||null,raw};
  }
  if(Object.prototype.hasOwnProperty.call(raw,'status')){
    const status=String(raw.status||'').toLowerCase();
    return {ok:status==='ok'||status==='exists',error:status==='error'?String(raw.code||raw.message||'rpc_error'):null,data:raw,raw};
  }
  return {ok:true,error:null,data:raw,raw};
}
async function statV3RpcCall(name,args){
  const session=await ensureStatV3SupabaseSession();
  if(!session.ok)throw new Error(session.reason||'auth_required');
  const client=statV3Supabase();
  if(!client||typeof client.rpc!=='function')throw new Error('supabase_rpc_unavailable');
  const result=await client.rpc(name,args||{});
  if(result&&result.error)throw new Error(String(result.error.message||result.error.code||'rpc_failed'));
  return normalizeRpcEnvelope(result?result.data:null);
}

function statV3UniqueRoster(rows){

  const out=[];
  (Array.isArray(rows)?rows:[]).forEach(row=>{
    if(!row||!row.id||seen.has(row.id))return;
    seen.add(row.id);
    out.push(row);
  });

}

function statV3ResultFromFetch(envelope){

  const metadata=safeObj(result.metadata);
  const total=pickText([self.total_questions,metadata.total_questions,QUESTIONS.length]);
  const correct=pickText([self.correct_count]);

    verdict='WAITING FOR OPPONENT';
  }
  return {
    verdict,
    total:total||String(QUESTIONS.length||'-'),
    correct:correct||'-',
    score,
    avg,
    streak:'-',
    elo:finalized?pickText([winner===userId?result.rating_delta_winner:result.rating_delta_loser]):'',
    rank:'',

function unwrapPackPayload(input){
  if(Array.isArray(input))return {questions:input};
  const source=safeObj(input);
  if(!objectHasKeys(source))return {};
  if(Array.isArray(source.questions)||Array.isArray(source.question_ids))return source;
  const data=safeObj(source.data);
  if(Array.isArray(data.questions)||objectHasKeys(data.duel)){
    return Object.assign({},safeObj(data.duel),{questions:Array.isArray(data.questions)?data.questions:[]});
  }
  const nested=[
    source.pack,
    source.duelPack,
    source.sealedPack,
    source.sealedQuestionPack,
    source.questionPack,
    source.currentPack
  ];
  for(const item of nested){
    const value=unwrapPackPayload(item);
    if(objectHasKeys(value))return value;
  }
  return source;
}

function normalizeChoiceOrder(order){
  if(!Array.isArray(order)||order.length!==4)return [];
  const normalized=order.map(item=>String(item||'').trim().toUpperCase());
  const valid=normalized.every(item=>LETTERS.includes(item))&&(new Set(normalized)).size===4;
  return valid?normalized:[];
}
function normalizeChoiceIndexOrder(order){
  if(!Array.isArray(order)||order.length!==4)return [];
  const normalized=order.map(item=>Number(item));
  const valid=normalized.every(item=>Number.isInteger(item)&&item>=0&&item<4)&&(new Set(normalized)).size===4;
  return valid?normalized:[];
}
function normalizeChoices(rawChoices,choiceOrder){
  if(Array.isArray(rawChoices)){
    const choices=rawChoices.slice(0,4).map((choice,index)=>{
      const source=safeObj(choice);
      const text=typeof choice==='string'?choice:pickText([source.t,source.text,source.label,source.value]);
      return {k:pickText([source.k,source.key,source.letter,LETTERS[index]])||LETTERS[index],t:String(text||'').trim()};
    }).filter(choice=>choice.t);
    const indexOrder=normalizeChoiceIndexOrder(choiceOrder);
    if(indexOrder.length){
      const ordered=indexOrder.map(item=>choices[item]).filter(Boolean);
      if(ordered.length===choices.length)return ordered;
    }
    const order=normalizeChoiceOrder(choiceOrder);
    if(order.length){
      const byKey={};
      choices.forEach(choice=>{byKey[String(choice.k||'').trim().toUpperCase()]=choice;});
      const ordered=order.map(key=>byKey[key]).filter(Boolean);
      if(ordered.length===choices.length)return ordered;
    }
    return choices;
  }
  const obj=safeObj(rawChoices);
  const order=normalizeChoiceOrder(choiceOrder);
  const labels=order.length?order:LETTERS;
  return labels.map(letter=>({k:letter,t:String(obj[letter]||obj[letter.toLowerCase()]||'').trim()})).filter(choice=>choice.t);
}
function normalizeStatV3AnswerKey(value){
  const raw=String(value==null?'':value).trim().toUpperCase();

  if(/^[1-4]$/.test(raw))return LETTERS[Number(raw)-1];
  return '';
}

  for(const key of directKeys){
    const value=Number(source[key]);

      if(value>=1&&value<=choices.length)return value-1;
    }
  }
  const key=normalizeStatV3AnswerKey(pickText([

    source.correctAnswer,

  if(key){
    const keyedIndex=choices.findIndex(choice=>String(choice.k||'').trim().toUpperCase()===key);

const THEME_KEY='mm_stat_theme';
function resolveAuto(){
  /* [CODEX] auto resolution policy:
     1) if user system prefers-color-scheme: dark | light, honor it
     2) otherwise fall back to time-of-day: 6am-6pm = light, else dark */
  if(window.matchMedia){
    const m=window.matchMedia('(prefers-color-scheme: dark)');
    if(m.media!=='not all'){return m.matches?'dark':'light';}
  }
  const h=new Date().getHours();
  return (h>=6&&h<18)?'light':'dark';
}
function applyTheme(mode){
  const resolved=mode==='auto'?resolveAuto():mode;
  document.body.setAttribute('data-theme',resolved);
  document.querySelectorAll('.mm-theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  try{localStorage.setItem(THEME_KEY,mode);}catch(e){}
}
function initTheme(){
  let saved='auto';
  try{saved=localStorage.getItem(THEME_KEY)||'auto';}catch(e){}
  applyTheme(saved);
  if(window.matchMedia){
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{
      const cur=(localStorage.getItem(THEME_KEY)||'auto');
      if(cur==='auto')applyTheme('auto');

}

function statV3MoveGhostCursorTo(x,y,durationMs,opts){

  const options=opts||{};

  statV3SetGhostStatus(STAT_V3_GHOST.status,STAT_V3_GHOST.label);
  const start=Object.assign({x:-999,y:-999},STAT_V3_GHOST.cursor);
  const end={x:Number(x),y:Number(y)};
  const dx=end.x-start.x;
  const dy=end.y-start.y;
  const dist=Math.hypot(dx,dy);
  if(!Number.isFinite(dist)||dist<3){
    cursor.style.transform='translate('+end.x+'px,'+end.y+'px)';

  const curve=statV3Clamp(dist*statV3Rand(.06,.16),8,34)*(Math.random()<.5?-1:1);

    {transform:'translate('+start.x+'px,'+start.y+'px)'},
    {transform:'translate('+(start.x+(dx*.34)+curve)+'px,'+(start.y+(dy*.28)-curve*.45)+'px)'},
    {transform:'translate('+(start.x+(dx*.72)-curve*.55)+'px,'+(start.y+(dy*.7)+curve*.25)+'px)'}

  }

function statV3PickGhostPlan(q,index){

  const answered=Object.keys(STAT_V3_HUMAN.ghostSelections||{}).length;
  const pattern=[true,true,false,true,true,false,true,true,true,false];
  const patternCorrect=pattern[answered%pattern.length];
  const confidence=statV3Clamp(.76+paceBias+statV3Rand(-.12,.11),.42,.93);
  const willCorrect=canScore&&(patternCorrect||Math.random()<confidence);
  const correctIndex=canScore?q.correctIndex:Math.floor(Math.random()*4);
  let pickedIndex=willCorrect?correctIndex:statV3RandomWrongChoice(correctIndex);
  const trickType=!willCorrect&&Math.random()<.5?'hover-correct-then-switch':(Math.random()<.35?'long-hover-multiple':'scan-then-lock');

function statV3RecordGhostAnswer(q,plan){

  const timedOut=data.timedOut===true;
  const canScore=statV3CanScoreQuestion(q);
  const pickedIndex=timedOut?-1:Number(data.pickedIndex);
  const correct=canScore&&!timedOut&&pickedIndex===q.correctIndex;
  const answerMs=Math.max(0,Math.min(STAT_V3_QUESTION_SECONDS*1000,Math.round(Number(data.answerMs||STAT_V3_QUESTION_SECONDS*1000))));
  const points=canScore&&correct?statV3PointsAtElapsedMs(answerMs):0;
  STAT_V3_HUMAN.ghostSelections[q.id]={
    choice_index:Number.isInteger(pickedIndex)?pickedIndex:-1,
    correct,
    points,
    time_ms:answerMs,
    timedOut,
    sealed:!canScore
  };
  window.MM_STAT_V3_HUMAN=STAT_V3_HUMAN;
  statV3AudioCue(correct||!canScore?'ghost-correct':'ghost-wrong');
  statV3SetGhostStatus('locked',timedOut?'Rival timed out':'Rival locked');

function statV3ScheduleGhostPlan(q,index){
  if(!q||statV3GhostSelection(q)||STAT_V3_HUMAN.submitted)return;
  if(STAT_V3_GHOST.activeQuestionId===q.id)return;
  statV3ClearGhostPlan(false);
  STAT_V3_GHOST.activeQuestionId=q.id;
  const plan=statV3PickGhostPlan(q,index);
  statV3QueueGhost(80,statV3ResetGhostCursor);
  const scanOrder=statV3Shuffle([0,1,2,3]).slice(0,plan.trickType==='long-hover-multiple'?4:3);
  scanOrder.forEach((choiceIndex,scanIndex)=>{
    statV3QueueGhost(420+(scanIndex*430),()=>{
      statV3SetGhostStatus(scanIndex===0?'thinking':'hovering',statV3GhostActivityText(scanIndex===0?'reading':'scanning'));
      statV3AudioCue('hover');
      statV3MoveGhostCursorToChoice(choiceIndex,Math.round(statV3Rand(230,520)),{overshoot:true,hoverAfter:true});
    });
  });
  if(plan.canScore&&!plan.willCorrect&&plan.trickType==='hover-correct-then-switch'){
    statV3QueueGhost(Math.max(900,plan.answerMs-1550),()=>{
      statV3SetGhostStatus('hovering','Hovering on the right answer...');
      statV3MoveGhostCursorToChoice(plan.correctIndex,420,{overshoot:true,hoverAfter:true});
    });
    statV3QueueGhost(Math.max(1100,plan.answerMs-760),()=>{
      statV3SetGhostStatus('locking','Switching late...');
      statV3AudioCue('lock');
      statV3MoveGhostCursorToChoice(plan.pickedIndex,520,{overshoot:true,hoverAfter:true,easing:'cubic-bezier(.29,.56,.43,1)'});
    });
  }else if(plan.canScore&&plan.willCorrect&&Math.random()<.55){
    const decoy=statV3RandomWrongChoice(plan.correctIndex);
    statV3QueueGhost(Math.max(900,plan.answerMs-1500),()=>{
      statV3SetGhostStatus('hovering','Testing a decoy...');
      statV3MoveGhostCursorToChoice(decoy,380,{overshoot:true,hoverAfter:true});
    });
    statV3QueueGhost(Math.max(1100,plan.answerMs-740),()=>{
      statV3SetGhostStatus('locking',statV3GhostActivityText('locking'));
      statV3AudioCue('lock');
      statV3MoveGhostCursorToChoice(plan.pickedIndex,500,{overshoot:true,hoverAfter:true,easing:'cubic-bezier(.18,.8,.2,1)'});
    });
  }else{
    statV3QueueGhost(Math.max(850,plan.answerMs-720),()=>{
      statV3SetGhostStatus('locking',statV3GhostActivityText('locking'));
      statV3AudioCue('lock');
      statV3MoveGhostCursorToChoice(plan.pickedIndex,Math.round(statV3Rand(340,720)),{overshoot:true,hoverAfter:true});
    });
  }
  statV3QueueGhost(plan.answerMs,()=>statV3RecordGhostAnswer(q,plan));
}

}

let statV3CountdownTimer=null;

let statV3AudioContext=null;
function statV3EnsureAudioReady(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return null;
    statV3AudioContext=statV3AudioContext||new Ctx();
    if(statV3AudioContext&&statV3AudioContext.state==='suspended')statV3AudioContext.resume();
    return statV3AudioContext;
  }catch(e){
    return null;
  }
}
function statV3PlayTone(freq,duration,type,gain){
  const ctx=statV3EnsureAudioReady();
  if(!ctx)return;
  const osc=ctx.createOscillator();
  const node=ctx.createGain();
  const now=ctx.currentTime;
  osc.type=type||'sine';
  osc.frequency.setValueAtTime(freq,now);
  node.gain.setValueAtTime(.0001,now);
  node.gain.exponentialRampToValueAtTime(Math.max(.0001,Number(gain||.045)),now+.018);
  node.gain.exponentialRampToValueAtTime(.0001,now+Math.max(.04,Number(duration||.1)));
  osc.connect(node);
  node.connect(ctx.destination);
  osc.start(now);
  osc.stop(now+Math.max(.04,Number(duration||.1)));
}
function statV3AudioCue(kind){
  if(kind==='go'){
    statV3PlayTone(720,.16,'triangle',.055);
    setTimeout(()=>statV3PlayTone(980,.2,'triangle',.045),70);
    return;
  }
  if(kind==='tick'){statV3PlayTone(460,.12,'sine',.04);return;}
  if(kind==='ui'){statV3PlayTone(530,.05,'square',.018);return;}
  if(kind==='correct'){
    statV3PlayTone(660,.1,'triangle',.05);
    setTimeout(()=>statV3PlayTone(820,.12,'triangle',.043),70);
    return;
  }
  if(kind==='wrong'){statV3PlayTone(220,.14,'sawtooth',.032);return;}
  if(kind==='ghost-correct'){
    statV3PlayTone(420,.08,'triangle',.028);
    setTimeout(()=>statV3PlayTone(520,.1,'triangle',.026),48);
    return;
  }
  if(kind==='ghost-wrong'){statV3PlayTone(180,.09,'sine',.02);return;}
  if(kind==='hover'){statV3PlayTone(360,.045,'sine',.014);return;}
  if(kind==='lock'){statV3PlayTone(600,.06,'square',.02);return;}
  if(kind==='result-win'){
    statV3PlayTone(600,.14,'triangle',.05);
    setTimeout(()=>statV3PlayTone(760,.16,'triangle',.045),80);
    return;
  }
  if(kind==='result-loss'){statV3PlayTone(240,.16,'sawtooth',.03);return;}
  statV3PlayTone(440,.1,'sine',.035);
}

function statV3ComputeStats(limit){
  const cap=Number.isFinite(Number(limit))?Math.max(0,Math.min(QUESTIONS.length,Number(limit))):QUESTIONS.length;
  let score=0;
  let correct=0;
  let totalMs=0;
  let answered=0;
  let streak=0;
  let bestStreak=0;
  QUESTIONS.slice(0,cap).forEach(q=>{
    const selected=statV3Selection(q);
    if(!selected)return;
    answered+=1;
    score+=Math.max(0,Number(selected.points||0));
    totalMs+=Math.max(0,Number(selected.time_ms||0));
    if(selected.correct){
      correct+=1;
      streak+=1;
      bestStreak=Math.max(bestStreak,streak);
    }else{
      streak=0;
    }
  });
  return {
    score,
    correct,
    answered,
    total:cap,
    avgMs:answered?Math.round(totalMs/answered):0,
    avg:answered?(totalMs/answered/1000).toFixed(1)+'s':'-',
    streak,
    bestStreak
  };
}
function statV3OpponentStats(answeredCount){
  const count=Math.max(0,Math.min(QUESTIONS.length,Number(answeredCount||0)));
  let score=0;
  let correct=0;
  let totalMs=0;
  let streak=0;
  let bestStreak=0;
  let ghostAnswered=0;
  for(let i=0;i<count;i+=1){
    const q=QUESTIONS[i];
    const ghost=q?statV3GhostSelection(q):null;
    if(!ghost)continue;
    const ok=ghost.correct===true;
    const ms=Math.max(0,Number(ghost.time_ms||0));
    const points=Math.max(0,Number(ghost.points||0));
    ghostAnswered+=1;
    totalMs+=ms;
    if(ok){
      correct+=1;
      streak+=1;
      bestStreak=Math.max(bestStreak,streak);
      score+=points;
    }else{
      streak=0;
    }
  }
  return {
    score,
    correct,
    answered:ghostAnswered,
    avg:ghostAnswered?(totalMs/ghostAnswered/1000).toFixed(1)+'s':'-',
    streak,
    bestStreak
  };
}
function statV3SelectionMessage(q,selected){
  if(!selected)return 'Choose your answer before the 15-second clock runs down.';
  if(selected.timedOut)return 'Time expired. Correct answer highlighted. Next question coming up.';
  if(selected.sealed)return 'Answer locked. Server scoring will reveal final correctness.';
  if(selected.correct){
    const pace=statV3PaceBand(selected.time_ms);
    if(pace==='fast')return 'Correct. Fast lock bonus: +'+selected.points+'. Next question coming up.';
    if(pace==='slow')return 'Correct, but late: +'+selected.points+'. Faster answers score more.';
    return 'Correct: +'+selected.points+'. Next question coming up.';
  }
  return 'Incorrect: +0. Correct answer highlighted. Next question coming up.';
}
function statV3BuildLocalResult(){
  const stats=statV3ComputeStats();
  const opp=statV3OpponentStats(QUESTIONS.length);
  const verdict=stats.score>opp.score?'WIN':(stats.score<opp.score?'LOSS':'DRAW');
  return {
    verdict,
    total:String(QUESTIONS.length),
    correct:String(stats.correct),
    score:String(stats.score),
    avg:stats.avg,
    streak:String(stats.bestStreak),
    elo:'',
    rank:'STAT Match',
    opponentScore:String(opp.score),
    replayRows:QUESTIONS.map((q,index)=>{
      const selected=statV3Selection(q)||{};
      const picked=Number.isInteger(selected.choice_index)&&selected.choice_index>=0&&q.choices[selected.choice_index]
        ? q.choices[selected.choice_index].k
        : 'TIME';
      const correctKey=statV3CanScoreQuestion(q)&&q.choices[q.correctIndex]?q.choices[q.correctIndex].k:'SERVER';
      return {
        topic:q.topic,
        q:q.q,
        time:selected.time_ms?(Number(selected.time_ms)/1000).toFixed(1)+'s':'-',
        points:String(selected.points||0),
        selected:picked,
        correct:correctKey,
        isCorrect:selected.correct===true
      };
    }),
    finalized:true,
    local:true
  };
}
