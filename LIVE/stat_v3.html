function scheduleStatV3Advance(){
  if(statV3AdvanceTimer)clearTimeout(statV3AdvanceTimer);
  statV3AdvanceTimer=setTimeout(()=>{
    statV3AdvanceTimer=null;
    const current=QUESTIONS[Math.max(0,Math.min(QUESTIONS.length-1,Number(STAT_V3_HUMAN.qIndex||0)))]||QUESTIONS[0];
    if(current&&!statV3GhostSelection(current)){
      statV3ForceGhostSoon(current);
      scheduleStatV3Advance();
      return;
    }
    const lastQuestion=STAT_V3_HUMAN.qIndex>=QUESTIONS.length-1;
    if(lastQuestion&&statV3AllQuestionsAnswered()&&!STAT_V3_HUMAN.submitted){
      STAT_V3_HUMAN.submitStatus='queued';
      Promise.resolve(statV3SubmitAttempt()).then(()=>setStep('6')).catch(e=>{
        updateHumanState({submitStatus:'blocked',message:'Could not finish duel yet.',error:String(e&&e.message?e.message:e).slice(0,160)});
      });
      return;
    }
    if(!lastQuestion){
      updateHumanState({qIndex:Math.min(Math.max(0,QUESTIONS.length-1),STAT_V3_HUMAN.qIndex+1)});
    }
  },1200);
}
function statV3RecordAnswer(question,index,timedOut){
  if(!question||STAT_V3_HUMAN.selections[question.id])return;
  const started=STAT_V3_HUMAN.questionStartedAt[question.id]||Date.now();
  const elapsedMs=timedOut?STAT_V3_QUESTION_SECONDS*1000:Math.min(STAT_V3_QUESTION_SECONDS*1000,Math.max(250,Date.now()-started));
  const canScore=statV3CanScoreQuestion(question);
  const correct=canScore&&!timedOut&&Number(index)===question.correctIndex;
  const points=canScore&&correct?statV3PointsAtElapsedMs(elapsedMs):0;
  STAT_V3_HUMAN.selections[question.id]={
    choice_index:Number.isInteger(Number(index))?Number(index):-1,
    time_ms:Math.max(0,Math.round(elapsedMs)),
    correct,
    points,
    timedOut:!!timedOut,
    sealed:!canScore
  };
  statV3AudioCue(canScore?(correct?'correct':'wrong'):'correct');
  renderActive();
  scheduleStatV3Advance();
}
function statV3HandleTimeoutIfNeeded(){
  if(String(shell.dataset.step)!=='5'||!QUESTIONS.length)return;
  const q=QUESTIONS[Math.max(0,Math.min(QUESTIONS.length-1,Number(STAT_V3_HUMAN.qIndex||0)))]||QUESTIONS[0];
  if(!q||STAT_V3_HUMAN.selections[q.id])return;
  if(statV3QuestionSecondsRemaining(q.id)<=0)statV3RecordAnswer(q,-1,true);
}

function statCenter(qIndex){
  if(!QUESTIONS.length)return wiringBlockedPanel('Pack not connected',readinessReasons());
  const safeIndex=Math.max(0,Math.min(QUESTIONS.length-1,Number(qIndex||0)));
  const q=QUESTIONS[safeIndex]||QUESTIONS[0];
  if(q&&!STAT_V3_HUMAN.questionStartedAt[q.id])STAT_V3_HUMAN.questionStartedAt[q.id]=Date.now();
  const selected=statV3Selection(q);
  const ghostSelected=statV3GhostSelection(q);
  const canScore=statV3CanScoreQuestion(q);
  const choices=q.choices.map((c,index)=>{
    const picked=selected&&selected.choice_index===index;
    const ghostPicked=ghostSelected&&ghostSelected.choice_index===index&&!ghostSelected.timedOut;
    const isCorrect=selected&&canScore&&index===q.correctIndex;
    const isWrong=picked&&selected&&!selected.correct&&!selected.timedOut&&canScore;
    const cls=[
      picked?'selected locked':'',
      ghostPicked?'ghost-picked opponent-lock':'',
      isCorrect?'correct':'',
      isWrong?'wrong':'',
      selected?'revealed':''
    ].filter(Boolean).join(' ');
    return `<button class="stat-q-choice ${cls}" type="button" data-choice-index="${index}" data-question-id="${escapeHtml(q.id)}" ${selected?'disabled':''}><div class="k">${escapeHtml(c.k)}</div><div class="t">${escapeHtml(c.t)}</div></button>`;
  }).join('');
  const answeredCount=QUESTIONS.filter(item=>STAT_V3_HUMAN.selections[item.id]).length;
  const allAnswered=statV3AllQuestionsAnswered();
  const remaining=statV3QuestionSecondsRemaining(q.id);
  const livePoints=statV3LiveQuestionPoints(q);
  const finishing=STAT_V3_HUMAN.submitStatus==='queued'||STAT_V3_HUMAN.submitStatus==='submitting';
  const waitingForGhost=selected&&!ghostSelected&&!finishing;
  const status=STAT_V3_HUMAN.submitStatus==='submitting'
    ? 'Locking in your duel...'
    : (finishing?'Finishing your duel...':(waitingForGhost?'Answer locked. Rival is still choosing...':(allAnswered?'All answers locked. Finishing your duel now.':statV3SelectionMessage(q,selected))));
  const feedback=selected&&canScore
    ? `<div class="stat-answer-feedback ${selected.correct?'correct':'wrong'}">${selected.correct?'Correct':'Incorrect'} • +${escapeHtml(selected.points||0)} • ${escapeHtml((Number(selected.time_ms||0)/1000).toFixed(1))}s</div>`
    : (selected?'<div class="stat-answer-feedback">Answer locked for server scoring.</div>':'');
  const ghostPresenceCls=ghostSelected?'locked':(STAT_V3_GHOST.status||'thinking');
  const ghostPresenceLabel=ghostSelected?(ghostSelected.timedOut?'Rival timed out':'Rival locked'):(STAT_V3_GHOST.label||'Reading stem...');
  return `<div class="stat-center"><div class="stat-center-head"><div class="stat-center-title"><div class="h">STAT DUEL</div><div class="s">Question ${safeIndex+1} of ${QUESTIONS.length}</div></div><div class="stat-pressure ${remaining<=5&&!selected?'danger':selected?'calm':'neutral'}">${answeredCount}/${QUESTIONS.length} LOCKED</div></div><div class="stat-q-stage"><div><span class="stat-q-topic">${escapeHtml(q.topic)}</span><div class="stat-q-text">${escapeHtml(q.q)}</div><div class="stat-q-choices">${choices}</div><div class="stat-ghost-presence ${escapeHtml(ghostPresenceCls)}" id="stat-v3-ghost-presence"><span class="label"><span class="dot"></span>Rival Cursor</span><span id="stat-v3-ghost-action">${escapeHtml(ghostPresenceLabel)}</span></div>${feedback}<div class="stat-game-status ${remaining<=5&&!selected?'warn':''}" id="stat-v3-live-status">${escapeHtml(status)}</div><div class="stat-play-actions">${allAnswered&&!STAT_V3_HUMAN.submitted&&!finishing?`<button class="stat-auto-submit" type="button" id="stat-v3-submit-attempt" ${statV3ActiveDuelId?'':'disabled'}>Finish Duel</button>`:''}</div></div><div class="stat-q-meta"><div class="stat-timer"><div><div class="time">${remaining}</div><div class="label">SECONDS</div></div></div><div class="stat-q-counter"><span class="n">${safeIndex+1} / ${QUESTIONS.length}</span>QUESTION</div>${statQuestionRing(livePoints)}<div class="stat-progress-mini">Score ${statV3ComputeStats().score}</div></div><div class="stat-opponent-cursor" id="stat-v3-opponent-cursor" aria-hidden="true"><div class="cursor-shell" id="stat-v3-cursor-shell"><div class="cursor-ring"></div><div class="cursor-avatar">R</div></div></div></div><div class="stat-q-history dev-only"><h4>Question log</h4>${statHistory(safeIndex+1)}</div><div class="stat-ticker"><div class="stat-ticker-track"><span class="stat-ticker-item">15-second clock</span><span class="stat-ticker-item">Rival cursor pressures answers</span><span class="stat-ticker-item">Fast correct answers score more</span><span class="stat-ticker-item">Correct answer reveals after lock</span></div></div></div>`;
}

function statValue(value,suffix){
  const safe=String(value==null?'-':value).trim()||'-';
  return escapeHtml(safe==='-'?safe:safe+(suffix||''));
}
function resultValue(payload,keys,fallback){
  const source=safeObj(payload);
  for(const key of keys){
    if(source[key]!=null&&String(source[key]).trim())return String(source[key]).trim();
  }
  return fallback||'-';
}
function normalizeResultPayload(payload){
  const result=safeObj(payload);
  if(!Object.keys(result).length)return null;
  const verdict=String(result.verdict||result.outcome||result.status||'result').toUpperCase();
  const total=resultValue(result,['total','totalQ','yourTotalQ'],'-');
  const correct=resultValue(result,['correct','yourCorrect'],'-');
  const score=resultValue(result,['score','yourScore','finalScore'],'-');
  const avg=resultValue(result,['avgTime','avg_time','yourAvgText','avgLabel'],'-');
  const streak=resultValue(result,['streak','bestStreak','yourStreak'],'-');
  const elo=resultValue(result,['eloChange','elo_delta','rankDelta'],'');
  const rank=resultValue(result,['rankText','rank','newRank'],'');
  const opponentScore=resultValue(result,['opponentScore','oppScore','rivalScore'],'');
  const rows=Array.isArray(result.replayRows)?result.replayRows:(Array.isArray(result.reviewLog)?result.reviewLog:[]);
  return {verdict,total,correct,score,avg,streak,elo,rank,opponentScore,rows};
}

          <h2>Match <span class="acc">Settings</span></h2>
          <div class="sub">Same STAT contract, V3 shell: pick the opponent path, question settings, tempo, and match points.</div>
        </div>
        <div class="cfg-group">
          <div class="cfg-label">OPPONENT POOL</div>
          <div class="cfg-options">
            ${opt('opponent','similar','Random','Similar rank')}
            ${opt('opponent','open','Random','Open pool')}
            ${opt('opponent','friend','Friend','Search / invite')}
          </div>
        </div>
        <div class="cfg-group">
          <div class="cfg-label">DIFFICULTY</div>
          <div class="cfg-options">
            ${opt('difficulty','step1','Step 1','Foundations')}
            ${opt('difficulty','step2','Step 2','Clinical reasoning')}
            ${opt('difficulty','mixed','Mixed','Both styles')}
          </div>
        </div>
        <div class="cfg-group">
          <div class="cfg-label">QUESTION COUNT</div>
          <div class="cfg-options">
            ${opt('count','20','20','Quick duel')}
            ${opt('count','40','40','Full match')}
            ${opt('count','60','60','Endurance')}
          </div>
        </div>
        <div class="cfg-group">
          <div class="cfg-label">OPPONENT TEMPO</div>
          <div class="cfg-options">
            ${opt('pace','steady','Steady','Measured')}
            ${opt('pace','balanced','Balanced','Adaptive')}
            ${opt('pace','aggressive','Aggressive','Fast locks')}
          </div>
        </div>
        <div class="cfg-group">
          <div class="cfg-label">MATCH POINTS WAGER</div>
          <div class="cfg-options">
            ${opt('wager','50','50 MP','Low stakes')}
            ${opt('wager','100','100 MP','Standard')}
            ${opt('wager','250','250 MP','High stakes')}
          </div>
        </div>
        ${flowNav('1','3','Next: '+nextLabel)}
      </div>
      <aside class="s-setup-side">
        <div class="summary-tag">MATCH SETTINGS SUMMARY</div>
        <div class="summary-row"><span>Player</span><span class="v">${YOU.id?'Ready':'Sign in'}</span></div>
        <div class="summary-row"><span>Opponent</span><span class="v">${escapeHtml(oppMap[STAT_V3_SETUP.opponent]||'Friend/Search')}</span></div>
        <div class="summary-row"><span>Questions</span><span class="v">${escapeHtml(STAT_V3_SETUP.count)}</span></div>
        <div class="summary-row"><span>Difficulty</span><span class="v">${escapeHtml(diffMap[STAT_V3_SETUP.difficulty]||'Step 2')}</span></div>
        <div class="summary-row"><span>Tempo</span><span class="v">${escapeHtml(paceMap[STAT_V3_SETUP.pace]||'Balanced')}</span></div>
        <div class="summary-row"><span>Wager</span><span class="v">${escapeHtml(STAT_V3_SETUP.wager)} MP</span></div>
        <div class="summary-row big"><span>Next</span><span class="v">${escapeHtml(nextLabel)}</span></div>
        <button class="summary-cta nav-next" type="button" data-step-target="3">${escapeHtml(nextLabel)}</button>
      </aside>
    </div>`;
};

RENDERERS['3']=function(){
  const root=document.getElementById('screen-matchup');
  const readyLabel=wiringIsReady()?'Ready Check':'Start Random Match';
  root.innerHTML=`
    <div class="s-setup">
      <div class="s-setup-main">
        <div class="s-setup-head">
          <h2>Find <span class="acc">Opponent</span></h2>
          <div class="sub">Invite a classmate or join an invite. Both players get the same questions in the same order.</div>
        </div>
        ${statV3HumanPanel()}
        ${flowNav('2','4',readyLabel,{nextDisabled:false,extra:STAT_V3_HUMAN.inviteUrl?`<button class="flow-btn" type="button" id="stat-v3-copy-invite">Copy Invite</button>`:''})}
      </div>
      <aside class="s-setup-side">
        <div class="summary-tag">OPPONENT STATUS</div>
        <div class="summary-row"><span>You</span><span class="v">${YOU.id?'Ready':'Waiting'}</span></div>
        <div class="summary-row"><span>Rival</span><span class="v">${OPP.id?'Ready':'Needed'}</span></div>
        <div class="summary-row"><span>Questions</span><span class="v">${QUESTIONS.length||10}</span></div>
        <div class="summary-row big"><span>Ready</span><span class="v">${wiringIsReady()?'Yes':'Not Yet'}</span></div>
        ${STAT_V3_HUMAN.inviteUrl?`<div class="invite-box"><code>${escapeHtml(STAT_V3_HUMAN.inviteUrl)}</code><button class="result-cta alt" type="button" id="stat-v3-copy-invite">Copy</button></div>`:''}
      </aside>
    </div>`;
};

RENDERERS['4']=function(){
  const root=document.getElementById('screen-countdown');
  if(!wiringIsReady()){
    root.innerHTML=wiringBlockedPanel('Ready check needed',readinessReasons());
    return;
  }
  root.innerHTML=`
    <div class="s-countdown">
      <div class="cd-corner">
        <div class="cd-podium">${fbPodium(YOU)}</div>
        <span class="cd-corner-tag">YOUR LANE</span>
        <div class="cd-corner-name">${escapeHtml(YOU.name)}</div>
        <div class="cd-corner-meta">${escapeHtml(String(YOU.schoolName||'').toUpperCase())} | RANK ${escapeHtml(YOU.stats.rank)}</div>
      </div>
      <div class="cd-mid">
        <span class="cd-tag">READY CHECK</span>
        <div class="cd-num" id="stat-v3-countdown-num">3</div>
        <div class="cd-vs">${escapeHtml(String(YOU.name||'').split(' ')[0])} vs ${escapeHtml(String(OPP.name||'').split(' ')[0])}</div>
        <div class="cd-rules">
          <span class="cd-rule">${QUESTIONS.length} QUESTIONS</span>
          <span class="cd-rule">TIMED</span>
          <span class="cd-rule">SAME ORDER</span>
        </div>
      </div>
      <div class="cd-corner opp">
        <div class="cd-podium">${fbPodium(OPP,'',{opp:true,rarity:OPP.rarity})}</div>
        <span class="cd-corner-tag">RIVAL</span>
        <div class="cd-corner-name">${escapeHtml(OPP.name)}</div>
        <div class="cd-corner-meta">${escapeHtml(String(OPP.schoolName||'').toUpperCase())} | RANK ${escapeHtml(OPP.stats.rank)}</div>
      </div>
    </div>`;
};

RENDERERS['5']=function(){
  const root=document.getElementById('screen-play');
  const answered=QUESTIONS.filter(item=>STAT_V3_HUMAN.selections[item.id]).length;
  const playerStats=statV3ComputeStats();
  const oppStats=statV3OpponentStats(answered);
  root.innerHTML=`
    <div class="stat-arena">
      ${statLane(YOU,{tag:'YOU',score:String(playerStats.score),correct:String(playerStats.correct),avg:playerStats.avg,streak:String(playerStats.streak),statusLabel:YOU.id?'In match':'Sign in needed',statusCls:YOU.id?'live':'thinking',lane:'LEFT LANE'})}
      ${statCenter(STAT_V3_HUMAN.qIndex)}
      ${statLane(OPP,{tag:'RIVAL',opp:true,score:String(oppStats.score),correct:String(oppStats.correct),avg:oppStats.avg,streak:String(oppStats.streak),statusLabel:OPP.id?'Applying pressure':'Waiting',statusCls:OPP.id?'live':'thinking',lane:'RIGHT LANE'})}
    </div>`;
  statV3AfterPlayRender();
};

RENDERERS['6']=function(){
  const root=document.getElementById('screen-results');
  const parsed=normalizeResultPayload(LIVE_RESULT);
  if(!parsed){
    root.innerHTML=wiringBlockedPanel('Results waiting',['Finish the duel, then results will appear here.','STAT V3 waits for the match result instead of showing placeholder wins or losses.']);
    return;
  }
  const replay=parsed.rows.length
    ? parsed.rows.map((row,i)=>{const r=safeObj(row);const cls=r.isCorrect===true?'correct':(r.isCorrect===false?'wrong':'live');const picked=r.selected?` • Picked ${escapeHtml(r.selected)}`:'';const correct=r.correct?` • Correct ${escapeHtml(r.correct)}`:'';return `<div class="replay-row ${cls}"><div class="qn">${i+1}</div><div class="topic">${escapeHtml(pickText([r.topic,r.subject,'LIVE']))}</div><div class="qtxt">${escapeHtml(pickText([r.q,r.prompt,r.question,r.question_id,'Live answer row']))}${picked}${correct}</div><div class="qtime">${escapeHtml(pickText([r.time,r.time_ms,r.elapsed,'-']))}</div><div class="qpts">${escapeHtml(pickText([r.pts,r.points,r.score,'-']))}</div></div>`;}).join('')
    : '<div class="replay-row live"><div class="qn">-</div><div class="topic">REVIEW</div><div class="qtxt">No review rows available yet.</div><div class="qtime">-</div><div class="qpts">-</div></div>';
  const eloRow=parsed.elo?`<div class="result-elo"><div class="l">RANK CHANGE</div><div class="v ${parsed.elo.charAt(0)==='-'?'down':'up'}">${escapeHtml(parsed.elo)}</div><div class="l">${escapeHtml(parsed.rank||'MATCH RATING')}</div></div>`:'';
  root.innerHTML=`
    <div class="s-results">
      <div class="result-card">
        <span class="result-tag">${escapeHtml(parsed.verdict)}</span>
        <div class="result-title">Duel <span class="acc">Complete.</span></div>
        <div class="result-podium">${fbPodium(YOU,'',{rarity:'legendary'})}</div>
        <div class="result-stats">
          <div class="result-stat"><div class="v">${escapeHtml(parsed.score)}</div><div class="l">FINAL SCORE</div></div>
          <div class="result-stat"><div class="v">${escapeHtml(parsed.correct)}/${escapeHtml(parsed.total)}</div><div class="l">CORRECT</div></div>
          <div class="result-stat"><div class="v">${escapeHtml(parsed.avg)}</div><div class="l">AVG TIME</div></div>
          <div class="result-stat"><div class="v">${escapeHtml(parsed.streak)}</div><div class="l">BEST STREAK</div></div>
        </div>
        ${eloRow}
      </div>
      <div class="result-side">
        <div class="replay-card">
          <h3>QUESTION REPLAY</h3>
          ${replay}
        </div>
        <div class="highlights-card">
          <h3>MATCH HIGHLIGHTS</h3>
          <div class="row"><span>Questions played</span><span class="v">${escapeHtml(parsed.total)}</span></div>
          <div class="row"><span>Correct answers</span><span class="v">${escapeHtml(parsed.correct)}</span></div>
          ${parsed.opponentScore?`<div class="row"><span>Rival score</span><span class="v">${escapeHtml(parsed.opponentScore)}</span></div>`:''}
          <div class="row"><span>Rank change</span><span class="v">${parsed.elo?escapeHtml(parsed.elo):'Pending'}</span></div>
          <div class="row"><span>Review items</span><span class="v">${parsed.rows.length}</span></div>
        </div>
        <div class="result-cta-row">
          <button class="result-cta" type="button" id="stat-v3-rematch">Rematch</button>
          <button class="result-cta alt" type="button" id="stat-v3-new-match">New Match</button>
          <a class="result-cta alt" href="${STAT_V3_BACK_TO_ARENA_URL}">Back to Arena</a>
        </div>
      </div>
    </div>`;
  if(!STAT_V3_HUMAN.resultTonePlayed){
    STAT_V3_HUMAN.resultTonePlayed=true;
    const verdict=String(parsed.verdict||'').toLowerCase();
    statV3AudioCue(verdict.includes('win')?'result-win':(verdict.includes('loss')?'result-loss':'go'));
  }
};

initTheme();
const backArena=document.getElementById('back-arena');
if(backArena)backArena.href=STAT_V3_BACK_TO_ARENA_URL;
window.addEventListener('load',()=>{setTimeout(renderActive,40);});
renderActive();
bootstrapStatV3LivePack();
</script>

</body>
