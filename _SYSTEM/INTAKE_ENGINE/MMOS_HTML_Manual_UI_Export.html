<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MMOS HTML Manual UI + Export</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #d5dfeb;
      --text: #10212b;
      --muted: #5d7284;
      --primary: #0f4f82;
      --primary-2: #0b395d;
      --danger-bg: #fff1f1;
      --danger-line: #f0b6b6;
      --danger-text: #902828;
      --ok-bg: #ecf8ef;
      --ok-line: #b9e2c2;
      --ok-text: #1d6a2e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.45;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
      gap: 18px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 31, 47, 0.05);
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .panel-body {
      padding: 14px 16px 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      padding: 10px 11px;
      font-size: 14px;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #btn-generate {
      width: 100%;
      background: linear-gradient(125deg, var(--primary), var(--primary-2));
      color: #fff;
      margin-bottom: 10px;
    }

    #btn-download {
      width: 100%;
      background: #123e63;
      color: #fff;
    }

    .message {
      display: none;
      margin-bottom: 12px;
      border-radius: 9px;
      padding: 9px 11px;
      font-size: 13px;
      border: 1px solid;
    }

    .message.error {
      background: var(--danger-bg);
      border-color: var(--danger-line);
      color: var(--danger-text);
    }

    .message.success {
      background: var(--ok-bg);
      border-color: var(--ok-line);
      color: var(--ok-text);
    }

    #preview {
      width: 100%;
      min-height: 74vh;
      border: 0;
      border-radius: 0 0 12px 12px;
      background: #fff;
    }

    .preview-empty {
      padding: 22px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 980px) {
      body { padding: 14px; }
      .layout { grid-template-columns: 1fr; }
      #preview { min-height: 58vh; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel">
      <div class="panel-head">Input Panel</div>
      <div class="panel-body">
        <div id="message-error" class="message error" role="alert"></div>
        <div id="message-success" class="message success"></div>

        <div class="field">
          <label for="goal">Goal</label>
          <textarea id="goal" placeholder="Example: Build intake workflow for system migration readiness"></textarea>
        </div>

        <div class="field">
          <label for="targets">Targets (comma-separated)</label>
          <input id="targets" type="text" placeholder="Example: _SYSTEM/PRIMER_CORE.md, KNOWLEDGE_INDEX.md" />
        </div>

        <div class="field">
          <label for="ai-tools">Optional AI Tools (comma-separated)</label>
          <input id="ai-tools" type="text" placeholder="Example: CLAUDE, CODEX" />
        </div>

        <button id="btn-generate" type="button">Generate Manual</button>
        <button id="btn-download" type="button" disabled>Download HTML</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">Preview Panel</div>
      <div id="preview-empty" class="preview-empty">No manual generated yet.</div>
      <iframe id="preview" title="HTML Manual Preview"></iframe>
    </section>
  </div>

          pad(now.getDate()),
