<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A3 MMOS Operator Manual v1</title>
<style id="mmos-manual-styles">
:root {
  --mm-navy: #0F2A44;
  --mm-navy-sec: #1B2F4A;
  --mm-navy-deep: #0A1A2E;
  --mm-text: #FFFFFF;
  --mm-text-2: #F4F6F8;
  --mm-accent: #B23A3A;
  --mm-border: rgba(255,255,255,0.08);
  --mm-success: #6EE7B7;
  --mm-fail: #F87171;
  --mm-warn: #F9A825;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: var(--mm-navy);
  color: var(--mm-text);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}
button {
  font-family: inherit;
  cursor: pointer;
}

/* mm.header */
.mm-header {
  position: sticky;
  top: 0;
  z-index: 50;
  height: 68px;
  background: var(--mm-navy);
  border-bottom: 1px solid var(--mm-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  color: var(--mm-text);
}
.mm-header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}
.mm-logo-slot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border: 1px solid var(--mm-border);
  border-radius: 8px;
  color: var(--mm-accent);
  font-weight: 800;
  font-size: 13px;
}
.mm-header-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.4px;
  color: var(--mm-text);
}
.mm-header-subtitle {
  font-size: 12px;
  color: var(--mm-text-2);
  opacity: 0.7;
  margin-left: 12px;
}
.mm-header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.mm-override-toggle {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  border: 1px solid var(--mm-border);
  color: var(--mm-text-2);
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 12px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
}
.mm-override-toggle.is-on {
  background: var(--mm-accent);
  color: var(--mm-text);
  border-color: var(--mm-accent);
}
.mm-override-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--mm-text-2);
  opacity: 0.4;
}
.mm-override-toggle.is-on .mm-override-dot {
  background: var(--mm-text);
  opacity: 1;
}

/* mm.layout */
.mm-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: calc(100vh - 68px);
}

/* mm.sidebar */
.mm-sidebar {
  background: var(--mm-navy-sec);
  border-right: 1px solid var(--mm-border);
  padding: 24px 0;
  overflow-y: auto;
  max-height: calc(100vh - 68px);
  position: sticky;
  top: 68px;
}
.mm-sidebar-group {
  padding: 0 0 18px 0;
}
.mm-sidebar-group-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.4px;
  color: var(--mm-text-2);
  opacity: 0.55;
  padding: 0 24px 8px 24px;
  border-bottom: 1px solid var(--mm-border);
  margin-bottom: 6px;
}
.mm-sidebar-tab {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--mm-text-2);
  font-size: 13px;
  text-align: left;
  padding: 9px 24px;
  border-left: 3px solid transparent;
  transition: background 0.15s, color 0.15s;
}
.mm-sidebar-tab:hover {
  background: rgba(255,255,255,0.03);
  color: var(--mm-text);
}
.mm-sidebar-tab.is-active {
  background: rgba(255,255,255,0.04);
  color: var(--mm-text);
  border-left-color: var(--mm-accent);
}
.mm-sidebar-tab-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  padding: 0 6px;
  border-radius: 6px;
  background: var(--mm-navy);
  color: var(--mm-text-2);
  font-size: 11px;
  font-weight: 700;
}
.mm-sidebar-tab.is-active .mm-sidebar-tab-num {
  background: var(--mm-accent);
  color: var(--mm-text);
}

/* main content */
.mm-content {
  padding: 0;
  position: relative;
  background: var(--mm-navy);
}
.mm-content-inner {
  padding: 28px 36px 80px 36px;
  max-width: 1080px;
  margin: 0 auto;
}

/* global progress bar */
.mm-progress-global {
  position: sticky;
  top: 68px;
  z-index: 40;
  background: var(--mm-navy);
  padding: 14px 36px;
  border-bottom: 1px solid var(--mm-border);
  display: flex;
  align-items: center;
  gap: 14px;
}
.mm-progress-global-label {
  font-size: 12px;
  color: var(--mm-text-2);
  min-width: 240px;
}
.mm-progress-global-track {
  flex: 1;
  height: 4px;
  background: var(--mm-border);
  border-radius: 2px;
  overflow: hidden;
}
.mm-progress-global-fill {
  height: 100%;
  background: var(--mm-accent);
  width: 0%;
  transition: width 0.3s ease;
}

/* mm.tab_content */
.mm-tab-content {
  display: none;
  animation: mm-fade-in 0.3s ease both;
}
.mm-tab-content.is-active {
  display: block;
}
@keyframes mm-fade-in {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* mm.phase_loc */
.mm-phase-loc {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  background: var(--mm-navy-sec);
  border: 1px solid var(--mm-border);
  border-radius: 10px;
  margin-bottom: 24px;
}
.mm-phase-loc-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--mm-accent);
  animation: mm-pulse 1.5s ease-in-out infinite;
}
@keyframes mm-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.mm-phase-loc-text {
  font-size: 13px;
  color: var(--mm-text);
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  flex: 1;
}
.mm-phase-loc-progress {
  display: flex;
  align-items: center;
  gap: 10px;
}
.mm-phase-loc-progress-track {
  width: 120px;
  height: 4px;
  background: var(--mm-border);
  border-radius: 2px;
  overflow: hidden;
}
.mm-phase-loc-progress-fill {
  height: 100%;
  background: var(--mm-accent);
  width: 0%;
  transition: width 0.3s ease;
}
.mm-phase-loc-progress-label {
  font-size: 11px;
  color: var(--mm-text-2);
  min-width: 100px;
  text-align: right;
}

/* mm.section_header */
.mm-section-header {
  margin-bottom: 26px;
}
.mm-section-header h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--mm-text);
  margin-bottom: 8px;
}
.mm-section-header h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--mm-text);
  margin-bottom: 8px;
}
.mm-section-header-intro {
  max-width: 700px;
  font-size: 15px;
  color: var(--mm-text-2);
}

/* mm.card */
.mm-card {
  background: var(--mm-navy-sec);
  border: 1px solid var(--mm-border);
  border-radius: 12px;
  padding: 28px;
  color: var(--mm-text-2);
  margin-bottom: 18px;
}
.mm-card h3 {
  color: var(--mm-text);
  font-size: 16px;
  margin-bottom: 8px;
}
.mm-card p {
  margin-bottom: 10px;
}
.mm-card p:last-child {
  margin-bottom: 0;
}
.mm-card ul {
  padding-left: 22px;
  margin: 8px 0;
}
.mm-card li {
  margin-bottom: 6px;
}

/* mm.step (container = card variant) */
.mm-step {
  background: var(--mm-navy-sec);
  border: 1px solid var(--mm-border);
  border-radius: 12px;
  margin-bottom: 18px;
  overflow: hidden;
}

/* mm.step_header */
.mm-step-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--mm-navy-sec);
  border-bottom: 1px solid var(--mm-border);
  border-top-left-radius: 12px;
  border-top-right-radius: 12px;
}
.mm-step-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.mm-step-num-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  height: 28px;
  padding: 0 8px;
  border-radius: 6px;
  background: var(--mm-navy);
  color: var(--mm-text);
  font-size: 12px;
  font-weight: 700;
  border: 1px solid var(--mm-border);
}
.mm-step-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--mm-text);
}
.mm-step-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* mm.step_control */
.mm-step-control {
  background: var(--mm-navy);
  padding: 20px;
  color: var(--mm-text-2);
}
.mm-step-tiles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}
.mm-step-tile {
  background: var(--mm-navy-sec);
  border: 1px solid var(--mm-border);
  border-radius: 8px;
  padding: 14px 16px;
}
.mm-step-tile-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--mm-text-2);
  opacity: 0.6;
  margin-bottom: 6px;
}
.mm-step-tile-body {
  font-size: 13px;
  color: var(--mm-text);
}
.mm-step-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 14px;
}
.mm-btn {
  background: var(--mm-accent);
  color: var(--mm-text);
  border: 1px solid var(--mm-accent);
  border-radius: 6px;
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.4px;
}
.mm-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.mm-btn-secondary {
  background: transparent;
  color: var(--mm-text-2);
  border: 1px solid var(--mm-border);
}
.mm-btn-secondary:hover:not(:disabled) {
  background: rgba(255,255,255,0.04);
  color: var(--mm-text);
}
.mm-result-paste-panel {
  margin-top: 16px;
  display: none;
}
.mm-result-paste-panel.is-open {
  display: block;
}
.mm-result-paste-panel textarea {
  width: 100%;
  min-height: 120px;
  background: var(--mm-navy-sec);
  border: 1px solid var(--mm-border);
  border-radius: 8px;
  color: var(--mm-text);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px;
  padding: 12px 14px;
  resize: vertical;
}
.mm-result-paste-panel textarea:focus {
  outline: none;
  border-color: var(--mm-accent);
}
.mm-result-paste-hint {
  font-size: 11px;
  color: var(--mm-text-2);
  opacity: 0.7;
  margin-top: 6px;
}

/* mm.prompt_block */
.mm-prompt-block {
  position: relative;
  background: var(--mm-navy-deep);
  border: 1px solid var(--mm-border);
  border-radius: 8px;
  margin: 14px 0;
  overflow: hidden;
}
.mm-prompt-block-label {
  position: absolute;
  top: 0;
  left: 0;
  background: var(--mm-accent);
  color: var(--mm-text);
  font-size: 10px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-bottom-right-radius: 6px;
}
.mm-prompt-block-copy {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--mm-border);
  color: var(--mm-text-2);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  letter-spacing: 0.6px;
}
.mm-prompt-block-copy:hover {
  background: rgba(255,255,255,0.08);
  color: var(--mm-text);
}
.mm-prompt-block-body {
  white-space: pre-wrap;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px;
  color: var(--mm-text);
  padding: 32px 16px 16px 16px;
  line-height: 1.55;
}

/* mm.gate_box */
.mm-gate-box {
  background: var(--mm-navy-sec);
  border: 1px solid var(--mm-border);
  border-radius: 12px;
  padding: 22px 24px;
  margin: 26px 0 18px 0;
  position: relative;
}
.mm-gate-box-label {
  display: inline-block;
  background: var(--mm-accent);
  color: var(--mm-text);
  font-size: 10px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
  margin-bottom: 14px;
}
.mm-gate-box-rules {
  background: var(--mm-navy-deep);
  border: 1px solid var(--mm-border);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px;
  color: var(--mm-text-2);
  margin-bottom: 16px;
}
.mm-gate-rule-pass { color: var(--mm-success); }
.mm-gate-rule-fail { color: var(--mm-fail); }
.mm-gate-checklist {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 18px;
}
.mm-gate-check {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  color: var(--mm-text-2);
}
.mm-gate-check input[type=checkbox] {
  margin-top: 4px;
  accent-color: var(--mm-accent);
  width: 16px;
  height: 16px;
}
.mm-gate-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}
.mm-gate-status {
  font-size: 12px;
  color: var(--mm-text-2);
}
.mm-gate-status.is-passed {
  color: var(--mm-success);
}

/* mm.conf_box */
.mm-conf-box {
  border: 1px dashed var(--mm-border);
  border-radius: 8px;
  padding: 12px 16px;
  margin: 12px 0;
  color: var(--mm-text-2);
  font-size: 13px;
}
.mm-conf-box.is-partial {
  border-color: var(--mm-warn);
}
.mm-conf-box.is-failed {
  border-color: var(--mm-fail);
}
.mm-conf-box-summary {
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--mm-text);
}

/* mm.next_box */
.mm-next-box {
  background: var(--mm-navy-sec);
  border-left: 3px solid var(--mm-accent);
  padding: 12px 16px;
  border-radius: 6px;
  margin: 12px 0;
}
.mm-next-box-label {
  font-size: 10px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--mm-success);
  font-weight: 700;
  margin-bottom: 4px;
}
.mm-next-box-text {
  color: var(--mm-text);
  font-size: 13px;
}

/* mm.verdict_box */
.mm-verdict-box {
  background: var(--mm-navy-sec);
  border: 1px solid var(--mm-border);
  border-radius: 12px;
  padding: 32px;
  margin-bottom: 18px;
}
.mm-verdict-box h2 {
  color: var(--mm-accent);
  font-size: 20px;
  margin-bottom: 12px;
}
.mm-verdict-box-body {
  color: var(--mm-text-2);
  font-size: 14px;
}

/* mm.status_panel */
.mm-status-panel {
  background: linear-gradient(135deg, var(--mm-navy) 0%, var(--mm-navy-sec) 100%);
  border: 1px solid var(--mm-border);
  border-radius: 12px;
  padding: 22px 24px;
  margin-bottom: 18px;
}
.mm-status-panel-title {
  color: var(--mm-accent);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 14px;
}
.mm-status-panel-rows {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.mm-status-panel-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.mm-status-panel-label {
  color: var(--mm-text-2);
  font-size: 12px;
  min-width: 200px;
}
.mm-status-panel-value {
  color: var(--mm-text);
  font-weight: 600;
  font-size: 13px;
}

/* mm.hl, mm.hl_a, mm.hl_g, mm.hl_w */
.mm-hl {
  border-left: 3px solid var(--mm-text-2);
  background: rgba(255,255,255,0.03);
  padding: 12px 16px;
  border-radius: 4px;
  color: var(--mm-text-2);
  font-size: 13px;
  margin: 10px 0;
}
.mm-hl-a {
  border-left: 3px solid var(--mm-accent);
  background: rgba(178,58,58,0.08);
  padding: 12px 16px;
  border-radius: 4px;
  color: var(--mm-text-2);
  font-size: 13px;
  margin: 10px 0;
}
.mm-hl-g {
  border-left: 3px solid var(--mm-success);
  background: rgba(110,231,183,0.06);
  padding: 12px 16px;
  border-radius: 4px;
  color: var(--mm-text-2);
  font-size: 13px;
  margin: 10px 0;
}
.mm-hl-w {
  border-left: 3px solid var(--mm-warn);
  background: rgba(249,168,37,0.08);
  padding: 12px 16px;
  border-radius: 4px;
  color: var(--mm-text-2);
  font-size: 13px;
  margin: 10px 0;
}
.mm-banner-override {
  margin: 0 0 18px 0;
  font-weight: 600;
  color: var(--mm-text);
}

/* mm.st (table) */
.mm-st {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 13px;
  color: var(--mm-text-2);
}
.mm-st th {
  background: var(--mm-navy-sec);
  color: var(--mm-text);
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--mm-border);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.mm-st td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--mm-border);
  color: var(--mm-text-2);
}
.mm-st tr:nth-child(even) td {
  background: rgba(255,255,255,0.015);
}

/* mm.badge */
.mm-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  border: 1px solid var(--mm-border);
  color: var(--mm-text-2);
  background: rgba(255,255,255,0.04);
}
.mm-badge.is-pending {
  background: rgba(255,255,255,0.08);
  color: var(--mm-text-2);
}
.mm-badge.is-running {
  background: var(--mm-accent);
  color: var(--mm-text);
  border-color: var(--mm-accent);
}
.mm-badge.is-complete {
  background: rgba(110,231,183,0.15);
  color: var(--mm-success);
  border-color: rgba(110,231,183,0.4);
}
.mm-badge.is-failed {
  background: rgba(248,113,113,0.15);
  color: var(--mm-fail);
  border-color: rgba(248,113,113,0.4);
}
.mm-badge.is-partial {
  background: rgba(249,168,37,0.15);
  color: var(--mm-warn);
  border-color: rgba(249,168,37,0.4);
}
.mm-badge.is-overridden_complete {
  background: rgba(178,58,58,0.15);
  color: var(--mm-accent);
  border-color: rgba(178,58,58,0.4);
}
.mm-badge.is-ai-claude_opus,
.mm-badge.is-ai-claude_sonnet {
  background: rgba(178,58,58,0.10);
  color: var(--mm-text-2);
  border-color: rgba(178,58,58,0.30);
}
.mm-badge.is-ai-codex {
  background: rgba(110,231,183,0.10);
  color: var(--mm-text-2);
  border-color: rgba(110,231,183,0.30);
}
.mm-badge.is-ai-operator {
  background: rgba(255,255,255,0.04);
  color: var(--mm-text-2);
  border-color: var(--mm-border);
}

/* modal */
.mm-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10,26,46,0.78);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 24px;
}
.mm-modal-backdrop.is-open {
  display: flex;
}
.mm-modal {
  background: var(--mm-navy-sec);
  border: 1px solid var(--mm-border);
  border-radius: 12px;
  max-width: 480px;
  width: 100%;
  padding: 28px;
  color: var(--mm-text-2);
}
.mm-modal-title {
  color: var(--mm-text);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 10px;
}
.mm-modal-body {
  font-size: 14px;
  margin-bottom: 22px;
}
.mm-modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* toast */
.mm-toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--mm-navy-sec);
  border: 1px solid var(--mm-border);
  color: var(--mm-text);
  padding: 12px 18px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 300;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
}
.mm-toast.is-visible {
  opacity: 1;
  transform: translateY(0);
}

/* commit prompt block (gate pass result) */
.mm-commit-block {
  margin-top: 16px;
}

/* responsive */
@media (max-width: 880px) {
  .mm-layout {
    grid-template-columns: 1fr;
  }
  .mm-sidebar {
    position: static;
    max-height: none;
    border-right: none;
    border-bottom: 1px solid var(--mm-border);
  }
  .mm-step-tiles {
    grid-template-columns: 1fr;
  }
}
</style>

tion": "prompt-block uses a derived token --mm-navy-deep (#0A1A2E) that is not in the locked 9-token palette but is required to visually distinguish code surfaces from --mm-navy and --mm-navy-sec.", "resolution_path": "Declare --mm-navy-deep in :root as a derived token and list it in MANUAL_AUDIT.json.tokens_present as a derived token. Any other hex remains forbidden."}, {"item_id": "UR_03_commit_role_token", "description": "commit_command_template uses a {ROLE} token (e.g., ARCHITECT, CODEX, MANUAL_BUILDER). The role is not always derivable from phase metadata alone.", "resolution_path": "phase_gate.commit_message from the architect plan carries the fully-resolved commit string. The engineering plan treats it as opaque and renders it verbatim."}], "integration_with_claude_manual_builder": {"input_required_at_build_time": "This file (A3_MMOS_ENGINEERING_PLAN_v1.json) plus the corresponding ARCHITECT_PLAN.json that it references.", "build_entry_point": "Claude Manual Builder reads this engineering plan, then emits FULL_OPERATOR_MANUAL.html (with engineering plan embedded as <script type=application/json id=engineering-plan>) and MANUAL_AUDIT.json sidecar.", "result_header_at_build_time": "Manual Builder emits HTML whose first bytes are <!-- RESULT: COMPLETE|PARTIAL|FAILED\\nSUMMARY: ...\\nSOURCE_HASH: <sha256 of this engineering plan>\\nBUILT_FROM: A3_MMOS_ENGINEERING_PLAN_v1\\n-->", "claude_must_not": ["add ui_components not in the locked 20 archetypes", "add hex values not in design_tokens_locked (the single allowed derivation is --mm-navy-deep)", "emit U+2014 or U+2013 anywhere in the HTML", "reference deprecated names (Admin HQ, MCC, Pipeline, AI Dashboard, MMVS, Instructor Panel, Command Center)", "introduce new function_ids not in function_map"], "claude_must": ["bind every function_id to an actual JavaScript function in the embedded <script>", "render one tab-content panel per architect phase plus Overview, Start Here, Failure Cheat Sheet, Progress Tracker", "bind every run button to controller.runStep", "bind every Mark Gate Passed button to controller.markGatePassed", "emit MANUAL_AUDIT.json with accurate counts"]}, "fail_conditions_declared": ["architecture altered: any deviation from FINALIZED_ARCHITECT_PLAN.json v2.0", "novel UI archetype introduced: any class not in the 20-archetype list", "novel design token introduced: any hex not in design_tokens_locked except the single derived --mm-navy-deep", "missing function_id binding: any function_map entry without a concrete JS implementation", "ambiguity in orchestration_logic: any trigger without a called function", "file identity generic: artifact_id, project_bucket, thread_name, artifact_role, or artifact_version missing from top level"], "success_condition_declared": "Claude Manual Builder can read this JSON end-to-end and emit FULL_OPERATOR_MANUAL.html plus MANUAL_AUDIT.json with zero clarification requests, zero novel archetypes, zero forbidden tokens, zero em-dashes, and full RESULT-header-gated execution flow."}

<script id="mmos-manual-engine">
(function(){
  "use strict";
  var MMOS = window.MMOS = window.MMOS || {};

  /* ============ utilities ============ */
  function $(sel, root){ return (root || document).querySelector(sel); }
  function $$(sel, root){ return Array.prototype.slice.call((root || document).querySelectorAll(sel)); }
  function escHtml(s){
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
  function nowIso(){ return new Date().toISOString(); }
  function clone(o){ return JSON.parse(JSON.stringify(o)); }
  function truncate(s, n){ s = String(s == null ? "" : s); return s.length > n ? s.slice(0, n) : s; }

  /* ============ embedded plan + runtime phases ============ */
  function readEmbeddedJson(id){
    var el = document.getElementById(id);
    if (!el) return null;
    try { return JSON.parse(el.textContent); } catch (e) { return null; }
  }
  var PLAN = readEmbeddedJson("engineering-plan");
  var RUNTIME = readEmbeddedJson("runtime-phases");

  /* ============ schema validation ============ */
  function validatePlanSchema(plan){
    var errors = [];
    if (!plan || typeof plan !== "object") {
      return { ok: false, errors: ["plan_is_not_an_object"] };
    }
    var requiredTop = [
      "project_bucket","thread_name","artifact_role","artifact_version",
      "source_architect_plan","ui_lock","architecture_reference","file_structure",
      "function_map","ui_components","orchestration_logic","state_management","error_handling"
    ];
    requiredTop.forEach(function(k){
      if (!(k in plan)) errors.push("missing top-level key: " + k);
    });
    var requiredTokens = ["--mm-navy","--mm-navy-sec","--mm-text","--mm-text-2","--mm-accent","--mm-border","--mm-success","--mm-fail","--mm-warn"];
    var locked = (plan.ui_lock && plan.ui_lock.design_tokens_locked) || {};
    requiredTokens.forEach(function(t){
      if (!(t in locked)) errors.push("missing token " + t);
    });
    if (plan.ui_lock && Array.isArray(plan.ui_lock.structural_archetype_list)) {
      var n = plan.ui_lock.structural_archetype_list.length;
      if (n !== 20) errors.push("archetype count " + n + " expected 20");
    } else {
      errors.push("ui_lock.structural_archetype_list is missing or not an array");
    }
    return { ok: errors.length === 0, errors: errors };
  }

  /* ============ runtime phases / project id ============ */
  var RUNTIME_PHASES = (RUNTIME && Array.isArray(RUNTIME.phases)) ? RUNTIME.phases : [];
  var PROJECT_ID = (RUNTIME && RUNTIME.project_id) || (PLAN && PLAN.artifact_id) || "A3_MMOS_ENGINEERING_PLAN_v1";
  var UI_TITLE = (RUNTIME && RUNTIME.ui_manual && RUNTIME.ui_manual.title) || "MMOS Operator Manual";

  /* ============ state ============ */
  var STORAGE_KEY = "MMOS_STATE::" + PROJECT_ID;
  var SCHEMA_VERSION = 2;
  var FALLBACK_MEM = null;
  var QUOTA_FALLBACK_ACTIVE = false;
  var BLOCKING_ERROR = null;

  function defaultState(){
    var stepProgress = [];
    var phaseProgress = RUNTIME_PHASES.map(function(p){
      p.steps.forEach(function(s){
        stepProgress.push({
          step_id: s.id,
          phase_id: p.id,
          status: "PENDING",
          result_payload: null,
          last_summary: null,
          completed_at_iso: null,
          run_count: 0
        });
      });
      return {
        phase_id: p.id,
        completed_steps: 0,
        total_steps: p.steps.length,
        status: "PENDING"
      };
    });
    return {
      project_id: PROJECT_ID,
      schema_version: SCHEMA_VERSION,
      phase_progress: phaseProgress,
      step_progress: stepProgress,
      manual_override_enabled: false,
      manual_override_audit: [],
      refinement_cycle_count: 0,
      last_active_tab: "tab-overview",
      last_hydrated_at_iso: nowIso(),
      last_blocking_error: null,
      gate_checks: {}
    };
  }

  function readStorage(key){
    if (QUOTA_FALLBACK_ACTIVE) return FALLBACK_MEM;
    try {
      var v = window.localStorage.getItem(key);
      return v;
    } catch (e) {
      return null;
    }
  }
  function writeStorage(key, val){
    if (QUOTA_FALLBACK_ACTIVE) {
      FALLBACK_MEM = val;
      return true;
    }
    try {
      window.localStorage.setItem(key, val);
      return true;
    } catch (e) {
      // Quota exceeded path
      try {
        var current = JSON.parse(val);
        if (current && Array.isArray(current.step_progress)) {
          current.step_progress.forEach(function(s){
            if (typeof s.result_payload === "string" && s.result_payload.length > 2000) {
              s.result_payload = s.result_payload.slice(0, 2000);
            }
          });
        }
        window.localStorage.setItem(key, JSON.stringify(current));
        return true;
      } catch (e2) {
        QUOTA_FALLBACK_ACTIVE = true;
        FALLBACK_MEM = val;
        showBanner("Local storage is full. Progress will be kept for this session only until you clear space.");
        return false;
      }
    }
  }

  function hydrateState(){
    var raw = readStorage(STORAGE_KEY);
    if (!raw) return defaultState();
    var parsed;
    try { parsed = JSON.parse(raw); } catch (e) { return defaultState(); }
    if (!parsed || parsed.schema_version !== SCHEMA_VERSION) {
      // schema mismatch -> wipe + fresh
      try { window.localStorage.removeItem(STORAGE_KEY); } catch(e){}
      var fresh = defaultState();
      showBanner("State schema updated. Resetting your local progress for this project.");
      return fresh;
    }
    if (parsed.project_id !== PROJECT_ID) {
      return defaultState();
    }
    // reconcile step_progress
    var def = defaultState();
    var existingMap = {};
    (parsed.step_progress || []).forEach(function(s){ existingMap[s.step_id] = s; });
    def.step_progress = def.step_progress.map(function(s){
      if (existingMap[s.step_id]) {
        return Object.assign({}, s, existingMap[s.step_id]);
      }
      return s;
    });
    def.manual_override_enabled = !!parsed.manual_override_enabled;
    def.manual_override_audit = parsed.manual_override_audit || [];
    def.refinement_cycle_count = parsed.refinement_cycle_count || 0;
    def.last_active_tab = parsed.last_active_tab || "tab-overview";
    def.gate_checks = parsed.gate_checks || {};
    def.last_hydrated_at_iso = nowIso();
    // reconcile phase counts
    def.phase_progress.forEach(function(pp){
      var stepsInPhase = def.step_progress.filter(function(s){ return s.phase_id === pp.phase_id; });
      pp.completed_steps = stepsInPhase.filter(function(s){
        return s.status === "COMPLETE" || s.status === "OVERRIDDEN_COMPLETE";
      }).length;
      pp.total_steps = stepsInPhase.length;
      if (pp.completed_steps === pp.total_steps && pp.total_steps > 0) pp.status = "COMPLETE";
      else if (pp.completed_steps > 0) pp.status = "IN_PROGRESS";
      else pp.status = "PENDING";
    });
    return def;
  }

  function persistState(){
    STATE.last_hydrated_at_iso = nowIso();
    writeStorage(STORAGE_KEY, JSON.stringify(STATE));
  }

  /* ============ DOM helpers ============ */
  function makeEl(tag, attrs, html){
    var el = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(k){
        if (k === "className") el.className = attrs[k];
        else if (k === "dataset") {
          Object.keys(attrs.dataset).forEach(function(dk){ el.dataset[dk] = attrs.dataset[dk]; });
        } else if (k.indexOf("on") === 0) {
          el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
        } else {
          el.setAttribute(k, attrs[k]);
        }
      });
    }
    if (html != null) el.innerHTML = html;
    return el;
  }

  /* ============ render: shell + sidebar ============ */
  function buildNavGroups(){
    var phaseTabs = RUNTIME_PHASES.map(function(p){
      return { id: "tab-" + p.id, label: p.title, num: "P" + (p.phase_index + 1) };
    });
    return [
      { label: "Start", tabs: [
        { id: "tab-overview", label: "Overview", num: "1" },
        { id: "tab-start-here", label: "Start Here", num: "2" }
      ]},
      { label: "Execute", tabs: phaseTabs },
      { label: "Reference", tabs: [
        { id: "tab-failure-cheat-sheet", label: "Failure Cheat Sheet", num: "R1" },
        { id: "tab-progress-tracker", label: "Progress Tracker", num: "R2" }
      ]}
    ];
  }

  function renderSidebar(){
    var sidebar = $("#mm-sidebar");
    sidebar.innerHTML = "";
    var groups = buildNavGroups();
    groups.forEach(function(g){
      var grpEl = makeEl("div", { className: "mm-sidebar-group" });
      grpEl.appendChild(makeEl("div", { className: "mm-sidebar-group-label" }, escHtml(g.label)));
      g.tabs.forEach(function(t){
        var btn = makeEl("button", {
          type: "button",
          className: "mm-sidebar-tab",
          dataset: { tabId: t.id },
          onClick: function(){ router_tab(t.id); }
        });
        btn.appendChild(makeEl("span", { className: "mm-sidebar-tab-num" }, escHtml(t.num)));
        btn.appendChild(makeEl("span", {}, escHtml(t.label)));
        grpEl.appendChild(btn);
      });
      sidebar.appendChild(grpEl);
    });
  }

  /* ============ render: tab content panels ============ */
  function renderAllTabs(){
    var content = $("#mm-content-inner");
    content.innerHTML = "";
    content.appendChild(renderTabOverview());
    content.appendChild(renderTabStartHere());
    RUNTIME_PHASES.forEach(function(p){
      content.appendChild(renderTabPhase(p));
    });
    content.appendChild(renderTabFailureCheatSheet());
    content.appendChild(renderTabProgressTracker());
    if (STATE.manual_override_enabled) renderOverrideBanner(true);
    activateTab(STATE.last_active_tab || "tab-overview");
  }

  function renderTabOverview(){
    var panel = makeEl("section", { className: "mm-tab-content", id: "tab-overview" });
    panel.appendChild(makeEl("div", { className: "mm-section-header" }, "<h1>" + escHtml(UI_TITLE) + "</h1><div class=\"mm-section-header-intro\">A self-contained operator surface for the MMOS three-stage flow: Architect, Codex Engineer, Manual Builder. Every step is run, parsed, and gated locally. No network calls.</div>"));

    var verdict = makeEl("div", { className: "mm-verdict-box" });
    verdict.innerHTML = "<h2>What this manual does</h2><div class=\"mm-verdict-box-body\">It guides one operator through a single MMOS run. Each step shows what to do, what to expect, and the exact prompt to copy into the AI thread. Paste the AI response back into the manual and the engine parses the RESULT header, advances when valid, and gates between phases.</div>";
    panel.appendChild(verdict);

    var status = makeEl("div", { className: "mm-status-panel" });
    status.innerHTML = "<div class=\"mm-status-panel-title\">System Status</div>" +
      "<div class=\"mm-status-panel-rows\">" +
      "<div class=\"mm-status-panel-row\"><div class=\"mm-status-panel-label\">Project ID</div><div class=\"mm-status-panel-value\">" + escHtml(PROJECT_ID) + "</div></div>" +
      "<div class=\"mm-status-panel-row\"><div class=\"mm-status-panel-label\">Built From</div><div class=\"mm-status-panel-value\">A3_MMOS_ENGINEERING_PLAN_v1</div></div>" +

  function renderStep(phase, step, idx){
    var stepState = STATE.step_progress.filter(function(s){ return s.step_id === step.id; })[0] || { status: "PENDING" };
    var status = stepState.status || "PENDING";

    var stepEl = makeEl("article", { className: "mm-step", id: "step-" + step.id });

    // step-header
    var head = makeEl("div", { className: "mm-step-header" });
    head.innerHTML = "<div class=\"mm-step-header-left\">" +
      "<span class=\"mm-step-num-pill\">P" + (phase.phase_index + 1) + ".S" + (step.step_index + 1) + "</span>" +
      "<span class=\"mm-step-title\">" + escHtml(step.title) + "</span>" +
      "</div>" +
      "<div class=\"mm-step-header-right\">" +
      "<span class=\"mm-badge is-ai-" + escHtml(step.ai) + "\">" + escHtml(aiLabel(step.ai)) + "</span>" +
      "<span class=\"mm-badge is-" + escHtml(status.toLowerCase()) + "\" id=\"mm-status-badge-" + step.id + "\">" + escHtml(status) + "</span>" +
      "</div>";
    stepEl.appendChild(head);

    // step-control
    var ctrl = makeEl("div", { className: "mm-step-control" });
    var tilesHtml = "<div class=\"mm-step-tiles\">" +
      "<div class=\"mm-step-tile\"><div class=\"mm-step-tile-label\">What You Do</div><div class=\"mm-step-tile-body\">" + escHtml(step.what_you_do) + "</div></div>" +
      "<div class=\"mm-step-tile\"><div class=\"mm-step-tile-label\">Expected Output</div><div class=\"mm-step-tile-body\">" + escHtml(step.expected_output) + "</div></div>" +
      "</div>";
    ctrl.innerHTML = tilesHtml;

    if (step.exact_prompt) {
      var pb = makeEl("div", { className: "mm-prompt-block" });
      pb.innerHTML = "<span class=\"mm-prompt-block-label\">EXACT PROMPT</span>" +
        "<button type=\"button\" class=\"mm-prompt-block-copy\" data-copy-target=\"prompt-body-" + step.id + "\">COPY</button>" +
        "<div class=\"mm-prompt-block-body\" id=\"prompt-body-" + step.id + "\"></div>";
      ctrl.appendChild(pb);
      // safely set text content (no html entity decoding)
      pb.querySelector(".mm-prompt-block-body").textContent = step.exact_prompt;
    }

    var actions = makeEl("div", { className: "mm-step-actions" });
    var canRun = canRunStep(phase, step, idx);
    var runBtn = makeEl("button", {
      type: "button",
      className: "mm-btn",
      dataset: { runStep: step.id },
      onClick: function(){ controller_runStep(step.id); }
    }, "Run Step");
    if (!canRun) runBtn.disabled = true;
    actions.appendChild(runBtn);

    var resetBtn = makeEl("button", {
      type: "button",
      className: "mm-btn mm-btn-secondary",
      onClick: function(){ controller_resetStep(step.id); }
    }, "Reset Step");
    actions.appendChild(resetBtn);

    ctrl.appendChild(actions);

    var paste = makeEl("div", { className: "mm-result-paste-panel" + (status === "RUNNING" || status === "PARTIAL" || status === "FAILED" ? " is-open" : ""), id: "paste-" + step.id });
    paste.innerHTML = "<textarea data-step-paste=\"" + step.id + "\" placeholder=\"Paste full AI response here\"></textarea>" +
      "<div class=\"mm-result-paste-hint\">Paste the full AI response. The engine parses the first lines for RESULT and SUMMARY.</div>";
    paste.querySelector("textarea").addEventListener("input", function(ev){
      controller_submitResult(step.id, ev.target.value);
    });
    paste.querySelector("textarea").value = stepState.result_payload || "";
    ctrl.appendChild(paste);

    // conf-box for PARTIAL / FAILED
    if (status === "PARTIAL" || status === "FAILED") {
      var cls = status === "PARTIAL" ? "is-partial" : "is-failed";
      var msg = status === "PARTIAL" ? "Resolve the gap before advancing." : "Step failed. Review the AI summary and re-run, or open a refinement cycle.";
      var conf = makeEl("div", { className: "mm-conf-box " + cls });
      conf.innerHTML = "<div class=\"mm-conf-box-summary\">" + escHtml(stepState.last_summary || "") + "</div>" +
        "<div>" + escHtml(msg) + "</div>";
      ctrl.appendChild(conf);
    }

    // next-box for COMPLETE intra-phase
    if ((status === "COMPLETE" || status === "OVERRIDDEN_COMPLETE") && idx < phase.steps.length - 1) {
      var nb = makeEl("div", { className: "mm-next-box" });
      nb.innerHTML = "<div class=\"mm-next-box-label\">NEXT</div>" +
        "<div class=\"mm-next-box-text\">Continue to step " + (phase.steps[idx+1].step_index + 1) + ": " + escHtml(phase.steps[idx+1].title) + "</div>";
      ctrl.appendChild(nb);
    }

    stepEl.appendChild(ctrl);
    return stepEl;
  }

  function aiLabel(ai){
    switch(ai){
      case "claude_opus": return "AI: CLAUDE OPUS";
      case "claude_sonnet": return "AI: CLAUDE SONNET";
      case "codex": return "AI: CODEX";
      case "operator": return "OPERATOR";
      default: return ai || "OPERATOR";
    }
  }

  function canRunStep(phase, step, idx){
    if (STATE.manual_override_enabled) return true;
    if (idx === 0) return true;
    var prev = phase.steps[idx - 1];
    var prevState = STATE.step_progress.filter(function(s){ return s.step_id === prev.id; })[0];
    if (!prevState) return false;
    return prevState.status === "COMPLETE" || prevState.status === "OVERRIDDEN_COMPLETE";
  }

  function renderGateBox(phase){
    var pp = STATE.phase_progress.filter(function(p){ return p.phase_id === phase.id; })[0] || {};
    var passed = pp.status === "COMPLETE";
    var box = makeEl("div", { className: "mm-gate-box", id: "gate-" + phase.id });
    var head = "<span class=\"mm-gate-box-label\">Gate: Phase " + (phase.phase_index + 1) + " to Phase " + (phase.phase_index + 2) + "</span>";
    var rules = "<div class=\"mm-gate-box-rules\">" +
      "<div class=\"mm-gate-rule-pass\">RESULT: COMPLETE -&gt; proceed</div>" +
      "<div class=\"mm-gate-rule-fail\">RESULT != COMPLETE -&gt; DO NOT PROCEED</div>" +
      "</div>";
    var checklistHtml = "<div class=\"mm-gate-checklist\">";
    var checks = (phase.phase_gate && phase.phase_gate.checklist) || [];
    checks.forEach(function(item, ci){
      var checkId = phase.id + "::" + ci;
      var checked = !!STATE.gate_checks[checkId];
      checklistHtml += "<label class=\"mm-gate-check\"><input type=\"checkbox\" data-gate-check=\"" + checkId + "\"" + (checked ? " checked" : "") + " /> <span>" + escHtml(item) + "</span></label>";
    });
    checklistHtml += "</div>";
    var statusText = passed ? "Gate passed" : (allChecksReady(phase) ? "Ready to mark gate passed" : "Complete the checklist to enable Mark Gate Passed");
    var statusCls = passed ? "is-passed" : "";
    var actions = "<div class=\"mm-gate-actions\">" +
      "<button type=\"button\" class=\"mm-btn\" data-gate-pass=\"" + phase.id + "\"" + (passed ? " disabled" : "") + ">" + (passed ? "Phase Complete" : "Mark Gate Passed") + "</button>" +
      "<span class=\"mm-gate-status " + statusCls + "\" id=\"mm-gate-status-" + phase.id + "\">" + escHtml(statusText) + "</span>" +
      "</div>";
    box.innerHTML = head + rules + checklistHtml + actions;
    if (passed) {
      var commit = (phase.phase_gate && phase.phase_gate.commit_message) || "MMOS-CHECKPOINT: Phase " + (phase.phase_index + 1) + " complete";
      var cp = makeEl("div", { className: "mm-prompt-block mm-commit-block" });
      cp.innerHTML = "<span class=\"mm-prompt-block-label\">COMMIT</span>" +
        "<button type=\"button\" class=\"mm-prompt-block-copy\" data-copy-target=\"commit-body-" + phase.id + "\">COPY</button>" +
        "<div class=\"mm-prompt-block-body\" id=\"commit-body-" + phase.id + "\"></div>";
      cp.querySelector(".mm-prompt-block-body").textContent = "git commit -m \"" + commit + "\"";
      box.appendChild(cp);
    }
    // bind handlers
    setTimeout(function(){
      $$("[data-gate-check=\"" + "" + "\"]"); // no-op
      $$("input[type=checkbox][data-gate-check]", box).forEach(function(cb){
        cb.addEventListener("change", function(){
          var key = cb.dataset.gateCheck;
          STATE.gate_checks[key] = cb.checked;
          persistState();
          updateGateStatus(phase);
        });
      });
      var btn = box.querySelector("[data-gate-pass]");
      if (btn) btn.addEventListener("click", function(){ controller_markGatePassed(phase.id); });
    }, 0);
    return box;
  }

  function allChecksReady(phase){
    if (STATE.manual_override_enabled) return true;
    var checks = (phase.phase_gate && phase.phase_gate.checklist) || [];
    if (!checks.length) return true;
    return checks.every(function(_, ci){
      return !!STATE.gate_checks[phase.id + "::" + ci];
    });
  }

  function updateGateStatus(phase){
    var statusEl = document.getElementById("mm-gate-status-" + phase.id);
    if (!statusEl) return;
    var pp = STATE.phase_progress.filter(function(p){ return p.phase_id === phase.id; })[0] || {};
    if (pp.status === "COMPLETE") {
      statusEl.textContent = "Gate passed";
      statusEl.classList.add("is-passed");
    } else if (allChecksReady(phase)) {
      statusEl.textContent = "Ready to mark gate passed";
      statusEl.classList.remove("is-passed");
    } else {
      statusEl.textContent = "Complete the checklist to enable Mark Gate Passed";
      statusEl.classList.remove("is-passed");
    }
  }

  function renderTabFailureCheatSheet(){
    var panel = makeEl("section", { className: "mm-tab-content", id: "tab-failure-cheat-sheet" });
    panel.appendChild(makeEl("div", { className: "mm-section-header" }, "<h1>Failure Cheat Sheet</h1><div class=\"mm-section-header-intro\">Every error token surfaced by the manual engine, what triggers it, and what to do.</div>"));

    var arch = (PLAN && PLAN.error_handling && PLAN.error_handling.architecture_error_tokens) || [];
    var meng = (PLAN && PLAN.error_handling && PLAN.error_handling.manual_engine_errors) || [];
    var card = makeEl("div", { className: "mm-card" });
    function sanitizeForRender(s){
      if (s == null) return "";
      // Strip enumerated deprecated MissionMed module names from rendered text;
      // the operator does not need to see the legacy names to understand the rule.
      var stripped = String(s)
        .replace(/\(\s*Admin HQ[^)]*\)/g, "(deprecated MissionMed module names)")
        .replace(/Admin HQ,?\s*/g, "")
        .replace(/MMVS,?\s*/g, "")
        .replace(/AI Dashboard,?\s*/g, "")
        .replace(/Instructor Panel,?\s*/g, "")
        .replace(/Command Center,?\s*/g, "")
        .replace(/\bPipeline\b/g, "legacy module")
        .replace(/\bMCC\b/g, "legacy module")
        .replace(/\s{2,}/g, " ");
      return stripped;
    }
    var rows = arch.concat(meng).map(function(t){
      return "<tr><td><strong>" + escHtml(t.token) + "</strong></td><td>" + escHtml(sanitizeForRender(t.detection)) + "</td><td>" + escHtml(sanitizeForRender(t.user_facing_message)) + "</td><td>" + (t.blocking ? "BLOCKING" : "NON-BLOCKING") + "</td></tr>";
    }).join("");
    card.innerHTML = "<h3>Error Tokens</h3>" +
      "<table class=\"mm-st\"><thead><tr><th>Token</th><th>Detection</th><th>User Message</th><th>Severity</th></tr></thead><tbody>" + rows + "</tbody></table>";
    panel.appendChild(card);

    var hl = makeEl("div", { className: "mm-hl-w" }, "<strong>RESULT_HEADER_MISSING</strong> is the most common error. Re-emit the AI response with the header on line 1.");

  /* ============ tab activation ============ */
  function activateTab(tabId){
    if (!document.getElementById(tabId)) tabId = "tab-overview";
    $$(".mm-tab-content").forEach(function(el){ el.classList.toggle("is-active", el.id === tabId); });
    $$(".mm-sidebar-tab").forEach(function(el){ el.classList.toggle("is-active", el.dataset.tabId === tabId); });
    STATE.last_active_tab = tabId;
    persistState();
    var c = document.querySelector(".mm-content");
    if (c) c.scrollTop = 0;
    window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
  }

  function router_tab(tabIdOrHash){
    var id = tabIdOrHash;
    if (id && id.charAt(0) === "#") id = id.slice(1);
    activateTab(id);
    if (id) {
      try { history.replaceState(null, "", "#" + id); } catch (e) {}
    }
  }

  /* ============ progress ============ */
  function recomputeProgress(){
    var total = STATE.step_progress.length;
    var done = STATE.step_progress.filter(function(s){ return s.status === "COMPLETE" || s.status === "OVERRIDDEN_COMPLETE"; }).length;
    var pct = total ? Math.round((done / total) * 100) : 0;
    var fill = $("#mm-progress-global-fill");
    var label = $("#mm-progress-global-label");
    var bar = $("#mm-progress-global");
    if (fill) fill.style.width = pct + "%";
    if (label) label.textContent = "Overall: " + done + "/" + total + " steps (" + pct + "%)";
    if (bar) bar.setAttribute("aria-valuenow", String(pct));
    // per phase
    STATE.phase_progress.forEach(function(pp){
      var inPhase = STATE.step_progress.filter(function(s){ return s.phase_id === pp.phase_id; });
      pp.total_steps = inPhase.length;
      pp.completed_steps = inPhase.filter(function(s){ return s.status === "COMPLETE" || s.status === "OVERRIDDEN_COMPLETE"; }).length;
      if (pp.completed_steps === pp.total_steps && pp.total_steps > 0) pp.status = "COMPLETE";
      else if (pp.completed_steps > 0) pp.status = "IN_PROGRESS";
      else pp.status = "PENDING";
      var pct2 = pp.total_steps ? Math.round((pp.completed_steps / pp.total_steps) * 100) : 0;
      var pf = document.getElementById("mm-phase-fill-" + pp.phase_id);
      var pl = document.getElementById("mm-phase-label-" + pp.phase_id);
      var phase = RUNTIME_PHASES.filter(function(p){ return p.id === pp.phase_id; })[0];
      if (pf) pf.style.width = pct2 + "%";
      if (pl && phase) pl.textContent = "Phase " + (phase.phase_index + 1) + ": " + pp.completed_steps + "/" + pp.total_steps;
    });
  }

  /* ============ controller: run / submit / copy / override / gate ============ */
  function findPhaseAndStep(stepId){
    for (var i = 0; i < RUNTIME_PHASES.length; i++) {
      var ph = RUNTIME_PHASES[i];
      for (var j = 0; j < ph.steps.length; j++) {
        if (ph.steps[j].id === stepId) return { phase: ph, step: ph.steps[j], index: j };
      }
    }
    return null;
  }

  function controller_runStep(stepId){
    var found = findPhaseAndStep(stepId);
    if (!found) return;
    var canRun = canRunStep(found.phase, found.step, found.index);
    if (!canRun) return;
    var stepState = STATE.step_progress.filter(function(s){ return s.step_id === stepId; })[0];
    if (!stepState) return;
    stepState.status = "RUNNING";
    stepState.run_count = (stepState.run_count || 0) + 1;
    if (STATE.manual_override_enabled) {
      STATE.manual_override_audit.push({ timestamp_iso: nowIso(), action: "run_under_override", active_step_id: stepId });
    }
    persistState();
    if (found.step.exact_prompt) {
      controller_copyPrompt(stepId);
    }
    rerenderStep(found.phase, found.step, found.index);
    var paste = document.getElementById("paste-" + stepId);
    if (paste) {
      paste.classList.add("is-open");
      var ta = paste.querySelector("textarea");
      if (ta) { ta.focus(); ta.scrollIntoView({ behavior: "smooth", block: "center" }); }
    }
    recomputeProgress();
  }

  function controller_resetStep(stepId){
    var stepState = STATE.step_progress.filter(function(s){ return s.step_id === stepId; })[0];
    if (!stepState) return;
    stepState.status = "PENDING";
    stepState.result_payload = null;
    stepState.last_summary = null;
    stepState.completed_at_iso = null;
    persistState();
    var found = findPhaseAndStep(stepId);
    if (found) rerenderStep(found.phase, found.step, found.index);
    recomputeProgress();
  }

  function controller_submitResult(stepId, pastedText){
    var found = findPhaseAndStep(stepId);
    if (!found) return;
    var stepState = STATE.step_progress.filter(function(s){ return s.step_id === stepId; })[0];
    if (!stepState) return;
    stepState.result_payload = truncate(pastedText, 4000);
    var report = parser_resultHeader(pastedText || "");
    stepState.last_summary = report.summary;
    if (report.status === "COMPLETE") {
      stepState.status = "COMPLETE";
      stepState.completed_at_iso = nowIso();
      persistState();
      rerenderStep(found.phase, found.step, found.index);
      recomputeProgress();
      // auto-advance within phase
      var nextIdx = found.index + 1;
      if (nextIdx < found.phase.steps.length) {
        setTimeout(function(){
          var nxt = found.phase.steps[nextIdx];
          var btn = document.querySelector("[data-run-step=\"" + nxt.id + "\"]");
          if (btn) { btn.scrollIntoView({ behavior: "smooth", block: "center" }); btn.focus(); }
        }, 60);
      } else {
        // phase complete - update gate-status
        updateGateStatus(found.phase);
      }
    } else if (report.status === "PARTIAL") {
      stepState.status = "PARTIAL";
      persistState();
      rerenderStep(found.phase, found.step, found.index);
      recomputeProgress();
    } else if (report.status === "FAILED") {
      stepState.status = "FAILED";
      persistState();
      rerenderStep(found.phase, found.step, found.index);
      recomputeProgress();
    } else {
      // MISSING - keep RUNNING, just persist payload
      persistState();
      // surface a warning hl-w near the paste panel
      surfacePasteWarning(stepId, "Missing RESULT header. Ask the AI to re-emit the response starting with RESULT: COMPLETE / PARTIAL / FAILED.");
    }
  }

  function surfacePasteWarning(stepId, msg){
    var paste = document.getElementById("paste-" + stepId);
    if (!paste) return;
    var existing = paste.querySelector(".mm-paste-warning");
    if (existing) existing.remove();
    var warn = makeEl("div", { className: "mm-hl-w mm-paste-warning" }, escHtml(msg));
    paste.appendChild(warn);
  }

  function rerenderStep(phase, step, idx){
    var oldEl = document.getElementById("step-" + step.id);
    if (!oldEl) return;
    var newEl = renderStep(phase, step, idx);
    oldEl.parentNode.replaceChild(newEl, oldEl);
    // re-render entire phase tab to refresh next-box visibility for prior step too
    var phaseTab = document.getElementById("tab-" + phase.id);
    if (phaseTab) {
      // refresh other steps' run buttons to reflect new gating
      phase.steps.forEach(function(s, i){
        if (i === idx) return;
        var elx = document.getElementById("step-" + s.id);
        if (elx) {
          var newx = renderStep(phase, s, i);
          elx.parentNode.replaceChild(newx, elx);
        }
      });
      // re-render gate
      var oldGate = document.getElementById("gate-" + phase.id);
      if (oldGate) {
        var newGate = renderGateBox(phase);
        oldGate.parentNode.replaceChild(newGate, oldGate);
      }
    }
  }

  function parser_resultHeader(raw){
    if (!raw) return { status: "MISSING", summary: null };
    var s = raw.replace(/^\s+/, "");
    var jsonRegex = /^RESULT:\s+(COMPLETE|PARTIAL|FAILED)\s*\n+SUMMARY:\s+([\s\S]+?)\s*\n/;
    var htmlRegex = /^<!--\s*RESULT:\s+(COMPLETE|PARTIAL|FAILED)\s*\n+SUMMARY:\s+([\s\S]+?)\s*\n/;
    var m = s.match(jsonRegex);
    if (!m) m = s.match(htmlRegex);
    if (!m) return { status: "MISSING", summary: null };
    var summary = (m[2] || "").trim();
    if (summary.length > 240) summary = summary.slice(0, 240);
    return { status: m[1], summary: summary };
  }

  function controller_copyPrompt(stepId){
    var found = findPhaseAndStep(stepId);
    if (!found || !found.step.exact_prompt) return;
    var text = found.step.exact_prompt;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        showToast("Prompt copied. Paste into " + aiLabel(found.step.ai) + " thread.");
      }, function(){
        clipboardFallback(stepId);
      });
    } else {
      clipboardFallback(stepId);
    }
  }

  function clipboardFallback(stepId){
    var bodyEl = document.getElementById("prompt-body-" + stepId);
    if (bodyEl && window.getSelection && document.createRange) {
      var range = document.createRange();
      range.selectNodeContents(bodyEl);
      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
    showToast("Press Cmd/Ctrl+C to copy.");
  }

  function controller_markGatePassed(phaseId){
    var phase = RUNTIME_PHASES.filter(function(p){ return p.id === phaseId; })[0];
    if (!phase) return;
    if (!STATE.manual_override_enabled && !allChecksReady(phase)) return;
    var pp = STATE.phase_progress.filter(function(p){ return p.phase_id === phaseId; })[0];
    if (pp) pp.status = "COMPLETE";
    if (STATE.manual_override_enabled) {
      STATE.manual_override_audit.push({ timestamp_iso: nowIso(), action: "gate_under_override", active_step_id: null });
    }
    persistState();
    // re-render gate box to reveal commit prompt-block
    var oldGate = document.getElementById("gate-" + phase.id);
    if (oldGate) {
      var newGate = renderGateBox(phase);
      oldGate.parentNode.replaceChild(newGate, oldGate);
    }
    recomputeProgress();
    // open between-phase modal if not last phase
    var idx = RUNTIME_PHASES.indexOf(phase);
    if (idx >= 0 && idx < RUNTIME_PHASES.length - 1) {
      controller_openBetweenPhaseModal(idx, idx + 1);
    } else {
      showToast("Final phase complete. Manual finished.");
    }
  }

  function controller_openBetweenPhaseModal(curIdx, nextIdx){
    var nextPhase = RUNTIME_PHASES[nextIdx];
    $("#mm-modal-title").textContent = "Advance to Phase " + (nextIdx + 1) + "?";
    $("#mm-modal-body").textContent = "Phase " + (curIdx + 1) + " is complete. Phase " + (nextIdx + 1) + " begins. Confirm to advance.";
    $("#mm-modal-confirm").textContent = "Advance";
    $("#mm-modal-cancel").textContent = "Stay on Phase " + (curIdx + 1);
    $("#mm-modal-backdrop").classList.add("is-open");
    var confirmBtn = $("#mm-modal-confirm");
    var cancelBtn = $("#mm-modal-cancel");
    var onConfirm = function(){
      closeModal();
      router_tab("tab-" + nextPhase.id);
      setTimeout(function(){
        var first = nextPhase.steps[0];
        if (first) {
          var btn = document.querySelector("[data-run-step=\"" + first.id + "\"]");
          if (btn) { btn.scrollIntoView({ behavior: "smooth", block: "center" }); btn.focus(); }
        }
      }, 100);
      cleanup();
    };
    var onCancel = function(){ closeModal(); cleanup(); };
    function cleanup(){
      confirmBtn.removeEventListener("click", onConfirm);
      cancelBtn.removeEventListener("click", onCancel);
      document.removeEventListener("keydown", onKey);
    }
    function onKey(ev){ if (ev.key === "Escape") onCancel(); }
    confirmBtn.addEventListener("click", onConfirm);
    cancelBtn.addEventListener("click", onCancel);
    document.addEventListener("keydown", onKey);
  }

  function closeModal(){
    var b = $("#mm-modal-backdrop");
    if (b) b.classList.remove("is-open");
  }

  function controller_toggleManualOverride(desired){
    var nextVal = (desired === undefined) ? !STATE.manual_override_enabled : !!desired;
    STATE.manual_override_enabled = nextVal;
    STATE.manual_override_audit.push({
      timestamp_iso: nowIso(),
      action: nextVal ? "enable" : "disable",
      active_step_id: null
    });
    persistState();
    var btn = $("#mm-override-toggle");
    if (btn) {
      btn.classList.toggle("is-on", nextVal);
      btn.setAttribute("aria-pressed", nextVal ? "true" : "false");
    }
    renderOverrideBanner(nextVal);
    // re-render all phase tabs to refresh gating
    renderAllTabs();
    recomputeProgress();
  }

  function renderOverrideBanner(on){
    var existing = $(".mm-banner-override");
    if (existing) existing.remove();
    if (!on) return;
    var content = $("#mm-content-inner");
    if (!content) return;
    var banner = makeEl("div", { className: "mm-hl-w mm-banner-override" }, "<strong>Manual override is on.</strong> Auto-gating is suspended. All run buttons and Mark Gate Passed are unblocked.");
    content.insertBefore(banner, content.firstChild);
  }

  function showBanner(text){
    var content = $("#mm-content-inner");
    if (!content) { return; }
    var banner = makeEl("div", { className: "mm-hl-w" }, escHtml(text));
    content.insertBefore(banner, content.firstChild);
  }

  /* ============ toast ============ */
  var TOAST_TIMER = null;
  function showToast(msg){
    var t = $("#mm-toast");
    if (!t) return;
    t.textContent = msg;
    t.classList.add("is-visible");
    if (TOAST_TIMER) clearTimeout(TOAST_TIMER);
    TOAST_TIMER = setTimeout(function(){ t.classList.remove("is-visible"); }, 2000);
  }

  /* ============ delegated copy buttons ============ */
  document.addEventListener("click", function(ev){
    var el = ev.target;
    if (el && el.classList && el.classList.contains("mm-prompt-block-copy")) {
      var target = el.getAttribute("data-copy-target");
      var body = target ? document.getElementById(target) : null;
      if (!body) return;
      var text = body.textContent || "";
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function(){
          var prev = el.textContent;
          el.textContent = "COPIED";
          setTimeout(function(){ el.textContent = prev; }, 1200);
        }, function(){
          var sel = window.getSelection();
          var range = document.createRange();
          range.selectNodeContents(body);
          sel.removeAllRanges();
          sel.addRange(range);
          showToast("Press Cmd/Ctrl+C to copy.");
        });
      } else {
        var sel2 = window.getSelection();
        var range2 = document.createRange();
        range2.selectNodeContents(body);
        sel2.removeAllRanges();
        sel2.addRange(range2);
        showToast("Press Cmd/Ctrl+C to copy.");
      }
    }
  });

  /* ============ engine.init ============ */
  var STATE;
  function disableAllRunButtons(reason){
    BLOCKING_ERROR = reason;
    $$("[data-run-step]").forEach(function(b){ b.disabled = true; });
    $$("[data-gate-pass]").forEach(function(b){ b.disabled = true; });
    var content = $("#mm-content-inner");
    if (content) {
      var banner = makeEl("div", { className: "mm-hl-a" }, "<strong>" + escHtml(reason) + "</strong>: Engineering plan is invalid. Controls are disabled. Re-emit a valid ENGINEERING_PLAN.json.");
      content.insertBefore(banner, content.firstChild);
    }
  }

  function init(){
    var validation = validatePlanSchema(PLAN);
    STATE = hydrateState();
    renderSidebar();
    renderAllTabs();
    if (!validation.ok) {
      disableAllRunButtons("PLAN_SCHEMA_INVALID");
      console.warn("PLAN_SCHEMA_INVALID", validation.errors);
    }
    recomputeProgress();
    // bind override toggle
    var ov = $("#mm-override-toggle");
    if (ov) {
      ov.classList.toggle("is-on", !!STATE.manual_override_enabled);
      ov.setAttribute("aria-pressed", STATE.manual_override_enabled ? "true" : "false");
      ov.addEventListener("click", function(){ controller_toggleManualOverride(!STATE.manual_override_enabled); });
    }
    if (STATE.manual_override_enabled) renderOverrideBanner(true);
    // hashchange router
    window.addEventListener("hashchange", function(){
      var h = window.location.hash || "";
      if (h) router_tab(h.slice(1));
    });
    // honor initial hash
    if (window.location.hash) {
      var h0 = window.location.hash.slice(1);
      if (document.getElementById(h0)) activateTab(h0);
    }
    // cross-tab sync
    window.addEventListener("storage", function(ev){
      if (ev.key === STORAGE_KEY) {
        STATE = hydrateState();
        renderAllTabs();
        recomputeProgress();
      }
    });
  }

  /* ============ exports for tests ============ */
  MMOS.engine = {
    validatePlanSchema: validatePlanSchema,
    defaultState: defaultState,
    hydrate: hydrateState,
    persist: function(){ persistState(); }
  };
  MMOS.parser = { resultHeader: parser_resultHeader };
  MMOS.controller = {
    runStep: controller_runStep,
    submitResult: controller_submitResult,
    copyPrompt: controller_copyPrompt,
    markGatePassed: controller_markGatePassed,
    toggleManualOverride: controller_toggleManualOverride,
    resetStep: controller_resetStep
  };
  MMOS.router = { tab: router_tab };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
