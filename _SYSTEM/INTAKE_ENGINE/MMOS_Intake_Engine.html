<!--
  MMOS Intake Engine v1.0
  Authority: MR-1367 (Workflow OS) + MR-1377 (Operator Manual pattern)
  Purpose: Convert an intake payload into a complete tabbed HTML execution manual.
  Input contract: INTAKE_SCHEMA.md
  Generation spec: TEMPLATE_ENGINE.md
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MMOS Intake Engine</title>
<style>
  :root{
    --mm-bg:#0F2A44;
    --mm-panel:#1B2F4A;
    --mm-panel-2:#233A59;
    --mm-text:#FFFFFF;
    --mm-muted:#B0BEC5;
    --mm-accent:#B23A3A;
    --mm-accent-hover:#C24B4B;
    --mm-line:#3B5470;
    --mm-input:#10253D;
    --mm-code-bg:#0A1E33;
    --mm-code-fg:#E9F1F8;
    --mm-success:#2A9D62;
    --mm-warn:#D8A441;
    --r:14px;
    --rs:10px;
    --t:.2s ease;
    --sh1:0 8px 30px rgba(3,10,20,.35);
    --sh2:0 14px 38px rgba(3,10,20,.4);
  }

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  html,body{height:100%}

  body{
    font:400 17px/1.62 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:var(--mm-text);
    background:radial-gradient(circle at 15% 0%,#1A3B61 0%,#0F2A44 42%,#0B233A 100%);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }

  *{
    scrollbar-width:thin;
    scrollbar-color:#516A87 #0B2238;
  }

  *::-webkit-scrollbar{width:12px;height:12px}
  *::-webkit-scrollbar-track{background:#0B2238}
  *::-webkit-scrollbar-thumb{background:#4A6481;border-radius:999px;border:2px solid #0B2238}
  *::-webkit-scrollbar-thumb:hover{background:#5B7695}

  .app{
    display:grid;
    grid-template-rows:auto 1fr;
    min-height:100vh;
  }

  .container{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    padding:24px;
    min-width:0;
  }

  /* Top bar */
  .bar{
    display:flex;
    align-items:center;
    gap:14px;
    padding:0 22px;
    background:linear-gradient(180deg,#1C3B5E 0%,#163453 100%);
    color:var(--mm-text);
    border-bottom:1px solid var(--mm-line);
    box-shadow:var(--sh1);
    z-index:5;
    min-width:0;
    flex-wrap:wrap;
  }

  .bar .logo{
    width:38px;
    height:38px;
    border-radius:11px;
    background:linear-gradient(135deg,#F4FAFF 0%,#C9D9E7 100%);
    display:grid;
    place-items:center;
    color:#13324F;
    font-weight:900;
    font-size:15px;
    letter-spacing:-.3px;
    flex-shrink:0;
  }

  .bar h1{
    font-size:1.38rem;
    font-weight:700;
    letter-spacing:-.015em;
    line-height:1.2;
    min-width:0;
  }

  .bar .chip{
    font-size:.94rem;
    font-weight:800;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:5px 12px;
    border-radius:999px;
    background:var(--mm-accent);
    color:var(--mm-text);
  }

  .bar .spacer{flex:1}

  .bar .status{
    font-size:.84rem;
    font-weight:800;
    letter-spacing:.06em;
    text-transform:uppercase;
    background:#223A58;
    border:1px solid #4F6B88;
    color:#D5E3EC;
    padding:5px 11px;
    border-radius:999px;
    min-width:0;
  }

  .bar button{
    appearance:none;
    border:1px solid #4A6480;
    background:#1A3A5B;
    color:var(--mm-text);
    font:inherit;
    font-size:.95rem;
    font-weight:700;
    line-height:1;
    padding:13px 17px;
    border-radius:10px;
    min-height:48px;
    cursor:pointer;
    transition:var(--t);
  }

  .bar button:hover{
    background:#21466B;
    border-color:#6483A4;
  }

  .bar button.primary{
    background:var(--mm-accent);
    border-color:#C85B5B;
    color:var(--mm-text);
  }

  .bar button.primary:hover{background:var(--mm-accent-hover)}

  .pane{
    background:var(--mm-panel);
    width:100%;
    min-width:0;
  }

  .pane.left{
    border:1px solid var(--mm-line);
    border-radius:var(--r);
    padding:24px;
    min-width:0;
  }

  .app,
  .container,
  section.group,
  .g-body,
  .rep,
  .rep-item,
  .steps-wrap,
  .gate-wrap{
    min-width:0;
  }

  .bar > *,
  .g-head > *,
  .rep-item .ri-head > *,
  .row > *,
  .download-row > *{
    min-width:0;
  }

  /* Form */
  section.group{
    background:var(--mm-panel-2);
    border:1px solid var(--mm-line);
    border-radius:var(--r);
    margin-bottom:18px;
    overflow:hidden;
    box-shadow:var(--sh1);
  }

  .g-head{
    display:flex;
    align-items:center;
    gap:12px;
    padding:18px 18px;
    cursor:pointer;
    user-select:none;
    background:var(--mm-panel-2);
    min-width:0;
    flex-wrap:wrap;
  }

  .g-head:hover{background:#294463}

  .g-head .num{
    width:30px;
    height:30px;
    border-radius:8px;
    display:grid;
    place-items:center;
    background:#0F2A44;
    color:var(--mm-text);
    font-size:.94rem;
    font-weight:900;
    flex-shrink:0;
    border:1px solid #4C6681;
  }

  .g-head h2{
    font-size:1.2rem;
    font-weight:750;
    color:var(--mm-text);
    letter-spacing:-.01em;
    flex:1;
    min-width:0;
    line-height:1.3;
  }

  .g-head .req{
    font-size:.94rem;
    font-weight:800;
    letter-spacing:.06em;
    color:var(--mm-text);
    background:rgba(178,58,58,.9);
    padding:4px 10px;
    border-radius:999px;
  }

  .g-head .opt{
    font-size:.94rem;
    font-weight:800;
    letter-spacing:.06em;
    color:var(--mm-text);
    background:#355173;
    padding:4px 10px;
    border-radius:999px;
  }

  .g-head .caret{
    transition:var(--t);
    color:var(--mm-muted);
    font-size:1rem;
  }

  section.group.closed .g-head .caret{transform:rotate(-90deg)}

  .g-body{
    padding:12px 18px 22px;
    border-top:1px solid var(--mm-line);
    display:block;
  }

  section.group.closed .g-body{display:none}

  .row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;margin-top:14px;min-width:0}
  .row.one{grid-template-columns:minmax(0,1fr)}
  .row.three{grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr)}

  .fld{display:flex;flex-direction:column;gap:8px;min-width:0}

  .fld label{
    font-size:.94rem;
    font-weight:800;
    color:#D2DFE8;
    letter-spacing:.045em;
    text-transform:uppercase;
    line-height:1.45;
    overflow-wrap:anywhere;
  }

  .fld .hint{
    font-size:.94rem;
    color:var(--mm-muted);
    margin-top:-2px;
    line-height:1.5;
  }

  .fld input,
  .fld select,
  .fld textarea{
    font:inherit;
    font-size:1rem;
    padding:13px 14px;
    border:1.5px solid #4A6480;
    border-radius:var(--rs);
    background:var(--mm-input);
    color:var(--mm-text);
    min-height:50px;
    line-height:1.55;
    caret-color:var(--mm-text);
    transition:var(--t);
    width:100%;
    max-width:100%;
    min-width:0;
  }

  .fld input::placeholder,
  .fld textarea::placeholder{
    color:#98ABB8;
    opacity:1;
  }

  .fld textarea{
    resize:vertical;
    min-height:104px;
    font-family:"SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
    font-size:.96rem;
  }

  .fld select{
    background-image:linear-gradient(45deg,transparent 50%,#BBD0DF 50%),linear-gradient(135deg,#BBD0DF 50%,transparent 50%);
    background-position:calc(100% - 18px) calc(50% + 2px),calc(100% - 13px) calc(50% + 2px);
    background-size:5px 5px,5px 5px;
    background-repeat:no-repeat;
    padding-right:34px;
    appearance:none;
  }

  .fld input:focus,
  .fld select:focus,
  .fld textarea:focus{
    outline:none;
    border-color:#C96767;
    box-shadow:0 0 0 3px rgba(178,58,58,.22),0 0 0 1px rgba(178,58,58,.42);
    background:#142C47;
  }

  .fld .req-star{color:#FF7B7B}

  /* Repeater */
  .rep{
    border:1px dashed #537090;
    border-radius:var(--rs);
    padding:14px;
    margin-top:14px;
    background:#193451;
  }

  .rep-item{
    background:#223A58;
    border:1px solid #4B6682;
    border-radius:var(--rs);
    padding:13px 14px;
    margin-bottom:10px;
  }

  .rep-item .ri-head{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
    min-width:0;
    flex-wrap:wrap;
  }

  .rep-item .ri-head .ri-num{
    font-size:.94rem;
    font-weight:900;
    color:var(--mm-text);
    background:#1A324E;
    border:1px solid #4B6682;
    padding:5px 10px;
    border-radius:999px;
  }

  .rep-item .ri-head .ri-title{
    font-size:1rem;
    font-weight:700;
    color:var(--mm-text);
    flex:1;
    min-width:0;
    line-height:1.4;
  }

  .rep-item .ri-head button{
    appearance:none;
    border:1px solid #B85D5D;
    background:transparent;
    color:#FFD3D3;
    font:inherit;
    font-size:.9rem;
    font-weight:700;
    cursor:pointer;
    padding:8px 11px;
    border-radius:8px;
    min-height:38px;
  }

  .rep-item .ri-head button:hover{background:rgba(178,58,58,.2)}

  .rep-add{
    appearance:none;
    border:1px solid #C86868;
    background:var(--mm-accent);
    color:var(--mm-text);
    font:inherit;
    font-size:.95rem;
    font-weight:800;
    padding:11px 16px;
    border-radius:10px;
    min-height:44px;
    cursor:pointer;
    transition:var(--t);
  }

  .rep-add:hover{background:var(--mm-accent-hover)}

  /* Steps inside phase */
  .steps-wrap{
    margin-top:12px;
    padding:14px;
    background:#193451;
    border-radius:var(--rs);
    border:1px solid #45617E;
  }

  .steps-wrap .steps-label{
    font-size:.94rem;
    font-weight:900;
    color:#D3E1EA;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:8px;
  }

  /* Gate block */
  .gate-wrap{
    margin-top:14px;
    padding:14px 14px;
    background:rgba(42,157,98,.12);
    border:1px solid rgba(82,188,133,.5);
    border-radius:var(--rs);
  }

  .gate-wrap .gate-label{
    font-size:.94rem;
    font-weight:900;
    color:#BFEAD0;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:6px;
  }

  .validation{
    background:rgba(216,164,65,.13);
    border:1px solid rgba(216,164,65,.58);
    border-radius:var(--rs);
    padding:14px 15px;
    margin-bottom:14px;
    font-size:.96rem;
    color:#FFE9B8;
    line-height:1.58;
  }

  .validation.ok{
    background:rgba(42,157,98,.13);
    border-color:rgba(101,215,154,.56);
    color:#CEF5DF;
  }

  .validation h4{
    font-size:.94rem;
    font-weight:900;
    letter-spacing:.06em;
    text-transform:uppercase;
    margin-bottom:8px;
  }

  .validation ul{margin:4px 0 0 20px}
  .validation li{margin:5px 0}

  .download-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:18px;
    min-width:0;
  }

  .download-row button{
    appearance:none;
    border:1px solid #C96868;
    background:var(--mm-accent);
    color:var(--mm-text);
    font:inherit;
    font-size:.95rem;
    font-weight:800;
    line-height:1.1;
    padding:13px 17px;
    min-height:48px;
    border-radius:11px;
    cursor:pointer;
    transition:var(--t);
  }

  .download-row button.alt{
    background:#1E3958;
    border-color:#5A7897;
    color:#F0F6FA;
  }

  .download-row button:hover{filter:brightness(1.1)}
  .download-row button:disabled{opacity:.52;cursor:not-allowed}

  /* Small helpers */
  .mini{
    font-size:.94rem;
    color:var(--mm-muted);
    margin-top:5px;
    line-height:1.6;
  }

  .pill-sm{
    display:inline-block;
    font-size:.94rem;
    font-weight:800;
    letter-spacing:.045em;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:999px;
    background:#274362;
    color:#D4E1EA;
    margin-right:6px;
    margin-top:3px;
  }

  pre,
  code,
  kbd,
  samp{
    font-family:"SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
  }

  pre{
    background:var(--mm-code-bg);
    color:var(--mm-code-fg);
    border:1px solid var(--mm-code-border,#304A66);
    border-radius:11px;
    padding:16px 18px;
    overflow:auto;
    line-height:1.65;
    font-size:.95rem;
  }

  code{
    background:rgba(19,45,72,.85);
    color:var(--mm-code-fg);
    border-radius:6px;
    padding:2px 6px;
  }

  .copy-btn,
  button.copy,
  [data-copy]{
    background:#284666;
    color:#FFFFFF;
    border:1px solid #5E7D9D;
    border-radius:10px;
    min-height:40px;
    padding:10px 14px;
    font-size:.94rem;
    font-weight:800;
  }

  .copy-btn:hover,
  button.copy:hover,
  [data-copy]:hover{
    background:#33557A;
  }

  @media (max-width:1180px){
    .bar{
      min-height:74px;
      padding-top:10px;
      padding-bottom:10px;
      gap:10px;
    }
    .container{padding:18px}
    .row.three{grid-template-columns:1fr 1fr}
  }

  @media (max-width:860px){
    .bar{
      padding-left:14px;
      padding-right:14px;
    }
    .pane.left{
      border-right:1px solid var(--mm-line);
      padding-bottom:40px;
    }
    .container{
      padding:14px;
    }
    .row,
    .row.three{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <header class="bar">
    <div class="logo">MM</div>
    <h1>MMOS Intake Engine</h1>
    <span class="chip">v1.0</span>
    <span class="status" id="preview-status">Not generated yet</span>
    <div class="spacer"></div>
    <button id="btn-preset">Load Preset</button>
    <button id="btn-clear">Clear</button>
    <button id="btn-validate">Validate</button>
    <button id="btn-generate" class="primary">Generate Manual</button>
  </header>

  <div class="container">
    <div id="validation-slot"></div>
    <aside class="pane left" id="form-pane">
      <!-- Sections are injected by JS -->
    </aside>
    <div class="download-row">
      <button id="btn-download" disabled>Download HTML</button>
      <button id="btn-copy-html" class="alt" disabled>Copy HTML Source</button>
      <button id="btn-export-json" class="alt" disabled>Export Intake (JSON)</button>
      <button id="btn-import-json" class="alt">Import Intake (JSON)</button>
      <input id="json-file" type="file" accept="application/json,.json" style="display:none">
    </div>
  </div>
</div>

<script>
/* =========================================================================
   MMOS INTAKE ENGINE — STATE + UI + GENERATION
   ========================================================================= */

/* ---------- STATE ---------- */
const today = new Date().toISOString().slice(0,10);

const DEFAULT_EXEC_RULES = [
  "Never skip phases. Earlier phases set preconditions for later phases.",
  "Always run gates. A failed gate is a stop condition, not a warning.",
  "Checkpoint after every phase. Git commits are your undo button.",
  "New session = re-run the init phase first. Your memory is not reliable.",
  "FAIL FAST: if any step, validation, or gate fails, stop and fix before continuing."
];

const DEFAULT_THREAD_RULES = {
  new_thread_triggers: [
    "Starting the first phase",
    "Switching between major architecture phases",
    "Switching AI models (e.g., Claude to Codex)",
    "Clean validation run at the end"
  ],
  same_thread_triggers: [
    "Sequential steps within a phase",
    "The next step uses the same AI and builds on prior output",
    "Debugging or retrying a failed step"
  ],
  continuation_steps: [
    "Start a new thread",
    "Re-run the init/pre-flight phase to detect what is already done",
    "Resume from the next incomplete step",
    "Tell the AI: \"Resuming {MANUAL_ID} build. Last completed: [prompt ID]. Continue from next step.\""
  ],
  transitions: [
    ["Start of build","New thread"],
    ["Mid-phase sequential step","Same thread"],
    ["Phase N to Phase N+1","New thread (fresh context)"],
    ["Switching AI (Claude↔Codex)","New thread"],
    ["Resume after break","New thread, re-run init first"]
  ]
};

const DEFAULT_FAILURES = [
  ["1","AI response missing RESULT: header","Reply: \"Re-format your response starting with the RESULT: header.\" Do not continue until it appears."],
  ["2","AI produces files outside the declared scope","Run `git diff --name-only`. Revert extras with `git checkout HEAD -- [file]`."],
  ["3","A step exceeds its line/token budget","Reply: \"Compress to the stated budget. Remove commentary, keep rules only.\" Re-run."],
  ["4","Prompt references a deprecated file","Replace the deprecated name with the canonical name (see NAMING_CANON.md). Re-run."],
  ["5","Session dies mid-phase","Start a new thread. Re-run the init phase. Resume from next incomplete step."]
];

const WORKFLOW_PRESETS = {
  BUILD: [
    {name:"Init",intro:"Verify preconditions before any file changes."},
    {name:"Plan",intro:"Produce the implementation plan. No code yet."},
    {name:"Build",intro:"Execute the plan. Create and modify files per spec."},
    {name:"Validate",intro:"Run verification checks. Lock the system."}
  ],
  AUDIT: [
    {name:"Scope",intro:"Define the audit target and boundaries."},
    {name:"Collect",intro:"Gather source files, logs, and reference data."},
    {name:"Analyze",intro:"Classify findings by severity."},
    {name:"Report",intro:"Produce the final audit report with cited evidence."}
  ],
  FIX: [
    {name:"Reproduce",intro:"Confirm the bug in a known environment."},
    {name:"Diagnose",intro:"Identify the root cause, not a symptom."},
    {name:"Patch",intro:"Apply the minimal fix."},
    {name:"Verify",intro:"Confirm fix + no regression."}
  ],
  DEPLOY: [
    {name:"Prep",intro:"Backup. Version. Pre-deploy validation."},
    {name:"Checkpoint",intro:"Git checkpoint before deploy."},
    {name:"Deploy",intro:"Execute deployment via sanctioned path only."},
    {name:"Verify",intro:"Post-deploy health + functional checks."}
  ],
  CONTENT: [
    {name:"Brief",intro:"Define audience, objective, voice, constraints."},
    {name:"Draft",intro:"Produce v1 of the content."},
    {name:"QA",intro:"Voice, structure, conversion, proof checks."},
    {name:"Ship",intro:"Deliver to target surface. Record in activity log."}
  ],
  PLAN: [
    {name:"Context",intro:"Read existing state. Cite file-level evidence."},
    {name:"Options",intro:"Draft 2–3 alternative approaches with trade-offs."},
    {name:"Decision",intro:"Select and justify the chosen path."},
    {name:"Brief",intro:"Produce the implementation brief for the build phase."}
  ],
  SYSTEM_MIGRATION: [
    {name:"System Init",intro:"Pre-flight validation of every source and target file."},
    {name:"Core Protocol",intro:"Create the control layer."},
    {name:"Knowledge Refactor",intro:"Split monoliths, scope knowledge, deprecate legacy."},
    {name:"Install",intro:"Install prompt templates, engines, and scripts."},
    {name:"Lock",intro:"Run the system-wide lock audit."},
    {name:"Validate",intro:"End-to-end live system test."}
  ]
};

function freshStep(n){
  return {
    number:n,name:"",ai:"Claude",model:"Sonnet OK",time_min:5,time_max:10,
    token_estimate:"",ai_fit_claude:9,ai_fit_codex:3,ai_fit_note:"",
    dependency:"",safe_to_run:"",what_you_do:"",
    prompt_label:"Copy This Prompt",prompt_body:"",
    success_criteria:"",failure_recovery:"",
    confidence_pct:"",confidence_gap:"",confidence_improvement:"",
    pre_action:"",post_action:"",risk:"MEDIUM"
  };
}
function freshGate(pn){
  return {
    checks:["Step outputs exist","No broken references","Gate passes manual review"],
    all_pass_action:"git add -A && git commit -m \"CHECKPOINT: Phase "+pn+" complete\"",
    any_fail_action:"Fix the failing check. Re-verify before proceeding.",
    transition_confidence_pct:"",transition_confidence_gap:"",transition_confidence_improvement:""
  };
}
function freshPhase(n){
  return {number:n,name:"",intro:"",steps:[freshStep(n+".1")],gate:freshGate(n)};
}

const state = {
  meta:{
    project_letter:"A",manual_id:"MR-XXXX",manual_title:"",short_title:"",
    version:"1.0",date:today,authority:"",purpose:""
  },
  workflow:{
    workflow_type:"BUILD",sub_type:"",baseline_risk:"MEDIUM",
    naming_format:"({PROJECT})-{MANUAL}-PH{#}-{AI}-{LEVEL}-{###}",
    thread_format:"({PROJECT}) — [Short Task Description]",
    result_header_required:true
  },
  overview:{
    estimated_time:"",models_used:"",what_gets_built:"",
    file_manifest:[]
  },
  rules:{
    execution_rules:DEFAULT_EXEC_RULES.slice(),
    deploy_source_of_truth:""
  },
  protection:{
    protected_systems:[],
    deployment_warnings:[]
  },
  phases:[freshPhase(0),freshPhase(1)],
  thread_rules:JSON.parse(JSON.stringify(DEFAULT_THREAD_RULES)),
  failures:DEFAULT_FAILURES.map(r=>({n:r[0],symptom:r[1],action:r[2]})),
  sessions:[

/* ---------- UTILITIES ---------- */
function $(id){return document.getElementById(id)}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function slug(s){return (s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,50)}
function clone(o){return JSON.parse(JSON.stringify(o))}
function substituteTokens(text,meta,workflow){
  if(!text)return "";
  const map={
    "({PROJECT})":"("+(meta.project_letter||"X")+")",
    "{MANUAL_ID}":meta.manual_id||"",
    "{MANUAL}":(meta.manual_id||"").replace(/[^A-Z0-9]/gi,"").toUpperCase(),
    "{SHORT}":slug(meta.short_title||""),
    "{DATE}":meta.date||"",
    "{VERSION}":meta.version||"",
    "{AUTHORITY}":meta.authority||""
  };
  let out=text;
  Object.keys(map).forEach(k=>{out=out.split(k).join(map[k])});
  return out;
}

function groupShell(num,title,kind,bodyHtml,openByDefault){
  const cls=openByDefault===false?"group closed":"group";
  return `<section class="${cls}" data-g="${num}">
    <div class="g-head">
      <div class="num">${num}</div>
      <h2>${title}</h2>
      <span class="${kind==='req'?'req':'opt'}">${kind==='req'?'REQUIRED':'OPTIONAL'}</span>
      <span class="caret">▾</span>
    </div>
    <div class="g-body">${bodyHtml}</div>
  </section>`;
}

function inp(label,path,type,opts){
  opts=opts||{};
  const val=getPath(path);
  const req=opts.req?'<span class="req-star">*</span>':'';
  const hint=opts.hint?`<div class="hint">${esc(opts.hint)}</div>`:'';
  if(type==="textarea"){
    return `<div class="fld"><label>${label} ${req}</label><textarea data-path="${path}" rows="${opts.rows||3}" placeholder="${esc(opts.ph||'')}">${esc(val||"")}</textarea>${hint}</div>`;
  }
  if(type==="select"){
    const options=opts.options||[];
    const opts_html=options.map(o=>`<option value="${esc(o.v)}"${String(o.v)===String(val)?' selected':''}>${esc(o.l)}</option>`).join("");
    return `<div class="fld"><label>${label} ${req}</label><select data-path="${path}">${opts_html}</select>${hint}</div>`;
  }
  if(type==="checkbox"){
    return `<div class="fld"><label>${label}</label><label style="font-size:13px;color:var(--mm-ink);display:flex;align-items:center;gap:8px;padding:8px 0"><input type="checkbox" data-path="${path}" ${val?'checked':''}> <span>${esc(opts.cbLabel||'Enabled')}</span></label>${hint}</div>`;
  }
  return `<div class="fld"><label>${label} ${req}</label><input type="${type||'text'}" data-path="${path}" value="${esc(val||"")}" placeholder="${esc(opts.ph||'')}">${hint}</div>`;
}

function getPath(p){
  const parts=p.split(".");let cur=state;
  for(let i=0;i<parts.length;i++){
    const seg=parts[i];
    const m=seg.match(/^(.+)\[(\d+)\]$/);
    if(m){cur=cur[m[1]]; if(cur==null)return undefined; cur=cur[+m[2]]}
    else cur=cur==null?undefined:cur[seg];
    if(cur==null)return cur;
  }
  return cur;
}
function setPath(p,val){
  const parts=p.split(".");let cur=state;
  for(let i=0;i<parts.length-1;i++){
    const seg=parts[i];
    const m=seg.match(/^(.+)\[(\d+)\]$/);
    if(m){cur=cur[m[1]][+m[2]]} else cur=cur[seg];
  }
  const last=parts[parts.length-1];
  const m=last.match(/^(.+)\[(\d+)\]$/);
  if(m){cur[m[1]][+m[2]]=val} else cur[last]=val;
}

/* ---------- INPUT BINDINGS ---------- */
function bindInputs(){
  document.querySelectorAll("[data-path]").forEach(el=>{
    el.addEventListener("input",onInput);
    el.addEventListener("change",onInput);
  });
  // add/remove handlers
  document.querySelectorAll("[data-add]").forEach(el=>el.addEventListener("click",e=>{
    const k=el.getAttribute("data-add");
    if(k==="file_manifest") state.overview.file_manifest.push({file:"",phase:"",purpose:""});
    else if(k==="execution_rules") state.rules.execution_rules.push("");
    else if(k==="protected_systems") state.protection.protected_systems.push({system:"",reason:""});
    else if(k==="deployment_warnings") state.protection.deployment_warnings.push("");
    else if(k==="new_thread_triggers") state.thread_rules.new_thread_triggers.push("");
    else if(k==="same_thread_triggers") state.thread_rules.same_thread_triggers.push("");
    else if(k==="thread_transitions") state.thread_rules.transitions.push(["",""]);
    else if(k==="failures") state.failures.push({n:String(state.failures.length+1),symptom:"",action:""});
    else if(k==="sessions") state.sessions.push({name:"",covers:"",time:"",thread_behavior:"",what_happens:"",done_criteria:""});
    renderForm();
  }));
  document.querySelectorAll("[data-remove]").forEach(el=>el.addEventListener("click",e=>{
    const p=el.getAttribute("data-remove");
    removePath(p);
    renderForm();
  }));
  document.querySelectorAll("[data-add-step]").forEach(el=>el.addEventListener("click",e=>{
    const pi=+el.getAttribute("data-add-step");
    const p=state.phases[pi];
    const n=p.number+"."+((p.steps||[]).length+1);
    p.steps.push(freshStep(n));
    renderForm();
  }));
  document.querySelectorAll("[data-remove-step]").forEach(el=>el.addEventListener("click",e=>{
    const [pi,si]=el.getAttribute("data-remove-step").split(".").map(Number);
    state.phases[pi].steps.splice(si,1);
    renderForm();
  }));
  document.querySelectorAll("[data-add-check]").forEach(el=>el.addEventListener("click",e=>{
    const pi=+el.getAttribute("data-add-check");
    state.phases[pi].gate.checks.push("");
    renderForm();
  }));
  document.querySelectorAll("[data-remove-phase]").forEach(el=>el.addEventListener("click",e=>{
    const pi=+el.getAttribute("data-remove-phase");
    state.phases.splice(pi,1);
    renderForm();
  }));
  document.querySelectorAll("[data-move-phase-up]").forEach(el=>el.addEventListener("click",e=>{
    const pi=+el.getAttribute("data-move-phase-up");
    if(pi>0){const tmp=state.phases[pi-1];state.phases[pi-1]=state.phases[pi];state.phases[pi]=tmp;renderForm()}
  }));
  document.querySelectorAll("[data-move-phase-down]").forEach(el=>el.addEventListener("click",e=>{
    const pi=+el.getAttribute("data-move-phase-down");
    if(pi<state.phases.length-1){const tmp=state.phases[pi+1];state.phases[pi+1]=state.phases[pi];state.phases[pi]=tmp;renderForm()}
  }));
  const addPhaseBtn=$("add-phase");
  if(addPhaseBtn)addPhaseBtn.addEventListener("click",()=>{
    const n=(state.phases[state.phases.length-1]?.number ?? -1)+1;
    state.phases.push(freshPhase(n));
    renderForm();
  });
  const applyPreset=$("apply-preset");
  if(applyPreset)applyPreset.addEventListener("click",()=>{
    const preset=WORKFLOW_PRESETS[state.workflow.workflow_type]||[];
    preset.forEach((p,idx)=>{
      if(!state.phases[idx]){state.phases.push(freshPhase(idx))}
      if(!state.phases[idx].name){state.phases[idx].name=p.name}
      if(!state.phases[idx].intro){state.phases[idx].intro=p.intro}
      state.phases[idx].number=idx;
    });
    renderForm();
  });
}
function removePath(p){
  const m=p.match(/^(.+)\[(\d+)\]$/);
  if(m){
    const arrPath=m[1],idx=+m[2];
    const parts=arrPath.split(".");let cur=state;
    for(let i=0;i<parts.length-1;i++){
      const seg=parts[i];
      const mm=seg.match(/^(.+)\[(\d+)\]$/);
      if(mm){cur=cur[mm[1]][+mm[2]]} else cur=cur[seg];
    }
    const last=parts[parts.length-1];
    const mm=last.match(/^(.+)\[(\d+)\]$/);
    if(mm){cur[mm[1]][+mm[2]].splice(idx,1)} else cur[last].splice(idx,1);
  }
}
function onInput(e){
  const el=e.target;
  const p=el.getAttribute("data-path");
  let v=el.type==="checkbox"?el.checked:el.value;
  if(el.type==="number"&&v!==""){const n=Number(v);if(!isNaN(n))v=n}
  setPath(p,v);
}
function bindCollapses(){
  document.querySelectorAll("section.group .g-head").forEach(h=>{
    h.addEventListener("click",()=>h.parentElement.classList.toggle("closed"));
  });
}

/* ---------- VALIDATION ---------- */
function validate(){
  const errors=[];
  const m=state.meta;
  if(!m.project_letter||!/^[A-Z]$/.test(m.project_letter)) errors.push("Meta: project_letter must be a single uppercase letter A–Z.");
  if(!m.manual_id) errors.push("Meta: manual_id is required.");
  if(!m.manual_title) errors.push("Meta: manual_title is required.");
  if(!m.short_title) errors.push("Meta: short_title is required.");
  if(!m.version) errors.push("Meta: version is required.");
  if(!m.date) errors.push("Meta: date is required.");
  if(!m.authority) errors.push("Meta: authority is required.");
  if(!m.purpose) errors.push("Meta: purpose is required.");
  const w=state.workflow;
  if(!w.workflow_type) errors.push("Workflow: workflow_type is required.");
  if(!w.baseline_risk) errors.push("Workflow: baseline_risk is required.");
  const o=state.overview;
  if(!o.estimated_time) errors.push("Overview: estimated_time is required.");
  if(!o.models_used) errors.push("Overview: models_used is required.");
  if(!o.what_gets_built) errors.push("Overview: what_gets_built is required.");
  if(!state.phases||state.phases.length===0) errors.push("Phases: at least one phase is required.");
  const promptNames=new Set();
  (state.phases||[]).forEach((p,pi)=>{
    if(p.number==null||p.number==="") errors.push(`Phase ${pi}: number is required.`);
    if(!p.name) errors.push(`Phase ${pi}: name is required.`);
    if(!p.intro) errors.push(`Phase ${pi}: intro is required.`);
    if(!p.steps||p.steps.length===0) errors.push(`Phase ${p.number}: at least one step is required.`);
    (p.steps||[]).forEach((s,si)=>{
      if(!s.number) errors.push(`Phase ${p.number}, step ${si}: number is required.`);
      if(!s.name) errors.push(`Phase ${p.number}, step ${s.number}: name is required.`);
      if(!s.what_you_do) errors.push(`Phase ${p.number}, step ${s.number}: what_you_do is required.`);
      if(!s.prompt_body) errors.push(`Phase ${p.number}, step ${s.number}: prompt_body is required.`);
      if(!s.success_criteria) errors.push(`Phase ${p.number}, step ${s.number}: success_criteria is required.`);
      // uniqueness of prompt name — pull the first "PROMPT NAME:" line from the body
      const match=(s.prompt_body||"").match(/PROMPT NAME:\s*(.+)/);
      if(match){
        const key=match[1].trim();
        if(promptNames.has(key)) errors.push(`Phase ${p.number}, step ${s.number}: duplicate PROMPT NAME "${key}".`);
        promptNames.add(key);
      }
    });
    if(!p.gate||!p.gate.checks||p.gate.checks.length===0) errors.push(`Phase ${p.number}: gate must have at least one check.`);
  });
  // Phase continuity
  const nums=(state.phases||[]).map(p=>Number(p.number));
  for(let i=1;i<nums.length;i++){
    if(nums[i]!==nums[i-1]+1) errors.push(`Phases: numbers must be contiguous (phase ${nums[i-1]} → ${nums[i]}).`);
  }
  return errors;
}

function showValidation(errors){
  const slot=$("validation-slot");
  if(errors.length===0){
    slot.innerHTML=`<div class="validation ok"><h4>Validation passed</h4><div>All required fields present. Ready to generate.</div></div>`;
  }else{
    slot.innerHTML=`<div class="validation"><h4>Validation: ${errors.length} issue${errors.length===1?'':'s'}</h4><ul>${errors.map(e=>`<li>${esc(e)}</li>`).join("")}</ul></div>`;
  }
}

  const totals={
    phases:state.phases.length,

    sessions:(state.sessions||[]).length
  };

  const head=`<!DOCTYPE html>

  const headerBar=`
<header class="mmx-bar">

  const sidebar=genSidebar();

  const trackerTab=genTrackerTab();
  const sessionTab=genSessionTab();

  const footer=`<div class="mmx-footer">(${esc(meta.project_letter)})-${esc(meta.manual_id)}_${esc(slug(shortTitle))} / v${esc(meta.version)} / ${esc(meta.date)} / Authority: ${esc(meta.authority)}</div>`;

  const js=genJS();

  return head

    + `<div class="mmx-layout">`
    + sidebar
    + `<main class="mmx-main">`
    + overview + startHere + phaseTabs + rulesTab + threadTab + failTab + trackerTab + sessionTab

}

/* OPERATOR UPGRADE: extract the PROMPT NAME line from a prompt body, after token substitution */
function extractPromptName(promptBody,meta,workflow){
  const sub=substituteTokens(promptBody||"",meta,workflow);
  const m=sub.match(/PROMPT NAME:\s*([^\n\r]+)/i);
  return m?m[1].trim():"";
}

/* OPERATOR UPGRADE: infer thread behavior for a step.
   - First step of the manual: NEW
   - First step of any phase after phase 0: NEW (phase gate creates a fresh checkpoint)
   - If previous step used a different AI or model: NEW
   - Otherwise: SAME */
function stepThread(phaseIdx,stepIdx,step,prevStep){
  if(phaseIdx===0 && stepIdx===0) return "NEW";
  if(stepIdx===0) return "NEW";
  if(!prevStep) return "NEW";
  if((prevStep.ai||"")!==(step.ai||"")) return "NEW";
  if((prevStep.model||"")!==(step.model||"")) return "NEW";
  return "SAME";
}

/* OPERATOR UPGRADE: compute the NEXT ACTION block for a step. */
function stepNext(phaseIdx,stepIdx,phases){
  const phase=phases[phaseIdx];
  const next=(phase.steps||[])[stepIdx+1];
  if(next){
    const thread=stepThread(phaseIdx,stepIdx+1,next,phase.steps[stepIdx]);
    return {
      label:"Same phase, next step",
      prompt:extractPromptName(next.prompt_body,state.meta,state.workflow)||("Step "+next.number+": "+next.name),
      ai:next.ai||"-",model:next.model||"-",thread:thread,
      instruction:"After RESULT: COMPLETE, run the phase gate. Then move to Step "+next.number+" in this phase."
    };
  }
  const nextPhase=phases[phaseIdx+1];
  if(nextPhase){
    const first=(nextPhase.steps||[])[0];
    if(first){
      return {
        label:"Next phase",
        prompt:extractPromptName(first.prompt_body,state.meta,state.workflow)||("Phase "+nextPhase.number+" Step "+first.number),
        ai:first.ai||"-",model:first.model||"-",thread:"NEW",
        instruction:"Pass the phase gate first. Then open a NEW thread for Phase "+nextPhase.number+"."
      };
    }
  }
  return {
    label:"Workflow complete",
    prompt:"(none)",ai:"-",model:"-",thread:"-",
    instruction:"This is the final step. After the phase gate, the workflow is complete. Go to the Progress Tracker tab to mark everything done."
  };
}

/* OPERATOR UPGRADE: compute SAFE TO PROCEED for a step. */
function stepSafe(s){
  const reasons=[];
  if(!s.success_criteria) reasons.push("Success criteria not defined.");
  if(!s.failure_recovery) reasons.push("Failure recovery not defined.");
  if(!s.ai) reasons.push("AI not assigned.");
  if(!s.model) reasons.push("Model not specified.");
  if(!s.prompt_body) reasons.push("Prompt body empty.");
  if(reasons.length===0){
    return {ok:"YES",why:"This step has explicit success criteria, failure recovery, a defined AI / model, and a ready-to-paste prompt. Run it as written."};
  }
  return {ok:"NO",why:"Missing: "+reasons.join(" ")};
}

/* OPERATOR UPGRADE: pick the UPLOAD + TEST flavor based on STEP content (not just workflow type).
   Step-level signals dominate; workflow_type is a weak fallback. */
function stepVerify(s){
  const wt=state.workflow.workflow_type||"";
  const body=(s.prompt_body||"").toLowerCase();
  const post=(s.post_action||"").toLowerCase();
  const blob=body+" "+post;
  // Parse TASK TYPE line if present in the prompt body (honors the step's declared intent)
  const taskTypeMatch=(s.prompt_body||"").match(/TASK TYPE:\s*([A-Z_]+)/i);
  const taskType=taskTypeMatch?taskTypeMatch[1].toUpperCase():"";
  const touchesHTML=/\barena\.html\b|\bdrills\.html\b|\branklistiq\.html\b|\bindex\.html\b|\.html\b/.test(blob);
  const looksLikeDeploy=/\bupload\b|\bdeploy\b|\bgh-pages\b|\bgit push\b|\bnetlify\b|\bvercel\b/.test(blob);
  if(taskType==="AUDIT"||wt==="AUDIT"){
    return {
      title:"AUDIT VERIFY (REQUIRED)",
      steps:["Confirm every file or value named in the prompt actually exists.","Spot-check line counts, headers, or values against what the AI reported.","Re-read the AI response against the success criteria below.","If anything looks off, use the Failure Protocol."]
    };
  }
  if(taskType==="DEPLOY"||wt==="DEPLOY"||touchesHTML||looksLikeDeploy){
    return {
      title:"UPLOAD + TEST (REQUIRED)",
      steps:["Upload the updated file to the correct target.","Replace the previous version. Confirm the old file is gone.","Hard-refresh the browser to clear cache (Cmd+Shift+R or Ctrl+Shift+R).","Test the exact behavior the prompt was supposed to change."]
    };
  }
  if(taskType==="FIX"||wt==="FIX"){
    return {
      title:"REPRO + VERIFY (REQUIRED)",
      steps:["Reproduce the original failure on the current codebase.","Confirm the fix actually changes the observed behavior.","Re-run any related tests or checks.","Verify no regression on neighboring behavior."]
    };
  }
  if(taskType==="CONTENT"||wt==="CONTENT"){
    return {
      title:"REVIEW + VERIFY (REQUIRED)",
      steps:["Read the output end-to-end.","Verify tone, format, and length match the brief.","Check for em-dashes, AI clichés, or off-brand phrasing.","Confirm all facts and numbers are correct."]
    };
  }
  if(taskType==="BUILD"||wt==="BUILD"||wt==="SYSTEM_MIGRATION"){
    return {
      title:"BUILD VERIFY (REQUIRED)",
      steps:["Open the file the AI just created or modified.","Confirm structure matches the success criteria (sections, headers, fields).","Spot-check line count against the expected cap.","Run `git diff` to review every line before you checkpoint."]
    };
  }
  return {
    title:"VERIFY (REQUIRED)",
    steps:["Confirm the file(s) named in the prompt actually exist.","Spot-check line counts and key section headers.","Re-read the AI response against the success criteria below.","If anything looks off, run the failure protocol before continuing."]
  };
}

/* OPERATOR UPGRADE: failure protocol block (diagnosis + cause + fix + copyable report-back prompt). */
function stepFailProtocol(s){
  const id=extractPromptName(s.prompt_body,state.meta,state.workflow)||("Step "+s.number);
  const diag=s.failure_recovery||"Compare the AI response against the success criteria above. Identify the first criterion it fails.";
  const cause=s.confidence_gap?("Likely cause: "+s.confidence_gap):"Likely cause: ambiguous prompt, wrong model tier, or the AI skipped a success criterion. Re-read the prompt and the response side by side.";
  const fix=s.confidence_improvement?("Exact fix: "+s.confidence_improvement):"Exact fix: correct the one missing criterion, then re-run the prompt in the SAME thread. If the fix requires broader context, open a NEW thread with the report-back prompt below.";
  const reportBack="REPORT BACK PROMPT\n---\nPROMPT NAME: "+id+"-FAIL-REPORT\nTHREAD NAME: "+substituteTokens(state.workflow.thread_format||"",state.meta,state.workflow)+" (FAIL REPORT)\n---\nLoad PRIMER_CORE.md\nLoad KNOWLEDGE_INDEX.md\n---\nTASK TYPE: FIX\nRISK LEVEL: MEDIUM\nAUTHORITY: "+(state.meta.authority||"")+"\n---\nThe previous step failed. Here is the full context:\n\n1. Step attempted: "+s.number+" / "+s.name+"\n2. Expected success: "+(s.success_criteria||"(not defined)")+"\n3. Actual response from prior AI (paste below):\n<PASTE THE FAILED RESPONSE HERE>\n\nBegin your reply with:\nRESULT: COMPLETE / FAILED / PARTIAL\nSUMMARY: [1-2 lines]\n\nYour job:\n1. Diagnose the exact criterion that failed.\n2. State the likely root cause in one sentence.\n3. Give me the exact corrected prompt to re-run, copy-ready.\n\nEnd with a NEXT ACTION block.";
  return `
    <div class="mmx-fail-proto">
      <h4>If RESULT is not COMPLETE: Failure Protocol</h4>
      <div class="row"><div class="k">1. Diagnosis</div><div class="v">${esc(diag)}</div></div>
      <div class="row"><div class="k">2. Likely cause</div><div class="v">${esc(cause.replace(/^Likely cause:\s*/,""))}</div></div>
      <div class="row"><div class="k">3. Exact fix</div><div class="v">${esc(fix.replace(/^Exact fix:\s*/,""))}</div></div>
      <div class="row"><div class="k">4. Report back</div><div class="v">Copy the prompt below into a NEW thread to get a structured diagnosis and corrected prompt.</div></div>
      <div class="mmx-prompt"><span class="pl">Report Back Prompt</span><button class="cpy" onclick="mmxCopy(this)">Copy</button>${esc(reportBack)}</div>
    </div>`;
}

function genStep(s,p,phaseIdx,stepIdx){
  const aiCls=s.ai==='Claude'?'mmx-ai-claude':(s.ai==='Codex'?'mmx-ai-codex':'mmx-ai-other');
  const modelCls=(s.model||'').toLowerCase().includes('opus')?'mmx-m-opus':((s.model||'').toLowerCase().includes('sonnet')?'mmx-m-sonnet':'');
  const riskCls=s.risk?('mmx-m-risk-'+s.risk):'';
  const body=substituteTokens(s.prompt_body,state.meta,state.workflow);
  const promptId=extractPromptName(s.prompt_body,state.meta,state.workflow);
  const prevStep=(phaseIdx!=null&&stepIdx!=null&&stepIdx>0)?(state.phases[phaseIdx].steps[stepIdx-1]):null;
  const thread=(phaseIdx!=null&&stepIdx!=null)?stepThread(phaseIdx,stepIdx,s,prevStep):"SAME";
  const preAction=s.pre_action?`<div class="mmx-term"><span class="tlbl">Before Running</span><button class="cpy" onclick="mmxCopy(this)">Copy</button><pre>${esc(s.pre_action)}</pre></div>`:"";
  const postAction=s.post_action?`<div class="mmx-term"><span class="tlbl">After Running</span><button class="cpy" onclick="mmxCopy(this)">Copy</button><pre>${esc(s.post_action)}</pre></div>`:"";
  const confidence=s.confidence_pct!==""&&s.confidence_pct!=null?`
    <div class="mmx-conf">
      <div class="mmx-conf-lbl">Confidence check</div>
      <strong>CONFIDENCE: ${esc(s.confidence_pct)}%</strong>${s.confidence_gap?" | GAP: "+esc(s.confidence_gap):""}${s.confidence_improvement?" | HOW TO IMPROVE: "+esc(s.confidence_improvement):""}
    </div>`:"";
  const aiFit=(s.ai_fit_claude!=null||s.ai_fit_codex!=null)?`Claude: ${esc(s.ai_fit_claude)}/10 | Codex: ${esc(s.ai_fit_codex)}/10`:"-";
  const runCard=`
      <div class="mmx-run">
        <div class="mmx-run-item"><div class="mmx-run-lbl">Prompt</div><div class="mmx-run-val">${esc(promptId||("Step "+s.number))}</div></div>
        <div class="mmx-run-item"><div class="mmx-run-lbl">AI</div><div class="mmx-run-val">${esc(s.ai||"-")}</div></div>
        <div class="mmx-run-item"><div class="mmx-run-lbl">Model</div><div class="mmx-run-val">${esc(s.model||"-")}</div></div>
        <div class="mmx-run-item"><div class="mmx-run-lbl">Thread</div><div class="mmx-run-val mmx-run-thread-${thread}">${thread}</div></div>
      </div>`;
  const verify=stepVerify(s);
  const verifyBlock=`
      <div class="mmx-upload">
        <h4>${esc(verify.title)}</h4>
        <ol>${verify.steps.map(x=>`<li>${esc(x)}</li>`).join("")}</ol>
        <div class="okrow">
          <span class="pass">IF PASS → continue to next step</span>
          <span class="fail">IF FAIL → use Failure Protocol below</span>
        </div>
      </div>`;
  const safe=stepSafe(s);
  const safeBlock=`
      <div class="mmx-safe">
        <div class="mmx-safe-badge mmx-safe-${safe.ok}">${safe.ok}</div>
        <div class="mmx-safe-body">
          <div class="mmx-safe-lbl">Safe to proceed</div>
          <div class="mmx-safe-txt">${esc(safe.why)}</div>
        </div>
      </div>`;
  const failProto=stepFailProtocol(s);
  const next=(phaseIdx!=null&&stepIdx!=null)?stepNext(phaseIdx,stepIdx,state.phases):null;
  const nextBlock=next?`
      <div class="mmx-next-act">
        <div class="lbl">Next Action</div>
        <div class="row"><div class="k">Context</div><div class="v">${esc(next.label)}</div></div>
        <div class="row"><div class="k">Prompt</div><div class="v">${esc(next.prompt)}</div></div>
        <div class="row"><div class="k">AI</div><div class="v">${esc(next.ai)}</div></div>
        <div class="row"><div class="k">Model</div><div class="v">${esc(next.model)}</div></div>
        <div class="row"><div class="k">Thread</div><div class="v">${esc(next.thread)}</div></div>
        <div class="row"><div class="k">Instruction</div><div class="v">${esc(next.instruction)}</div></div>
      </div>`:"";
  return `
  <div class="mmx-step">
    <div class="mmx-step-head">
      <span>STEP ${esc(s.number)}: ${esc(s.name)}</span>
      <span class="sai ${aiCls}">${esc(s.ai)}</span>
      ${s.model?`<span class="mmx-meta ${modelCls}">${esc(s.model)}</span>`:""}
      ${s.time_min||s.time_max?`<span class="mmx-meta">${esc(s.time_min)}–${esc(s.time_max)} min</span>`:""}
      ${s.token_estimate?`<span class="mmx-meta">${esc(s.token_estimate)}</span>`:""}
      ${s.risk?`<span class="mmx-meta ${riskCls}">Risk: ${esc(s.risk)}</span>`:""}
    </div>
    <div class="mmx-step-body">
      ${runCard}
      <div class="mmx-ctrl">
        <div class="mmx-ctrl-item">
          <div class="mmx-ctrl-lbl">AI Fit</div>
          <div class="mmx-ctrl-val">${aiFit}</div>
          ${s.ai_fit_note?`<div class="mmx-ctrl-note">${esc(s.ai_fit_note)}</div>`:""}
        </div>
        <div class="mmx-ctrl-item">
          <div class="mmx-ctrl-lbl">Dependency</div>
          <div class="mmx-ctrl-val">${esc(s.dependency||"None")}</div>
          ${s.safe_to_run?`<div class="mmx-ctrl-note">Safe to run now: ${esc(s.safe_to_run)}</div>`:""}
        </div>
      </div>
      <p><strong>What you do:</strong> ${esc(s.what_you_do)}</p>
      ${preAction}
      <div class="mmx-prompt"><span class="pl">${esc(s.prompt_label||'Copy This Prompt')}</span><button class="cpy" onclick="mmxCopy(this)">Copy</button>${esc(body)}</div>
      <p><strong>Success:</strong> ${esc(s.success_criteria)}</p>
      ${postAction}
      ${verifyBlock}
      ${failProto}
      ${safeBlock}
      ${confidence}
      ${nextBlock}
    </div>
  </div>`;
}

function genGate(p,phaseIdx){
  const checks=(p.gate.checks||[]).map(c=>`  [  ] ${esc(c)}`).join("\n");
  const tc=p.gate.transition_confidence_pct?`
    <div class="mmx-conf">
      <div class="mmx-conf-lbl">Phase transition confidence</div>
      <strong>CONFIDENCE: ${esc(p.gate.transition_confidence_pct)}%</strong>${p.gate.transition_confidence_gap?" | GAP: "+esc(p.gate.transition_confidence_gap):""}${p.gate.transition_confidence_improvement?" | HOW TO IMPROVE: "+esc(p.gate.transition_confidence_improvement):""}
    </div>`:"";
  const allPass=p.gate.all_pass_action||"";
  const anyFail=p.gate.any_fail_action||"Fix and re-verify.";
  const passBlock=allPass?`
  <div class="mmx-term"><span class="tlbl">If ALL Checks Pass</span><button class="cpy" onclick="mmxCopy(this)">Copy</button><pre>${esc(allPass)}</pre></div>`:"";

  const nextPhase=(phaseIdx!=null)?state.phases[phaseIdx+1]:null;
  const gateNext=nextPhase?{
    label:"Next phase after gate passes",
    where:"Phase "+nextPhase.number+": "+(nextPhase.name||""),
    firstPrompt:extractPromptName(((nextPhase.steps||[])[0]||{}).prompt_body||"",state.meta,state.workflow)||("Phase "+nextPhase.number+" Step "+((nextPhase.steps||[])[0]||{}).number),
    ai:((nextPhase.steps||[])[0]||{}).ai||"-",
    model:((nextPhase.steps||[])[0]||{}).model||"-"
  }:{
    label:"Workflow complete",

    firstPrompt:"(none, workflow done)",ai:"-",model:"-"
  };
  const gateNextBlock=`
  <div class="mmx-next-act">
    <div class="lbl">Gate Next Action</div>
    <div class="row"><div class="k">Context</div><div class="v">${esc(gateNext.label)}</div></div>
    <div class="row"><div class="k">Go to</div><div class="v">${esc(gateNext.where)}</div></div>
    <div class="row"><div class="k">First prompt</div><div class="v">${esc(gateNext.firstPrompt)}</div></div>
    <div class="row"><div class="k">AI</div><div class="v">${esc(gateNext.ai)}</div></div>
    <div class="row"><div class="k">Model</div><div class="v">${esc(gateNext.model)}</div></div>
    <div class="row"><div class="k">Thread</div><div class="v">NEW (gate creates a checkpoint boundary)</div></div>
  </div>`;
  return `

<span class="kw">CHECKS:</span>
${checks}

<span class="kw">ALL PASS?</span> <span class="hi">Run the terminal command below.</span>
<span class="kw">ANY FAIL?</span> ${esc(anyFail)}</div>

  ${failBlock}

function genJS(){
  return `
  (function(){
    var tabs=document.querySelectorAll('.mmx-tab');
    var panels=document.querySelectorAll('.mmx-panel');
    tabs.forEach(function(t){t.addEventListener('click',function(){
      var id=this.getAttribute('data-panel');
      tabs.forEach(function(x){x.classList.remove('on')});
      panels.forEach(function(x){x.classList.remove('on')});
      this.classList.add('on');
      var p=document.getElementById('p-'+id);
      if(p)p.classList.add('on');
      document.querySelector('.mmx-main').scrollTop=0;
    })});
  })();
  window.mmxCopy=function(btn){
    var block=btn.closest('.mmx-prompt')||btn.closest('.mmx-gate');
    if(!block)return;
    var clone=block.cloneNode(true);
    var pl=clone.querySelector('.pl, .glb');if(pl)pl.remove();
    var c=clone.querySelector('.cpy');if(c)c.remove();
    var txt=clone.textContent.trim();
    navigator.clipboard.writeText(txt).then(function(){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy'},1400)}).catch(function(){btn.textContent='Failed'});
  };
  // Progress tracker status cycling
  var STATES=['PENDING','IN PROGRESS','COMPLETE'];
  var CLS={'PENDING':'mmx-b-pending','IN PROGRESS':'mmx-b-doing','COMPLETE':'mmx-b-done'};
  var KEY='mmx-tracker-'+location.pathname;
  function load(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return{}}}
  function save(s){try{localStorage.setItem(KEY,JSON.stringify(s))}catch(e){}}
  (function(){
    var tbl=document.getElementById('mmx-track-tbl');if(!tbl)return;
    var saved=load();
    Array.prototype.slice.call(tbl.querySelectorAll('tbody tr')).forEach(function(tr,i){
      var badge=tr.querySelector('.mmx-badge');if(!badge)return;
      if(saved[i]){badge.textContent=saved[i];badge.className='mmx-badge '+CLS[saved[i]]}
      badge.style.cursor='pointer';
      badge.addEventListener('click',function(){
        var idx=STATES.indexOf(badge.textContent);var next=STATES[(idx+1)%STATES.length];
        badge.textContent=next;badge.className='mmx-badge '+CLS[next];
        saved[i]=next;save(saved);
      });
    });
  })();
  `;
}

let lastHTML="";

function doValidate(){
  const errors=validate();
  showValidation(errors);
  return errors.length===0;
}

function doGenerate(){
  const errors=validate();
  showValidation(errors);
  if(errors.length){ $("preview-status").textContent="Validation failed"; return }
  const generatedHTML=genHTML();
  lastHTML=generatedHTML;
  const newWindow=window.open();
  if(newWindow){
    newWindow.document.write(generatedHTML);
    newWindow.document.close();
  }
  $("preview-status").textContent="Generated · "+new Date().toLocaleTimeString();
  $("btn-download").disabled=false;
  $("btn-copy-html").disabled=false;
  $("btn-export-json").disabled=false;
}

function doDownload(){
  if(!lastHTML)return;
  const fname=`(${state.meta.project_letter||'X'})-${state.meta.manual_id||'MANUAL'}_${slug(state.meta.short_title||'manual')}_v${state.meta.version||'1.0'}.html`;
  const blob=new Blob([lastHTML],{type:"text/html"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=fname;document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},500);
}

function doCopyHTML(){
  if(!lastHTML)return;
  navigator.clipboard.writeText(lastHTML).then(()=>{
    const b=$("btn-copy-html");const orig=b.textContent;b.textContent="Copied!";setTimeout(()=>b.textContent=orig,1400);
  });
}

function doExportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`(${state.meta.project_letter||'X'})-${state.meta.manual_id||'MANUAL'}_intake.json`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},500);
}

function doImportJSON(){
  $("json-file").click();
}
function handleImport(evt){
  const f=evt.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const obj=JSON.parse(e.target.result);
      Object.keys(state).forEach(k=>{if(obj[k]!==undefined)state[k]=obj[k]});
      renderForm();showValidation([]);
      $("preview-status").textContent="Intake loaded from JSON";
    }catch(err){alert("Invalid JSON: "+err.message)}
  };
  r.readAsText(f);
}

  if(!confirm("Clear the entire intake and start fresh?"))return;
