<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MissionMed HQ Scheduler</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap");

    :root {
      --navy: #061727;
      --navy2: #0b2033;
      --navy3: #102b46;
      --blue: #3bb7ff;
      --blue2: #78d4ff;
      --gold: #ffcc4d;
      --gold2: #ffe08a;
      --orange: #ff8a3d;
      --orange2: #ffb27a;
      --green: #3dff9a;
      --green2: #9cffc7;
      --red: #ff5c7a;
      --purple: #9d7bff;
      --text: #f4f8fb;
      --muted: rgba(244, 248, 251, 0.68);
      --faint: rgba(244, 248, 251, 0.48);
      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.2);
      --glass: rgba(8, 24, 40, 0.72);
      --glass2: rgba(8, 24, 40, 0.5);
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
      --radius: 8px;
      --sidebar-w: 276px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--navy);
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 12%, rgba(59, 183, 255, 0.14), transparent 32%),
        radial-gradient(circle at 82% 4%, rgba(255, 204, 77, 0.12), transparent 30%),
        var(--navy);
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    #scheduler-admin-root,
    .sos-admin-app {
      min-height: 100vh;
    }

    .sos-admin-app {
      position: relative;
      display: flex;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(59, 183, 255, 0.1), transparent 34%),
        radial-gradient(circle at 86% 10%, rgba(255, 204, 77, 0.1), transparent 32%),
        var(--navy);
    }

    .sos-admin-app[data-mode="embedded"] {
      display: block;
      min-height: auto;
      overflow: visible;
      background: transparent;
    }

    .sos-bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .sos-bg-layer span {
      position: absolute;
      border-radius: 999px;
      filter: blur(48px);
      opacity: 0.46;
      transform: translate3d(0, 0, 0);
    }

    .sos-bg-a {
      width: 42vw;
      height: 42vw;
      min-width: 360px;
      min-height: 360px;
      top: -12%;
      left: 7%;
      background: rgba(59, 183, 255, 0.22);
      animation: sos-aurora-a 18s ease-in-out infinite alternate;
    }

    .sos-bg-b {
      width: 36vw;
      height: 36vw;
      min-width: 320px;
      min-height: 320px;
      right: -8%;
      top: 18%;
      background: rgba(255, 204, 77, 0.18);
      animation: sos-aurora-b 22s ease-in-out infinite alternate;
    }

    .sos-bg-c {
      width: 34vw;
      height: 34vw;
      min-width: 300px;
      min-height: 300px;
      left: 28%;
      bottom: -18%;
      background: rgba(61, 255, 154, 0.16);
      animation: sos-aurora-c 20s ease-in-out infinite alternate;
    }

    .sos-sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 5;
      width: var(--sidebar-w);
      padding: 22px 18px;
      border-right: 1px solid var(--line);
      background: rgba(6, 23, 39, 0.86);
      backdrop-filter: blur(18px);
      box-shadow: 18px 0 46px rgba(0, 0, 0, 0.28);
      overflow-y: auto;
    }

    .sos-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .sos-brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 204, 77, 0.38);
      border-radius: 10px;
      background:
        linear-gradient(135deg, rgba(255, 204, 77, 0.24), rgba(59, 183, 255, 0.16)),
        rgba(255, 255, 255, 0.05);
      color: var(--gold);
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 12px 34px rgba(255, 204, 77, 0.14);
    }

    .sos-brand-title {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
      line-height: 1.08;
    }

    .sos-brand-kicker {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .sos-nav {
      display: grid;
      gap: 8px;
      margin-bottom: 20px;
    }

    .sos-nav-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: rgba(244, 248, 251, 0.78);
      text-align: left;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .sos-nav-btn:hover,
    .sos-nav-btn:focus-visible {
      transform: translateX(2px);
      border-color: rgba(59, 183, 255, 0.24);
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      outline: none;
    }

    .sos-nav-btn[aria-current="true"] {
      border-color: rgba(255, 204, 77, 0.36);
      background: linear-gradient(135deg, rgba(255, 204, 77, 0.15), rgba(59, 183, 255, 0.08));
      color: var(--text);
      box-shadow: inset 3px 0 0 var(--gold);
    }

    .sos-nav-icon {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--gold);
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 12px;
    }

    .sos-sidebar-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: rgba(255, 255, 255, 0.045);
    }

    .sos-sidebar-panel strong {
      display: block;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .sos-sidebar-panel span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .sos-main {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      margin-left: var(--sidebar-w);
      padding: 32px;
    }

    .sos-admin-app[data-mode="embedded"] .sos-main {
      min-height: auto;
      margin-left: 0;
      padding: 0;
    }

    .sos-shell {
      width: min(1320px, 100%);
      margin: 0 auto;
    }

    .sos-page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    .sos-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 26px;
      padding: 4px 9px;
      border: 1px solid rgba(255, 204, 77, 0.32);
      border-radius: 999px;
      color: var(--gold2);
      background: rgba(255, 204, 77, 0.08);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .sos-page-title {
      margin: 12px 0 6px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(32px, 4vw, 56px);
      line-height: 0.96;
    }

    .sos-page-copy {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .sos-head-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 8px;
    }

    .sos-grid {
      display: grid;
      gap: 16px;
    }

    .sos-grid.cols-2 {
      grid-template-columns: minmax(300px, 0.8fr) minmax(0, 1.2fr);
    }

    .sos-grid.cols-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .sos-grid.cols-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .sos-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.085), rgba(255, 255, 255, 0.035)),
        rgba(6, 23, 39, 0.76);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
      animation: sos-slide-up 0.42s ease both;
    }

    .sos-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .sos-card-title {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
      line-height: 1.2;
    }

    .sos-card-copy {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .sos-card-body {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .sos-stat {
      position: relative;
      min-height: 118px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.055);
      overflow: hidden;
    }

    .sos-stat::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(59, 183, 255, 0.12), transparent 48%, rgba(255, 204, 77, 0.1));
      opacity: 0.74;
      pointer-events: none;
    }

    .sos-stat > * {
      position: relative;
      z-index: 1;
    }

    .sos-stat-label {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .sos-stat-value {
      display: block;
      margin-top: 10px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
    }

    .sos-stat-note {
      margin: 10px 0 0;
      color: var(--faint);
      font-size: 12px;
    }

    .sos-tracker {
      margin: 18px 0 22px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.22);
      overflow-x: auto;
    }

    .sos-tracker-track {
      display: flex;
      min-width: 660px;
    }

    .sos-tracker-segment {
      position: relative;
      flex: 1;
      min-height: 56px;
      padding: 10px 18px 10px 26px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%, 18px 50%);
      margin-left: -12px;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .sos-tracker-segment:first-child {
      margin-left: 0;
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%);
      border-radius: 8px 0 0 8px;
    }

    .sos-tracker-segment:last-child {
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 18px 50%);
      border-radius: 0 8px 8px 0;
    }

    .sos-tracker-segment.is-complete {
      background: linear-gradient(135deg, rgba(61, 255, 154, 0.2), rgba(59, 183, 255, 0.1));
      color: var(--green2);
    }

    .sos-tracker-segment.is-active {
      background: linear-gradient(135deg, rgba(255, 204, 77, 0.28), rgba(255, 138, 61, 0.14));
      color: var(--text);
      box-shadow: 0 0 28px rgba(255, 204, 77, 0.16);
      animation: sos-tracker-pulse 2.4s ease-in-out infinite;
    }

    .sos-tracker-label {
      display: block;
      color: inherit;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .sos-tracker-title {
      display: block;
      margin-top: 3px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px;
      line-height: 1.15;
    }

    .sos-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .sos-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .sos-tab:hover,
    .sos-tab:focus-visible,
    .sos-tab[aria-selected="true"] {
      transform: translateY(-1px);
      border-color: rgba(255, 204, 77, 0.36);
      background: rgba(255, 204, 77, 0.1);
      color: var(--text);
      outline: none;
    }

    .sos-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 14px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .sos-btn:hover,
    .sos-btn:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(59, 183, 255, 0.46);
      background: rgba(255, 255, 255, 0.09);
      outline: none;
    }

    .sos-btn-primary {
      border-color: rgba(255, 204, 77, 0.58);
      background: linear-gradient(135deg, var(--gold), var(--orange));
      color: #071727;
      box-shadow: 0 12px 30px rgba(255, 204, 77, 0.16);
    }

    .sos-btn-primary:hover,
    .sos-btn-primary:focus-visible {
      box-shadow: 0 16px 36px rgba(255, 204, 77, 0.22);
    }

    .sos-btn-quiet {
      background: transparent;
    }

    .sos-field {
      display: grid;
      gap: 7px;
    }

    .sos-label {
      color: rgba(244, 248, 251, 0.82);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .sos-input,
    .sos-select,
    .sos-textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(6, 23, 39, 0.72);
      color: var(--text);
      padding: 10px 12px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .sos-textarea {
      min-height: 92px;
      resize: vertical;
    }

    .sos-input:focus,
    .sos-select:focus,
    .sos-textarea:focus {
      border-color: rgba(59, 183, 255, 0.58);
      box-shadow: 0 0 0 3px rgba(59, 183, 255, 0.14);
      outline: none;
    }

    .sos-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .sos-table-wrap {
      overflow-x: auto;
    }

    .sos-table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
    }

    .sos-table th,
    .sos-table td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    .sos-table th {
      color: var(--faint);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .sos-list {
      display: grid;
      gap: 10px;
    }

    .sos-item {
      display: grid;
      gap: 6px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
    }

    .sos-item strong {
      font-family: "Space Grotesk", sans-serif;
      font-size: 15px;
    }

    .sos-item span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .sos-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      width: fit-content;
      padding: 4px 9px;
      border: 1px solid rgba(59, 183, 255, 0.24);
      border-radius: 999px;
      background: rgba(59, 183, 255, 0.1);
      color: var(--blue2);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .sos-pill.good {
      border-color: rgba(61, 255, 154, 0.24);
      background: rgba(61, 255, 154, 0.09);
      color: var(--green2);
    }

    .sos-pill.warn {
      border-color: rgba(255, 204, 77, 0.3);
      background: rgba(255, 204, 77, 0.1);
      color: var(--gold2);
    }

    .sos-pill.bad {
      border-color: rgba(255, 92, 122, 0.28);
      background: rgba(255, 92, 122, 0.1);
      color: #ff9aad;
    }

    .sos-notice {
      display: grid;
      gap: 6px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 204, 77, 0.3);
      border-radius: var(--radius);
      background: rgba(255, 204, 77, 0.08);
      color: rgba(255, 242, 202, 0.96);
      line-height: 1.55;
    }

    .sos-notice.error {
      border-color: rgba(255, 92, 122, 0.32);
      background: rgba(255, 92, 122, 0.1);
      color: #ffd8df;
    }

    .sos-empty {
      display: grid;
      place-items: center;
      min-height: 150px;
      padding: 18px;
      border: 1px dashed rgba(255, 255, 255, 0.18);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.035);
    }

    .sos-provider-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 16px;
    }

    .sos-ops-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .sos-schedule-board {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .sos-day-column {
      display: grid;
      align-content: start;
      gap: 8px;
      min-height: 280px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.04);
    }

    .sos-day-column > strong {
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: 15px;
    }

    .sos-day-column > span {
      color: var(--muted);
      font-size: 12px;
    }

    .sos-board-block,
    .sos-board-empty,
    .sos-slot-row {
      display: grid;
      gap: 4px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.055);
    }

    .sos-board-block strong,
    .sos-slot-row strong {
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
    }

    .sos-board-block span,
    .sos-board-empty,
    .sos-slot-row span {
      color: var(--muted);
      font-size: 12px;
    }

    .sos-board-block.is-booked {
      border-color: rgba(61, 255, 154, 0.24);
      background: rgba(61, 255, 154, 0.08);
    }

    .sos-board-block.is-draft {
      border-color: rgba(255, 204, 77, 0.3);
      background: rgba(255, 204, 77, 0.08);
    }

    .sos-board-block.is-conflict {
      border-color: rgba(255, 92, 122, 0.3);
      background: rgba(255, 92, 122, 0.09);
    }

    .sos-slot-list {
      display: grid;
      gap: 10px;
    }

    .sos-slot-row {
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .sos-action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .sos-action-row .sos-btn {
      min-height: 34px;
      padding: 7px 9px;
      font-size: 11px;
    }

    .sos-builder-shell {
      display: grid;
      gap: 14px;
    }

    .sos-builder-section {
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid rgba(23, 163, 207, 0.12);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }

    .sos-builder-section h4 {
      margin: 0;
      color: var(--gold2);
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
    }

    .sos-builder-section p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;

      app.refs = app.refs || {};

      app.mount = function mount(config) {
        config = config || {};
        var target = typeof config.target === "string" ? document.querySelector(config.target) : config.target;
        app.refs.root = target || document.getElementById("scheduler-admin-root");
        if (!app.refs.root) return;

        app.state.mode = config.mode || app.refs.root.getAttribute("data-mode") || "standalone";
        app.state.apiBase = config.apiBase || app.refs.root.getAttribute("data-api-base") || "/api/scheduler";
        app.state.route = normalizeRoute(config.route || getHashRoute() || app.state.route);
        app.state.selectedProvider = normalizeProvider(config.provider || app.state.selectedProvider);

        renderShell();
        bindGlobalEvents();
        app.state.mounted = true;
        bootstrap();
      };

      app.render = function render() {
        if (!app.refs.content) return;
        app.refs.content.innerHTML = [
          pageHeader(),
          notice(),
          adminAvailabilityBoard()
        ].join("");
        bindRouteEvents();
      };

      app.api = {
        get: function get(path) {
          return request(path);
        },
        post: function post(path, body) {
          return request(path, { method: "POST", body: body });
        }
      };

      app.router = {
        go: function go(route) {
          app.state.route = normalizeRoute(route);
          if (app.state.mode === "standalone") {
            window.location.hash = app.state.route;
          }
          app.render();
        }
      };

      function renderShell() {
        app.refs.root.className = "sos-admin-app is-simple-board";
        app.refs.root.setAttribute("data-mode", app.state.mode);

        if (app.state.mode === "embedded") {
          app.refs.root.innerHTML = '<main class="sos-main"><div class="sos-shell" data-admin-content></div></main>';
          app.refs.content = app.refs.root.querySelector("[data-admin-content]");
          app.render();
          return;
        }

        app.refs.root.innerHTML = [
          '<div class="sos-bg-layer" aria-hidden="true"><span class="sos-bg-a"></span><span class="sos-bg-b"></span><span class="sos-bg-c"></span></div>',
          '<main class="sos-main"><div class="sos-shell" data-admin-content></div></main>'
        ].join("");
        app.refs.content = app.refs.root.querySelector("[data-admin-content]");
        app.render();
      }

      function pageHeader() {
        var copy = "Pick a mentor, pick a meeting type, then paint the weekly grid students can actually book.";
        var sessionReady = isAdminSessionReady();
        var actor = sessionReady ? currentAdminDisplayName() : "Session pending";
        return [
          '<header class="sos-page-head">',
          '<div>',
          '<span class="sos-kicker">Scheduler Ops</span>',
          '<h2 class="sos-page-title">Scheduler Ops</h2>',
          '<p class="sos-page-copy">' + copy + '</p>',
          '</div>',
          '<div class="sos-head-actions">',
          '<span class="sos-pill ' + (sessionReady ? "good" : "warn") + '">' + escapeHtml(actor || (sessionReady ? "Connected" : "Session pending")) + '</span>',
          '<button class="sos-btn" type="button" data-action="reload-all">Refresh</button>',
          '</div>',
          '</header>'
        ].join("");
      }

      function isAdminSessionReady() {
        return Boolean(
          app.state.bootstrap
            || app.state.adminSessionReady
            || app.state.entitlementConfig
            || app.state.analytics
            || (app.state.session && app.state.session.authenticated && hasSchedulerAdminRole(app.state.session))
        );
      }

      function currentAdminDisplayName() {
        var bootstrapUser = app.state.bootstrap && app.state.bootstrap.user ? app.state.bootstrap.user : null;
        var sessionUser = app.state.session && app.state.session.user ? app.state.session.user : null;
        return String(
          (bootstrapUser && (bootstrapUser.display_name || bootstrapUser.displayName || bootstrapUser.login))
            || (sessionUser && (sessionUser.displayName || sessionUser.display_name || sessionUser.login))
            || "Connected"
        );
      }

      function tracker(steps) {
        return [
          '<section class="sos-tracker" aria-label="Scheduler staging progress">',
          '<div class="sos-tracker-track">',
          steps.map(function (step, index) {
            var stateClass = step.status === "complete" ? " is-complete" : step.status === "active" ? " is-active" : "";
            return '<div class="sos-tracker-segment' + stateClass + '"><span class="sos-tracker-label">Step ' + String(index + 1) + '</span><span class="sos-tracker-title">' + escapeHtml(step.title) + '</span></div>';
          }).join(""),
          '</div>',
          '</section>'
        ].join("");
      }

      function notice() {
        if (!app.state.notice) return "";
        return '<div class="sos-notice ' + (app.state.notice.type === "error" ? "error" : "") + '"><strong>' + escapeHtml(app.state.notice.title) + '</strong><span>' + escapeHtml(app.state.notice.message) + '</span></div>';
      }

      function stats() {
        var today = app.state.appointments.filter(isToday).length;
        var upcoming = app.state.appointments.length;
        var providers = app.state.providers.length || countConfigured("providers");
        var alerts = [app.state.notice, isAdminSessionReady() ? null : true].filter(Boolean).length;
        return [

          statCard("Alerts", alerts, "Open configuration and session notices."),

        ].join("");

        return '<article class="sos-stat"><p class="sos-stat-label">' + escapeHtml(label) + '</p><strong class="sos-stat-value">' + escapeHtml(value) + '</strong><p class="sos-stat-note">' + escapeHtml(note) + '</p></article>';
      }

        if (app.state.route === "availability") return adminAvailabilityBoard();

        if (app.state.route === "audit") return auditView();
        if (app.state.route === "appointments") return appointmentsView();
        return opsView();
      }

        return adminAvailabilityBoard();

      function adminGridBody(grid) {

          return '<div class="sos-admin-empty"><strong>Select a mentor and meeting type</strong><p>The board will load the exact slots students see for that combination.</p></div>';

        if (!cells.length) {
          return '<div class="sos-admin-empty"><strong>No weekly cells loaded</strong><p>Reload the board or choose another mentor/type. No student-visible slots were changed.</p></div>';

        var days = adminGridDays(grid);

          '<div class="sos-admin-grid-wrap">',
          '<div class="sos-admin-calendar-grid" role="grid" aria-label="Weekly availability board">',

          timeRows.map(function (time) {

          '</div>',
          '</div>'
        ].join("");

      function adminSlotCell(cell) {
        if (!cell) return '<button class="sos-admin-slot-cell is-clear" type="button" disabled><span class="sos-cell-status">Blank</span></button>';
        var pending = app.state.pendingGridChanges[cell.id];
        var status = pending ? pending.action : cell.status || "closed";
        if (status === "clear") status = "clear";
        var classes = ["sos-admin-slot-cell", "is-" + status];
        if (pending) classes.push("is-pending");
        var statusLabel = pending ? stagedStatusLabel(pending.action) : cellStatusLabel(cell.status);
        var title = cell.appointment ? "Open booked appointment details" : "Apply " + app.state.selectedSlotAction + " to " + cell.label;
        return '<button class="' + classes.join(" ") + '" type="button" data-admin-cell-id="' + escapeHtml(cell.id) + '" title="' + escapeHtml(title) + '"><span class="sos-cell-status">' + escapeHtml(statusLabel) + '</span><span class="sos-cell-time">' + escapeHtml(cell.time_label || "") + '</span></button>';

      function adminGridSidePanel(grid) {
        return "";
      }

      function adminGridLegend(grid) {
        var cells = Array.isArray(grid.cells) ? grid.cells : [];
        var openCount = cells.filter(function (cell) { return cell.status === "open"; }).length;
        var bookedCount = cells.filter(function (cell) { return cell.status === "booked"; }).length;
        return [
          '<div class="sos-simple-strip" aria-label="Board legend">',
          '<div class="sos-simple-legend">',
          '<span class="sos-legend-dot is-open">Open</span>',
          '<span class="sos-legend-dot is-reserved">Reserved</span>',
          '<span class="sos-legend-dot">Blank</span>',
          '<span class="sos-legend-dot is-blackout">Blocked</span>',
          '<span class="sos-legend-dot is-booked">Booked</span>',
          '</div>',
          '<span class="sos-muted">' + escapeHtml(openCount) + ' open / ' + escapeHtml(bookedCount) + ' booked this week</span>',
          '</div>'
        ].join("");

      function adminAppointmentsStrip(grid) {

      function availabilityBuilder() {

      function availabilityMatrix() {
        var days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        var times = ["8 AM", "9 AM", "10 AM", "11 AM", "12 PM", "1 PM", "2 PM", "3 PM", "4 PM", "5 PM", "6 PM", "7 PM", "8 PM"];
        return [
          '<div class="sos-availability-matrix" aria-label="Weekly availability grid">',
          '<div class="sos-time-label">Time</div>',
          days.map(function (day) { return '<div class="sos-time-label">' + escapeHtml(day) + '</div>'; }).join(""),
          times.map(function (time, timeIndex) {
            return '<div class="sos-time-label">' + escapeHtml(time) + '</div>' + days.map(function (day, dayIndex) {
              var classes = ["sos-grid-cell"];
              var isWeekday = dayIndex < 5;
              var provider = activeProvider().id;
              var brianOpen = isWeekday && ["11 AM", "12 PM", "1 PM"].indexOf(time) >= 0;
              var drJOpen = isWeekday && ["9 AM", "10 AM", "6 PM", "7 PM"].indexOf(time) >= 0;
              if ((provider === "all" && (brianOpen || drJOpen)) || (provider === "dr-brian" && brianOpen) || (provider === "dr-j" && drJOpen)) classes.push("is-open");
              if ((provider === "dr-s" || provider === "sophia") && isWeekday && ["10 AM", "1 PM"].indexOf(time) >= 0) classes.push("is-buffer");
              if (provider === "phil-usce" && isWeekday && time === "2 PM") classes.push("is-buffer");
              return '<button class="' + classes.join(" ") + '" type="button" data-action="grid-preview" aria-label="' + escapeHtml(day + " " + time) + '">' + escapeHtml(cellLabel(classes)) + '</button>';
            }).join("");
          }).join(""),
          '</div>',
          '<div class="sos-action-row"><span class="sos-pill good">Open block</span><span class="sos-pill warn">Exact start</span><span class="sos-pill bad">Blackout</span><span class="sos-pill">Buffer</span></div>'
        ].join("");
      }

      function cellLabel(classes) {
        if (classes.indexOf("is-blackout") >= 0) return "Blackout";
        if (classes.indexOf("is-start") >= 0) return "Start";
        if (classes.indexOf("is-open") >= 0) return "Open";
        if (classes.indexOf("is-buffer") >= 0) return "Buffer";
        return "";
      }

      function field(label, control) {
        return '<label class="sos-field"><span class="sos-label">' + escapeHtml(label) + '</span>' + control + '</label>';
      }

      function table(rows, headers, cellBuilder, emptyText) {

          '<thead><tr>' + headers.map(function (header) { return '<th scope="col">' + escapeHtml(header) + '</th>'; }).join("") + '</tr></thead>',
          '<tbody>',
          rows.map(function (row) { return '<tr>' + cellBuilder(row).map(function (cell) { return '<td>' + cell + '</td>'; }).join("") + '</tr>'; }).join(""),
          '</tbody></table></div>'
        ].join("");
      }

      function badge(status) {
        var normalized = String(status || "").toLowerCase();

      function activeProvider() {
        var simple = simpleBoardProviders();
        return simple.find(function (provider) {
          return provider.id === app.state.selectedProvider;
        }) || simple[0] || providerOptions()[1] || providerRoster[1];
      }

      function activeAppointmentType() {
        return appointmentTypeOptionsData().find(function (type) {
          return type.id === app.state.selectedAppointmentType;
        }) || { id: "", label: "Select a meeting type" };
      }

      function providerOptions() {
        var rows = Array.isArray(app.state.providers) && app.state.providers.length
          ? app.state.providers.map(function (provider) {
            return {
              id: provider.id,
              label: provider.display_name || provider.name || provider.label || "Mentor",
              short: provider.short || initials(provider.display_name || provider.name || "MM")
            };
          })
          : providerRoster;
        return [{ id: "all", label: "All Providers", short: "All" }].concat(rows.filter(function (row) { return row.id !== "all"; }));
      }

      function simpleBoardProviders() {
        var rows = providerOptions().filter(function (provider) { return provider.id !== "all"; });
        var allowed = rows.filter(function (provider) {
          var label = String(provider.label || "").toLowerCase();
          var id = String(provider.id || "").toLowerCase();
          return label.indexOf("brian") >= 0
            || label.indexOf("dr j") >= 0
            || label.indexOf("drj") >= 0
            || label.indexOf("phil") >= 0
            || id.indexOf("brian") >= 0
            || id.indexOf("dr-j") >= 0
            || id.indexOf("drj") >= 0
            || id.indexOf("phil") >= 0;
        });
        var ordered = [];
        ["brian", "dr j", "drj", "phil"].forEach(function (needle) {
          allowed.forEach(function (provider) {

          var date = addDays(start, index);
          return {
            key: date.toISOString().slice(0, 10),
            day: new Intl.DateTimeFormat([], { weekday: "short" }).format(date),
            date: new Intl.DateTimeFormat([], { month: "short", day: "numeric" }).format(date)
          };
        });
      }

      function adminGridTimes(cells) {
        var seen = {};
        return cells.reduce(function (list, cell) {
          var label = cell.time_label || "";
          if (label && !seen[label]) {
            seen[label] = true;
            list.push({ label: label });
          }
          return list;
        }, []);
      }

        return String(value || "MM")

      async function loadAuthSession() {
        try {
          var payload = await fetchAuthSession();
          if (!payload.authenticated || !hasSchedulerAdminRole(payload)) {
            var exchanged = await exchangeSchedulerAdminSession(payload);
            if (exchanged && exchanged.authenticated) {
              payload = exchanged;
            } else if (!payload.authenticated) {
              payload = exchanged || payload;
            }
          }
          app.state.session = payload;
          app.state.csrfToken = payload.csrfToken || "";
          app.state.accessToken = payload.accessToken || "";
        } catch (error) {
          app.state.session = null;
          app.state.csrfToken = "";
          app.state.accessToken = "";
        }
      }

      async function fetchAuthSession() {
        var response = await fetch("/api/auth/session?mm_scheduler_exchange=1&audience=scheduler", {
          credentials: "same-origin",
          cache: "no-store",
          headers: { Accept: "application/json" }
        });
        return response.json().catch(function () { return {}; });
      }

      async function exchangeSchedulerAdminSession(previousPayload) {
        try {
          var response = await fetch("/api/auth/exchange", {
            method: "POST",
            credentials: "same-origin",
            cache: "no-store",
            headers: {
              Accept: "application/json",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ audience: "scheduler" })
          });
          var payload = await response.json().catch(function () { return {}; });
          return response.ok && payload.authenticated ? payload : (payload && Object.keys(payload).length ? payload : previousPayload);
        } catch (error) {
          return previousPayload || {};
        }
      }

      function hasSchedulerAdminRole(payload) {
        var roles = [];
        if (payload && payload.user && Array.isArray(payload.user.roles)) roles = roles.concat(payload.user.roles);
        if (payload && Array.isArray(payload.roles)) roles = roles.concat(payload.roles);
        if (payload && payload.user && payload.user.role) roles.push(payload.user.role);
        if (payload && payload.role) roles.push(payload.role);
        return roles.map(function (role) {
          return String(role || "").trim().toLowerCase();
        }).some(function (role) {
          return role === "administrator" || role === "admin" || role === "hq_admin" || role === "missionmed_admin" || role === "coordinator";
        });
      }

      function stageAdminCellChange(cellId) {

          app.render();
          return;
        }
        var action = app.state.selectedSlotAction || "close";
        var next = Object.assign({}, app.state.pendingGridChanges);
        next[cell.id] = {
          action: action,
          provider_id: cell.provider_id,
          appointment_type_id: cell.appointment_type_id,
          start_at: cell.start_at,
          end_at: cell.end_at,
          timezone: cell.timezone || "America/New_York",

          repeat_weekly: action === "open" && app.state.repeatWeeklyOpen === true,

        };

        });
        if (!changes.length) return;
        app.state.gridSaving = true;
        app.render();
        var failures = [];
        for (var index = 0; index < changes.length; index += 1) {
          var change = changes[index];
          var result = await app.api.post("/admin/availability-cell", Object.assign({}, change, {
            idempotency_key: "admin-grid-" + Date.now() + "-" + index
          }));
          if (!result.ok) failures.push(result.message || result.error || "Slot update failed");
        }
        app.state.gridSaving = false;
        if (failures.length) {
          setNotice("Some slot changes failed", failures[0], "error");
        } else {
          setNotice("Availability saved", "Student-visible openings now reflect the saved board.", "info");
          app.state.pendingGridChanges = {};
        }
        await Promise.all([loadAppointments({ quiet: true }), loadAdminGrid({ quiet: true })]);

      async function request(path, options) {
        options = options || {};
        try {
          var headers = { Accept: "application/json" };
          if (options.body) headers["Content-Type"] = "application/json";
          if (app.state.csrfToken) headers["x-mmhq-csrf"] = app.state.csrfToken;
          if (app.state.accessToken) headers.Authorization = "Bearer " + app.state.accessToken;
          var response = await fetch(app.state.apiBase + path, {
            method: options.method || "GET",
            headers: headers,
            body: options.body ? JSON.stringify(options.body) : undefined,
            credentials: "same-origin"
          });
          var payload = await response.json().catch(function () { return {}; });
          return response.ok ? payload : Object.assign({ ok: false, status: response.status }, payload);
        } catch (error) {
          return { ok: false, error: "network_error", message: error.message };
        }
      }

      function countConfigured(collection) {
        var result = app.state.setupResults[collection];
        if (!result || !result.ok) return 0;
        if (Array.isArray(result.rows)) return result.rows.length;
        if (Array.isArray(result.result)) return result.result.length;
        return 1;
      }

      function normalizeRoute(route) {
        var clean = String(route || "").replace(/^#/, "");
        if (clean === "availability") return "ops";
        return routes.some(function (candidate) { return candidate.id === clean; }) ? clean : "ops";
      }

      function normalizeProvider(provider) {
        var simpleProviders = simpleBoardProviders();
        return simpleProviders.some(function (candidate) { return candidate.id === provider; }) ? provider : (simpleProviders[0] ? simpleProviders[0].id : "all");
      }

      function getHashRoute() {
        return window.location.hash ? window.location.hash.slice(1) : "";
      }

      function formData(form) {
        return Object.fromEntries(new FormData(form).entries());
      }

      function normalizeAppointmentTypePayload(payload) {
        var requestedMeetingMode = payload.meeting_mode || "manual";
        var persistedMeetingMode = ["manual", "zoom", "google_meet", "none"].indexOf(requestedMeetingMode) >= 0 ? requestedMeetingMode : "manual";
        var metadata = {
          instructions: payload.description || "",
          division_id: payload.metadata_division_id || "mission-residency",
          division_label: payload.metadata_division_id === "exam-prep" ? "Exam Prep" : "Mission Residency",
          visit_type: payload.metadata_visit_type || "1-on-1 Advising",
          duration_unit: payload.metadata_duration_unit || "minutes",
          label: payload.metadata_label || "",
          color: payload.metadata_color || "gold",
          booking_layout: payload.metadata_booking_layout || "guided_week",
          availability_start_mode: payload.metadata_availability_start_mode || "available_blocks",
          interval_minutes: Number(payload.metadata_interval_minutes || 60),
          availability_window: {
            start: payload.metadata_window_start || null,
            end: payload.metadata_window_end || null
          },
          capacity_mode: payload.metadata_capacity_mode || "individual",
          waitlist: { enabled: payload.metadata_waitlist_enabled === "true" },
          timezone_mode: payload.metadata_timezone_mode || "localized",
          per_day_limit: payload.metadata_per_day_limit ? Number(payload.metadata_per_day_limit) : null,
          web_meetings: {
            provider: requestedMeetingMode,
            auto_generate: payload.metadata_meeting_auto_generate === "true",
            provider_account_id: payload.metadata_meeting_account || null,
            meeting_url: payload.metadata_manual_meeting_url || null,
            link_policy: payload.metadata_meeting_link_policy || (payload.metadata_meeting_after_confirm === "true" ? "after_confirmation" : "manual_review")
          },
          intake_fields: [{
            field_key: "session_goals",
            label: payload.metadata_intake_label || "Goals for this session",
            field_type: payload.metadata_intake_type || "textarea",
            display: payload.metadata_intake_display === "true",
            required: payload.metadata_intake_required === "true",
            visibility: payload.metadata_intake_protected === "true" ? "staff_only" : "student_and_staff",
            sort_order: 1
          }],
          notifications: {
            admin_booked_email: payload.metadata_admin_booked_email === "true",
            student_booked_email: payload.metadata_student_booked_email === "true",
            admin_canceled_email: payload.metadata_admin_canceled_email === "true",
            student_canceled_email: payload.metadata_student_canceled_email === "true",
            reminder_schedule: reminderScheduleFromPayload(payload.metadata_reminder_minutes),
            sms_reminders: payload.metadata_sms_reminders === "true",
            admin_email: payload.metadata_admin_email || null,
            notification_opt_in: true,
            status: "not_configured"
          },
          booking_flow: {
            mode: payload.metadata_booking_flow || "guided",
            steps: String(payload.metadata_booking_steps || "division, visit_type, mentor, time_slot, review_confirm").split(",").map(function (step) { return step.trim(); }).filter(Boolean),
            confirmation_behavior: payload.metadata_confirmation_behavior || "Show Matrix confirmation"
          },
          payments: {
            mode: payload.metadata_payment_mode || "none",
            provider: String(payload.metadata_payment_provider || "stripe").toLowerCase().replace(" placeholder", ""),
            amount_cents: Number(payload.metadata_payment_amount_cents || 0),
            currency: String(payload.metadata_payment_currency || "usd").toLowerCase(),
            status: "not_configured"
          }
        };

        return {
          name: payload.name || "Untitled appointment type",
          slug: slugify(payload.name || "untitled-appointment-type"),
          description: payload.description || "",
          duration_minutes: Number(payload.duration_minutes || 60),
          buffer_before_minutes: Number(payload.buffer_before_minutes || 0),
          buffer_after_minutes: Number(payload.buffer_after_minutes || 0),
          min_notice_minutes: Number(payload.min_notice_minutes || 1440),
          max_booking_window_days: Number(payload.max_booking_window_days || 60),
          capacity: payload.capacity ? Number(payload.capacity) : null,
          group_enabled: metadata.capacity_mode === "group",
          meeting_mode: persistedMeetingMode,
          status: "draft",
          active: false,
          metadata: metadata
        };
      }

      function slugify(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 80) || "appointment-type";
      }

      function reminderScheduleFromPayload(value) {
        return String(value || "")
          .split(",")
          .map(function (item) { return Number(item.trim()); })
          .filter(function (minutes) { return Number.isFinite(minutes) && minutes >= 0; })
          .map(function (minutes) { return { minutes_before: minutes }; });
      }

      function setNotice(title, message, type) {
        app.state.notice = { title: title, message: message, type: type || "info" };
      }

      function clearNotice() {
        app.state.notice = null;
      }

      function isToday(row) {
        if (!row || !row.start_at) return false;
        return new Date(row.start_at).toDateString() === new Date().toDateString();
      }

      function formatDateTime(value) {
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value || "");
        return new Intl.DateTimeFormat([], { dateStyle: "medium", timeStyle: "short" }).format(date);
      }

      function formatTime(value) {
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value || "");
        return new Intl.DateTimeFormat([], { timeStyle: "short" }).format(date);
      }

      function formatShortDate(value) {
        var date = new Date(value + "T00:00:00");
        if (Number.isNaN(date.getTime())) return String(value || "");
        return new Intl.DateTimeFormat([], { month: "short", day: "numeric" }).format(date);
      }

      function todayValue() {
        return new Date().toISOString().slice(0, 10);
      }

      function defaultRepeatUntil() {
        return addDays(todayValue(), 84).toISOString().slice(0, 10);
      }

      function buildDraftSlots() {
        var today = new Date();
        return [
          { provider_id: "dr-j", provider: "Dr J", date: today.toISOString().slice(0, 10), label: "Exam Prep, 9:00 AM ET", status: "published" },
          { provider_id: "dr-j", provider: "Dr J", date: today.toISOString().slice(0, 10), label: "Exam Prep, 6:00 PM ET", status: "published" },
          { provider_id: "dr-brian", provider: "Dr. Brian", date: new Date(today.getTime() + 24 * 60 * 60 * 1000).toISOString().slice(0, 10), label: "Mission Residency, 11:00 AM ET", status: "published" },
          { provider_id: "dr-s", provider: "Dr S", date: new Date(today.getTime() + 2 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10), label: "Availability coming soon", status: "pending" }
        ];
      }

      function escapeHtml(value) {
        return String(value === undefined || value === null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      window.MMEDSchedulerAdmin = app;

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function () { app.mount(); });
      } else {
        app.mount();
      }
    })(window, document);
  </script>
</body>
</html>
